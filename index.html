const DB={
  async getPts(){
    if(SB){const{data,error}=await SB.from('patients').select('*').order('created_at',{ascending:false});if(!error&&data)return data.map(r=>r.data||r);}
    return LS.g('gmc_pts_v5',[]);
  },
  async savePt(p){
    if(SB){await SB.from('patients').upsert({id:p.id,data:p,created_at:p.created_at||new Date().toISOString()},{onConflict:'id'});}
    const all=LS.g('gmc_pts_v5',[]);LS.s('gmc_pts_v5',[p,...all.filter(x=>x.id!==p.id)]);return p;
  },
  async delPt(id){
    if(SB)await SB.from('patients').delete().eq('id',id);
    LS.s('gmc_pts_v5',LS.g('gmc_pts_v5',[]).filter(p=>p.id!==id));
  },
  async getProtos(){
    if(SB){const{data}=await SB.from('protocols').select('*');if(data&&data.length){const o={};data.forEach(r=>{o[r.name]=r.data;});return o;}}
    return LS.g('gmc_protos_v5',DP);
  },
  async saveProtos(protos){
    if(SB){const rows=Object.entries(protos).map(([name,data])=>({name,data}));await SB.from('protocols').upsert(rows,{onConflict:'name'});}
    LS.s('gmc_protos_v5',protos);
  },
  async uploadPhoto(patId,tag,file){
    if(SB){
      const ext=file.name.split('.').pop();
      const path=`${patId}/${tag}_${Date.now()}.${ext}`;
      const{error}=await SB.storage.from('patient-photos').upload(path,file,{contentType:file.type});
      if(!error){const{data:u}=SB.storage.from('patient-photos').getPublicUrl(path);return u.publicUrl;}
    }
    return new Promise(res=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.readAsDataURL(file);});
  },
  getChks:(pid)=>LS.g('chk_'+pid,{}), setChks:(pid,v)=>LS.s('chk_'+pid,v),
  getPhotos:(pid)=>LS.g('pho_'+pid,{}), setPhotos:(pid,v)=>LS.s('pho_'+pid,v),
  getOrders:(pid)=>LS.g('ord_'+pid,[]), setOrders:(pid,v)=>LS.s('ord_'+pid,v),
  getDS:(pid)=>LS.g('ds_'+pid,{}), setDS:(pid,v)=>LS.s('ds_'+pid,v),
};

  chkrow:(done)=>({display:"flex",alignItems:"flex-start",gap:10,padding:"8px 12px",borderRadius:8,marginBottom:4,background:done?"rgba(34,197,94,0.06)":"rgba(59,130,246,0.03)",border:`1px solid ${done?"#22C55E30":C.b}`,cursor:"pointer"}),
  g2:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12},
  g3:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12},
  ovl:{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.82)",zIndex:1000,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"20px 12px",overflowY:"auto"},

};
const CB=({chk,on})=>(
  <div onClick={on} style={{width:18,height:18,borderRadius:5,border:`2px solid ${chk?"#22C55E":C.mu}`,background:chk?"#22C55E":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1,cursor:"pointer"}}>
    {chk&&<span style={{color:"#fff",fontSize:10,fontWeight:700}}>✓</span>}

);
const Sp=({h=10})=><div style={{height:h}}/>;
const Lbl=({t})=><label style={S.lbl}>{t}</label>;

// ═══════════════════════════════════════════
// INVESTIGATION ROW + INLINE PHOTO UPLOAD
// ═══════════════════════════════════════════
function InvRow({item,idx,patId,checked,onChk,photos,onAddPhoto}){
  const [exp,setExp]=useState(false);
  const [busy,setBusy]=useState(false);
  const fRef=useRef(); const cRef=useRef();
  const mine=photos['inv_'+idx]||[];

  const handle=async file=>{
    if(!file)return;
    setBusy(true);
    try{
      const url=await DB.uploadPhoto(patId,'inv_'+idx,file);
      onAddPhoto('inv_'+idx,{url,name:file.name,ts:Date.now()});
    }catch(e){alert('Upload failed: '+e.message);}
    setBusy(false);
    setExp(true);
  };

  return(
    <div style={{marginBottom:5}}>
      <div style={S.chkrow(checked)} onClick={()=>onChk('inv_'+idx)}>
        <CB chk={checked} on={()=>onChk('inv_'+idx)}/>
        <span style={{flex:1,fontSize:13,color:checked?"#5E7A9E":C.t,textDecoration:checked?"line-through":"none"}}>{item}</span>
        <div style={{display:"flex",gap:5,marginLeft:8}} onClick={e=>e.stopPropagation()}>
          {mine.length>0&&<button onClick={()=>setExp(!exp)} style={{...S.btn("sm"),background:"rgba(59,130,246,0.18)",color:C.accent}}>📎{mine.length}</button>}
          <button onClick={()=>fRef.current?.click()} style={{...S.btn("sm"),background:"rgba(59,130,246,0.1)",color:C.accent}} title="Upload report/image">
            {busy?<span className="sp"/>:"📁"}
          </button>
          <button onClick={()=>cRef.current?.click()} style={{...S.btn("sm"),background:"rgba(20,184,166,0.1)",color:C.teal}} title="Take photo">📷</button>
          <input ref={fRef} type="file" accept="image/*,application/pdf" style={{display:"none"}} onChange={e=>{handle(e.target.files[0]);e.target.value="";}}/>
          <input ref={cRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={e=>{handle(e.target.files[0]);e.target.value="";}}/>
        </div>
      </div>
      {exp&&mine.length>0&&(
        <div style={{marginLeft:28,marginBottom:6,display:"flex",flexWrap:"wrap",gap:8}}>
          {mine.map((ph,pi)=>(
            <div key={pi}>
              {(ph.url.startsWith('data:image')||ph.url.startsWith('http'))
                ?<img src={ph.url} alt={ph.name} style={{width:78,height:78,objectFit:"cover",borderRadius:8,border:`1px solid ${C.b}`,cursor:"pointer"}} onClick={()=>window.open(ph.url,'_blank')}/>
                :<a href={ph.url} target="_blank" rel="noreferrer" style={{display:"flex",gap:5,alignItems:"center",padding:"5px 10px",background:C.card,borderRadius:8,border:`1px solid ${C.b}`,color:C.accent,fontSize:11,textDecoration:"none"}}>📄 {ph.name}</a>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════
// PROTOCOL PANEL (with all 8 sections)
// ═══════════════════════════════════════════
function ProtPanel({diagnosis,patId,protos}){
  const proto=protos[diagnosis];
  const [chks,setChks]=useState(()=>DB.getChks(patId));
  const [photos,setPhotos]=useState(()=>DB.getPhotos(patId));
  const [open,setOpen]=useState("investigations");

  useEffect(()=>DB.setChks(patId,chks),[chks,patId]);
  useEffect(()=>DB.setPhotos(patId,photos),[photos,patId]);

  if(!proto) return(
    <div style={{...S.card,textAlign:"center",padding:48,color:C.sub}}>
      <div style={{fontSize:36}}>🔬</div><Sp/>
      <div>No protocol for this diagnosis. Add one via Protocol Manager.</div>
    </div>
  );

  const tog=(key)=>setChks(p=>({...p,[key]:!p[key]}));
  const addPhoto=(key,ph)=>setPhotos(p=>({...p,[key]:[...(p[key]||[]),ph]}));
  const allInvDone=(proto.investigations||[]).every((_,i)=>chks['inv_'+i]);

  const Sec=({k,icon,title,items,isInv})=>{
    const done=(items||[]).filter((_,i)=>chks[`${k}_${i}`]||chks[`inv_${i}`]).length;
    const total=(items||[]).length;
    const isOpen=open===k;
    return(
      <div style={{marginBottom:10}}>
        <div style={S.sh} onClick={()=>setOpen(isOpen?null:k)}>
          <span style={{fontSize:16}}>{icon}</span>
          <span style={{fontWeight:700,color:C.t,flex:1}}>{title}</span>
          {total>0&&<span style={{fontSize:11,color:done===total&&total>0?"#22C55E":C.sub,fontWeight:600}}>{isInv?`${(proto.investigations||[]).filter((_,i)=>chks['inv_'+i]).length}/${total}`:''}</span>}
          <span style={{color:C.mu,marginLeft:8,fontSize:12}}>{isOpen?"▲":"▼"}</span>
        </div>
        {isOpen&&(items||[]).map((item,i)=>{
          const key=isInv?'inv_'+i:`${k}_${i}`;
          return isInv
            ?<InvRow key={i} item={item} idx={i} patId={patId} checked={!!chks['inv_'+i]} onChk={tog} photos={photos} onAddPhoto={addPhoto}/>
            :<div key={i} style={S.chkrow(!!chks[key])} onClick={()=>tog(key)}>
              <CB chk={!!chks[key]} on={()=>tog(key)}/>
              <span style={{fontSize:13,color:chks[key]?"#5E7A9E":C.t,textDecoration:chks[key]?"line-through":"none"}}>{item}</span>
            </div>;
        })}
      </div>
    );
  };

  return(
    <div>
      <div style={{...S.card,background:`linear-gradient(135deg,${proto.color}12,${C.card})`,borderLeft:`4px solid ${proto.color}`,marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{fontSize:11,color:proto.color,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:4}}>🤖 Protocol Auto-Loaded</div>
            <div style={{fontSize:16,fontWeight:800,color:C.t}}>{diagnosis}</div>
            <div style={{fontSize:12,color:C.sub,marginTop:3}}>GMC — Dept. of Plastic & Reconstructive Surgery</div>
          </div>
          <span style={{padding:"2px 9px",borderRadius:4,fontSize:11,fontWeight:600,background:`${proto.color}18`,color:proto.color,border:`1px solid ${proto.color}25`}}>{proto.category}</span>
        </div>
        {allInvDone&&<div style={{marginTop:10,padding:"6px 12px",background:"rgba(34,197,94,0.1)",borderRadius:8,color:"#22C55E",fontSize:12,fontWeight:600}}>✅ All investigations checked — patient may be added to OT queue</div>}
      </div>
      <Sec k="investigations" icon="🧪" title="Pre-Op Investigations" items={proto.investigations} isInv={true}/>
      <Sec k="preop" icon="✅" title="Pre-Op Checklist (PAC)" items={proto.preop_checklist}/>
      <Sec k="preop_orders" icon="📝" title="Pre-Op Orders" items={proto.preop_orders}/>
      <Sec k="special_consent" icon="⚖️" title="Special Consent" items={proto.special_consent}/>
      <Sec k="materials" icon="🛒" title="Materials & Equipment" items={proto.materials}/>
      <Sec k="intraop" icon="🔪" title="Intra-Op Requirements" items={proto.intraop}/>
      <Sec k="postop" icon="💊" title="Post-Op Orders" items={proto.postop}/>
      <Sec k="references" icon="📚" title="Key References" items={proto.references}/>
    </div>
  );
}

            <div style={{fontSize:13,color:proto?.color||C.accent,fontWeight:600,marginTop:2}}>{patient.diagnosis}</div>
          </div>
          <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>

        <div style={{display:"flex",gap:4,marginBottom:14,borderBottom:`1px solid ${C.b}`,paddingBottom:8,flexWrap:"wrap"}}>
          {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"6px 14px",borderRadius:8,border:"none",cursor:"pointer",background:tab===t.id?"#1D4ED8":"transparent",color:tab===t.id?"#fff":C.sub,fontSize:12,fontWeight:600,fontFamily:"inherit"}}>{t.l}</button>)}
        </div>

        {tab==="orders"&&(
          <div>
            <div style={S.card}>
              <div style={{fontSize:12,fontWeight:700,color:C.accent,marginBottom:10,textTransform:"uppercase"}}>Add Order / Note</div>
              <Lbl t="Order By"/>
              <select style={{...S.sel,marginBottom:8}} value={oby} onChange={e=>setOby(e.target.value)}>
                <option>Resident</option><option>Senior/Consultant</option><option>Anaesthesia</option><option>Allied Dept</option><option>Nursing</option>
              </select>
              <textarea style={S.ta} value={otxt} onChange={e=>setOtxt(e.target.value)} placeholder="Write order or clinical note..."/>
              <button onClick={addOrder} style={{...S.btn("p"),marginTop:8}}>Add Order</button>
            </div>
            {orders.length===0?<div style={{...S.card,textAlign:"center",padding:28,color:C.sub}}>No orders yet</div>
              :[...orders].reverse().map(o=>(
              <div key={o.id} style={{...S.card,borderLeft:`3px solid ${o.type==="senior"?"#F59E0B":C.accent}`}}>
                <div style={{fontSize:10,color:C.sub,marginBottom:4}}>{o.type==="senior"?"👨‍⚕️":"💊"} {o.by} · {o.time}</div>
                <div style={{fontSize:13,color:C.t}}>{o.text}</div>
              </div>
            ))}
          </div>
        )}
        {tab==="discharge"&&<DischargeSummary patient={patient} proto={proto}/>}
      </div>
    </div>
    </>
  );
}

function RefForm({protos,onSubmit,onBack}){
  const [f,setF]=useState({name:"",age:"",gender:"Male",ward:"",contact:"",diagnosis:Object.keys(protos)[0],priority:"Semi-Urgent",notes:"",refDept:"",refDoctorName:"",refType:"Reference"});
  const [done,setDone]=useState(false);
  const [busy,setBusy]=useState(false);
  const u=(k,v)=>setF(p=>({...p,[k]:v}));

  const submit=async()=>{
    if(!f.name.trim())return alert("Patient name is required");
    if(!f.refDept.trim())return alert("Referring department is required");
    setBusy(true);
    const id=`REF-${new Date().getFullYear()}-${String(Math.floor(Math.random()*9000)+1000)}`;
    await onSubmit({...f,id,created_at:new Date().toISOString(),admitDate:new Date().toISOString().split("T")[0],status:"Pre-Op Workup",allInvestigationsDone:false,resident:"",referenceId:id});

  if(done) return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{...S.card,maxWidth:460,textAlign:"center",padding:44}}>

  return(
    <div style={{minHeight:"100vh",background:C.bg,padding:"24px 16px"}}>

        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{display:"inline-flex",alignItems:"center",gap:12,padding:"14px 22px",background:C.panel,borderRadius:14,border:`1px solid ${C.b}`,marginBottom:14}}>

            <div>
              <div style={{fontSize:16,fontWeight:800,color:C.t}}>GMC Plastic Surgery</div>
              <div style={{fontSize:12,color:C.sub}}>Inter-Department Reference Form</div>
            </div>
          </div>
          <div style={{fontSize:12,color:C.sub}}>Grant Medical College & Hospital, Mumbai<br/>Dept. of Plastic & Reconstructive Surgery</div>

        <div style={S.card}>
          <div style={{fontSize:12,fontWeight:700,color:C.accent,marginBottom:14,textTransform:"uppercase"}}>Referring Department Details</div>
          <div style={S.g2}>
            <div><Lbl t="Referring Department *"/><input style={S.inp} value={f.refDept} onChange={e=>u("refDept",e.target.value)} placeholder="e.g. ENT, Orthopaedics, Medicine, Neurosurgery"/></div>

        <div style={S.card}>
          <div style={{fontSize:12,fontWeight:700,color:C.accent,marginBottom:14,textTransform:"uppercase"}}>Patient Details</div>
          <div style={S.g2}>

// PROTOCOL MANAGER
// ═══════════════════════════════════════════
function ProtoManager({protos,onSave}){
  const [cat,setCat]=useState("All");
  const [editing,setEditing]=useState(null);
  const [showNew,setShowNew]=useState(false);

  const SectionEditor=({proto,setProto,k,label,icon})=>{
    const [txt,setTxt]=useState("");
    const items=proto[k]||[];
    const add=()=>{if(!txt.trim())return;setProto(p=>({...p,[k]:[...(p[k]||[]),txt.trim()]}));setTxt("");};
    const rm=i=>setProto(p=>({...p,[k]:items.filter((_,j)=>j!==i)}));
    return(
      <div style={{marginBottom:14}}>
        <div style={{fontSize:11,fontWeight:700,color:C.accent,marginBottom:6,textTransform:"uppercase"}}>{icon} {label}</div>
        {items.map((item,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:6,marginBottom:4,background:C.bg,padding:"6px 10px",borderRadius:7,border:`1px solid ${C.b}`}}>
            <span style={{flex:1,fontSize:12,color:C.t}}>{item}</span>
            <button onClick={()=>rm(i)} style={{...S.btn("r"),padding:"2px 7px",fontSize:10}}>✕</button>
          </div>
        ))}
        <div style={{display:"flex",gap:8}}>
          <input style={{...S.inp,flex:1}} value={txt} onChange={e=>setTxt(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()} placeholder="Type item and press Enter"/>
          <button onClick={add} style={S.btn("p")}>+</button>
        </div>
      </div>
    );
  };

  const EditModal=({proto,name,onSv,onClose})=>{
    const [p,setP]=useState({...proto});
    const [n,setN]=useState(name);
    return(
      <div style={S.ovl}>
        <div style={{...S.box(900),maxHeight:"none"}} className="fi">
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}>
            <div style={{fontSize:15,fontWeight:800,color:C.t}}>{name?"Edit Protocol":"New Protocol"}</div>
            <button onClick={onClose} style={S.btn()}>✕</button>
          </div>
          <div style={S.g3}>
            <div><Lbl t="Protocol Name"/><input style={S.inp} value={n} onChange={e=>setN(e.target.value)}/></div>
            <div><Lbl t="Category"/><select style={S.sel} value={p.category||"Custom"} onChange={e=>setP(x=>({...x,category:e.target.value}))}>{PROTO_CATS.filter(c=>c!=="All").map(c=><option key={c}>{c}</option>)}</select></div>
            <div><Lbl t="Colour"/><input type="color" style={{...S.inp,height:40,padding:4}} value={p.color||"#3B82F6"} onChange={e=>setP(x=>({...x,color:e.target.value}))}/></div>
          </div>
          <div style={S.dv}/>
          <div style={{maxHeight:520,overflowY:"auto",paddingRight:6}}>
            <SectionEditor proto={p} setProto={setP} k="investigations" label="Pre-Op Investigations" icon="🧪"/>
            <SectionEditor proto={p} setProto={setP} k="preop_checklist" label="Pre-Op Checklist (PAC)" icon="✅"/>
            <SectionEditor proto={p} setProto={setP} k="preop_orders" label="Pre-Op Orders" icon="📝"/>
            <SectionEditor proto={p} setProto={setP} k="special_consent" label="Special Consent Points" icon="⚖️"/>
            <SectionEditor proto={p} setProto={setP} k="materials" label="Materials & Equipment" icon="🛒"/>
            <SectionEditor proto={p} setProto={setP} k="intraop" label="Intra-Op Requirements" icon="🔪"/>
            <SectionEditor proto={p} setProto={setP} k="postop" label="Post-Op Orders" icon="💊"/>
            <SectionEditor proto={p} setProto={setP} k="references" label="References" icon="📚"/>
          </div>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:14}}>
            <button onClick={onClose} style={S.btn()}>Cancel</button>
            <button onClick={()=>{if(!n.trim())return alert("Protocol name required");onSv(n,p);onClose();}} style={S.btn("g")}>💾 Save Protocol</button>
          </div>
        </div>
      </div>
    );
  };

  const filtered=Object.entries(protos).filter(([,v])=>cat==="All"||v.category===cat);
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}>
        <div>
          <div style={{fontSize:20,fontWeight:800,color:C.t}}>Protocol Manager</div>
          <div style={{fontSize:12,color:C.sub,marginTop:3}}>Changes auto-save and sync across all devices</div>
        </div>
        <button onClick={()=>setShowNew(true)} style={S.btn("p")}>+ New Protocol</button>
      </div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
        {PROTO_CATS.map(c=><button key={c} onClick={()=>setCat(c)} style={{...S.btn(cat===c?"p":""),padding:"3px 12px",fontSize:12}}>{c}</button>)}
      </div>
      <div style={S.g2}>
        {filtered.map(([name,proto])=>(
          <div key={name} style={{...S.card,borderLeft:`4px solid ${proto.color||C.accent}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,color:C.t,fontSize:14,marginBottom:4}}>{name}</div>
                <span style={{padding:"2px 8px",borderRadius:4,fontSize:11,fontWeight:600,background:`${proto.color||C.accent}18`,color:proto.color||C.accent,border:`1px solid ${proto.color||C.accent}25`}}>{proto.category||"General"}</span>
                <div style={{fontSize:11,color:C.sub,marginTop:6}}>
                  {(proto.investigations||[]).length} inv · {(proto.materials||[]).length} materials · {(proto.special_consent||[]).length} consent · {(proto.preop_orders||[]).length} pre-op orders
                </div>
              </div>
              <div style={{display:"flex",gap:5,marginLeft:8}}>
                <button onClick={()=>setEditing(name)} style={{...S.btn("p"),padding:"3px 10px",fontSize:11}}>✏️</button>
                <button onClick={()=>{if(window.confirm(`Delete "${name}"?`)){const u={...protos};delete u[name];onSave(u);}}} style={{...S.btn("r"),padding:"3px 10px",fontSize:11}}>🗑️</button>
              </div>
            </div>
          </div>
        ))}
      </div>
      {editing&&<EditModal proto={protos[editing]} name={editing} onSv={(n,p)=>{const u={...protos};if(n!==editing)delete u[editing];u[n]=p;onSave(u);setEditing(null);}} onClose={()=>setEditing(null)}/>}
      {showNew&&<EditModal proto={{name:"",category:"Custom",color:"#3B82F6",investigations:[],preop_checklist:[],preop_orders:[],special_consent:[],materials:[],intraop:[],postop:[],references:[]}} name="" onSv={(n,p)=>{if(!n.trim())return;onSave({...protos,[n]:p});setShowNew(false);}} onClose={()=>setShowNew(false)}/>}
    </div>
  );
}

);

CREATE TABLE protocols (
  name text primary key,
  data jsonb
);

ALTER TABLE patients ENABLE ROW LEVEL SECURITY;
ALTER TABLE protocols ENABLE ROW LEVEL SECURITY;

CREATE POLICY "open" ON patients
  FOR ALL USING (true) WITH CHECK (true);
CREATE POLICY "open" ON protocols
  FOR ALL USING (true) WITH CHECK (true);`;

  const steps=[
    ["1 · Create Free Account","Go to supabase.com → Start your project → Sign up (GitHub or email)"],

    ["4 · Create Storage Bucket","Storage (left panel) → New bucket → Name: patient-photos → Set to PUBLIC → Create"],
    ["5 · Get Your Keys","Settings (gear icon) → API → Copy: (1) Project URL (2) anon/public key"],
    ["6 · Paste Keys in HTML","Open index.html in Notepad → Find line: const SURL='https://puwvywwysdbgyhcypocc.supabase.co' → Replace both values → Save → Upload to GitHub → Auto-deploys in 2 min"],
  ];

  return(
    <div style={S.ovl}>
      <div style={S.box(700)} className="fi">
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:14}}>
          <div style={{fontSize:15,fontWeight:800,color:C.t}}>🗄️ Connect Supabase Backend</div>
          <button onClick={onClose} style={S.btn()}>✕</button>
        </div>
        <div style={{padding:"9px 14px",background:"rgba(245,158,11,0.1)",borderRadius:8,border:`1px solid ${C.warn}30`,fontSize:12,color:"#F59E0B",marginBottom:14}}>
          Currently running OFFLINE — data stored only in this browser. Follow these 6 steps to sync across ALL devices in real-time.

        {steps.map(([t,d],i)=>(
          <div key={i} style={{display:"flex",gap:12,marginBottom:10,padding:"10px 14px",background:C.bg,borderRadius:10,border:`1px solid ${C.b}`}}>
            <div style={{width:26,height:26,borderRadius:"50%",background:`linear-gradient(135deg,#1D4ED8,${C.accent})`,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:12,flexShrink:0}}>{i+1}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:700,color:C.t,marginBottom:3}}>{t}</div>
              <div style={{fontSize:12,color:C.sub}}>{d}</div>
              {i===2&&<textarea readOnly value={SQL} style={{...S.ta,marginTop:8,fontSize:11,fontFamily:"monospace",minHeight:160,color:"#86EFAC",background:"#0A1628"}}/>}
            </div>
          </div>
        ))}
        <div style={{padding:"9px 14px",background:"rgba(34,197,94,0.1)",borderRadius:8,border:"1px solid #22C55E30",fontSize:12,color:"#22C55E",marginBottom:14}}>
          ✅ Once connected: all patients, protocols, and photos sync instantly across every device. Data is never lost even if browser cache is cleared.
        </div>
        <div style={{display:"flex",justifyContent:"flex-end"}}><button onClick={onClose} style={S.btn("p")}>Got it!</button></div>
      </div>
    </div>
  );
}

// PATIENT CARD
// ═══════════════════════════════════════════
function PatCard({patient,onClick,onDel,protos}){
  const pr=PRIO[patient.priority];
  const proto=protos[patient.diagnosis];
  return(
    <div onClick={()=>onClick(patient)} style={{...S.card,cursor:"pointer",borderLeft:`4px solid ${pr.c}`,transition:"border-color 0.2s"}} className="fi">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div style={{flex:1}}>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:4}}>
            <span style={{fontSize:15,fontWeight:800,color:C.t}}>{patient.name}</span>
            <span style={S.bdg(patient.priority)}>{pr.i} {patient.priority}</span>
            {patient.allInvestigationsDone&&<span style={S.pil("#22C55E")}>✓ Cleared</span>}
            {patient.refType==="Reference"&&<span style={S.pil("#A855F7")}>📨 Ref</span>}
          </div>
          <div style={{fontSize:11,color:C.sub,marginBottom:4}}>{patient.age}y/{patient.gender} · {patient.ward} · <span style={{color:C.mu}}>{patient.id}</span></div>
          <div style={{fontSize:13,color:proto?.color||C.accent,fontWeight:600}}>{patient.diagnosis}</div>
        </div>
        <div style={{textAlign:"right",marginLeft:10,flexShrink:0}}>
          <div style={S.pil(patient.status==="Cleared for OT"?"#22C55E":patient.status==="Post-Op"?"#3B82F6":C.warn)}>{patient.status}</div>
          <div style={{fontSize:11,color:C.sub,marginTop:4}}>Dr. {patient.resident||"—"}</div>
          <div style={{fontSize:11,color:C.mu}}>{patient.admitDate}</div>
          <button onClick={e=>{e.stopPropagation();if(window.confirm("Delete this patient?"))onDel(patient.id);}} style={{...S.btn("r"),padding:"2px 8px",fontSize:10,marginTop:4}}>Delete</button>
        </div>
      </div>
      {patient.notes&&<div style={{marginTop:7,fontSize:11,color:C.mu,borderTop:`1px solid ${C.b}`,paddingTop:6}}>{patient.notes.slice(0,100)}{patient.notes.length>100?"...":""}</div>}
      {patient.refType==="Reference"&&patient.refDept&&<div style={{marginTop:6,fontSize:11,color:"#A855F7",fontWeight:600}}>📨 From: {patient.refDept} — Dr. {patient.refDoctorName||"—"}</div>}
    </div>
  );
}

// ═══════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════
function App(){
  const [view,setView]=useState("dashboard");
  const [pts,setPts]=useState([]);
  const [protos,setProtos]=useState(DP);
  const [loading,setLoading]=useState(true);
  const [sel,setSel]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const [showSupa,setShowSupa]=useState(false);
  const [search,setSearch]=useState("");
  const [wf,setWf]=useState("All");
  const [pf,setPf]=useState("All");

  // ── Reference form detection ──────────────
  // Works via URL hash: yourapp.vercel.app/#refer
  const isRef=window.location.hash==="#refer";

  useEffect(()=>{
    (async()=>{
      const[p,pr]=await Promise.all([DB.getPts(),DB.getProtos()]);
      setPts(p);setProtos(pr);setLoading(false);
    })();
  },[]);

  const addPt=async p=>{await DB.savePt(p);setPts(prev=>[p,...prev.filter(x=>x.id!==p.id)]);};
  const updPt=async p=>{await DB.savePt(p);setPts(prev=>prev.map(x=>x.id===p.id?p:x));};
  const delPt=async id=>{await DB.delPt(id);setPts(prev=>prev.filter(x=>x.id!==id));};
  const saveProtos=async pr=>{setProtos(pr);await DB.saveProtos(pr);};

  // Public reference form — no sidebar needed
  if(isRef) return(
    <RefForm
      protos={protos}
      onSubmit={async p=>{await addPt(p);}}
      onBack={()=>{window.location.hash="";window.location.reload();}}
    />
  );

  if(loading) return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column",gap:14}}>
      <div className="sp" style={{width:38,height:38,border:"3px solid #1E3A5F",borderTopColor:C.accent,borderRadius:"50%"}}></div>
      <div style={{color:C.sub,fontSize:14}}>Loading GMC Plastics v4...</div>
    </div>
  );

  const filt=pts.filter(p=>{
    const s=search.toLowerCase();
    return(!s||p.name.toLowerCase().includes(s)||p.id.toLowerCase().includes(s)||p.diagnosis.toLowerCase().includes(s)||(p.resident||"").toLowerCase().includes(s))
      &&(wf==="All"||p.ward===wf)
      &&(pf==="All"||p.priority===pf);
  });
  const wardPts=filt.filter(p=>p.refType!=="Reference");
  const refPts=filt.filter(p=>p.refType==="Reference");
  const qPts=pts.filter(p=>p.allInvestigationsDone||LS.g('q_'+p.id,false));

  // Share URL for reference form
  const shareUrl=`${window.location.href.split('#')[0]}#refer`;

  const NAV=[
    {id:"dashboard",icon:"🏠",label:"Dashboard"},
    {id:"ward",icon:"🛏️",label:"Ward Patients",cnt:pts.filter(p=>p.refType!=="Reference").length},
    {id:"references",icon:"📨",label:"References",cnt:refPts.length},
    {id:"otqueue",icon:"🏥",label:"OT Queue",cnt:qPts.length},
    {id:"protocols",icon:"📋",label:"Protocol Manager"},
  ];

  const SC=({value,label,color,icon})=>(
    <div style={{background:C.card,border:`1px solid ${C.b}`,borderRadius:12,padding:16,borderTop:`3px solid ${color}`}}>
      <div style={{fontSize:26,fontWeight:800,color:C.t}}>{value}</div>
      <div style={{fontSize:11,color:C.sub,marginTop:4,textTransform:"uppercase"}}>{icon} {label}</div>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex"}}>

      {/* ── SIDEBAR ── */}
      <div style={{width:234,minHeight:"100vh",background:C.panel,borderRight:`1px solid ${C.b}`,position:"fixed",top:0,left:0,display:"flex",flexDirection:"column",zIndex:100}}>
        <div style={{padding:"18px",borderBottom:`1px solid ${C.b}`}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
            <div style={{width:36,height:36,borderRadius:10,background:`linear-gradient(135deg,#1D4ED8,${C.accent})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🏥</div>
            <div>
              <div style={{fontSize:14,fontWeight:800,color:C.t}}>GMC Plastics</div>
              <div style={{fontSize:10,color:C.sub,textTransform:"uppercase",letterSpacing:"0.8px"}}>Patient Management v4</div>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer"}} onClick={()=>!SB&&setShowSupa(true)}>
            <div style={{width:7,height:7,borderRadius:"50%",background:SB?"#22C55E":"#F59E0B",boxShadow:SB?"0 0 6px #22C55E":"0 0 6px #F59E0B"}}></div>
            <span style={{fontSize:10,color:SB?"#22C55E":"#F59E0B"}}>{SB?"Cloud Sync Active":"Offline — tap to connect DB"}</span>
          </div>
        </div>
        <div style={{padding:"10px 0",flex:1,overflowY:"auto"}}>
          {NAV.map(item=>(
            <div key={item.id} style={S.nav(view===item.id)} onClick={()=>setView(item.id)}>
              <span style={{fontSize:16}}>{item.icon}</span>
              <span style={{flex:1}}>{item.label}</span>
              {item.cnt!==undefined&&<span style={{background:view===item.id?C.accent:C.card,color:"#fff",borderRadius:10,padding:"1px 8px",fontSize:11,fontWeight:700,border:`1px solid ${C.b}`}}>{item.cnt}</span>}
            </div>
          ))}
        </div>
        <div style={{padding:"12px 18px",borderTop:`1px solid ${C.b}`}}>
          <div style={{fontSize:11,color:C.mu}}>Grant Medical College, Mumbai</div>
          <div style={{fontSize:11,color:C.mu}}>Dept. of Plastic & Reconstructive Surgery</div>
          <div style={{fontSize:11,color:C.accent,marginTop:4,fontWeight:600,cursor:"pointer"}} onClick={()=>setShowSupa(true)}>⚙️ Database Setup</div>
        </div>
      </div>

      {/* ── MAIN CONTENT ── */}
      <div style={{marginLeft:234,flex:1,padding:"20px 24px",minHeight:"100vh"}}>

        {/* Topbar */}
        <div style={{display:"flex",gap:9,marginBottom:18,alignItems:"center",flexWrap:"wrap"}}>
          <input style={{...S.inp,maxWidth:280,flex:1}} placeholder="🔍 Search name, ID, diagnosis..." value={search} onChange={e=>setSearch(e.target.value)}/>
          <select style={{...S.sel,width:160}} value={wf} onChange={e=>setWf(e.target.value)}>
            <option value="All">All Wards</option>
            {WARDS.map(w=><option key={w}>{w}</option>)}
          </select>
          <select style={{...S.sel,width:145}} value={pf} onChange={e=>setPf(e.target.value)}>
            <option value="All">All Priorities</option>
            {Object.keys(PRIO).map(p=><option key={p}>{p}</option>)}
          </select>
          <button onClick={()=>setShowAdd(true)} style={S.btn("p")}>➕ New Patient</button>
        </div>

        {/* ── DASHBOARD ── */}
        {view==="dashboard"&&(
          <div>
            <div style={{fontSize:21,fontWeight:800,color:C.t,marginBottom:3}}>Dashboard</div>
            <div style={{fontSize:12,color:C.sub,marginBottom:20}}>Dept. of Plastic & Reconstructive Surgery · Grant Medical College & Hospital, Mumbai</div>
            <div style={{...S.g3,marginBottom:20}}>
              <SC value={pts.length} label="Total Patients" color={C.accent} icon="🛏️"/>
              <SC value={pts.filter(p=>p.priority==="Emergency").length} label="Emergency" color="#EF4444" icon="🚨"/>
              <SC value={pts.filter(p=>p.priority==="Urgent").length} label="Urgent" color="#FF7043" icon="⚡"/>
              <SC value={qPts.length} label="Cleared for OT" color="#22C55E" icon="✅"/>
              <SC value={refPts.length} label="References" color="#A855F7" icon="📨"/>
              <SC value={Object.keys(protos).length} label="Protocols" color={C.teal} icon="📋"/>
            </div>
            <div style={S.g2}>
              <div style={S.card}>
                <div style={{fontSize:12,fontWeight:700,color:C.accent,marginBottom:12,textTransform:"uppercase"}}>Recent Patients</div>
                {pts.slice(0,6).map(p=>(
                  <div key={p.id} onClick={()=>setSel(p)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:`1px solid ${C.b}`,cursor:"pointer"}}>
                    <div><span style={{fontWeight:600,color:C.t}}>{p.name}</span><span style={{fontSize:11,color:C.sub,marginLeft:8}}>{p.diagnosis.split(" ")[0]}</span></div>
                    <span style={S.bdg(p.priority)}>{p.priority}</span>
                  </div>
                ))}
                {pts.length===0&&<div style={{color:C.sub,fontSize:12,textAlign:"center",padding:20}}>No patients yet — click + New Patient</div>}
              </div>
              <div style={S.card}>
                <div style={{fontSize:12,fontWeight:700,color:C.accent,marginBottom:10,textTransform:"uppercase"}}>📤 Reference Link (for Other Departments)</div>
                <div style={{fontSize:12,color:C.sub,marginBottom:10,lineHeight:1.5}}>Share this link with ENT, Ortho, Medicine etc. They fill the form — patient appears here automatically.</div>
                <div style={{display:"flex",gap:8,marginBottom:10}}>
                  <input style={{...S.inp,flex:1,fontSize:11}} readOnly value={shareUrl}/>
                  <button onClick={()=>{navigator.clipboard?.writeText(shareUrl).then(()=>alert("✅ Link copied! Paste and send to other departments."));}} style={S.btn("p")}>Copy</button>
                </div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  <button onClick={()=>window.open(shareUrl,"_blank")} style={{...S.btn(),fontSize:12}}>🔗 Preview Form</button>
                  <button onClick={()=>{const msg="GMC Plastic Surgery Reference Form:\n"+shareUrl;window.open("https://wa.me/?text="+encodeURIComponent(msg),"_blank");}} style={{...S.btn(),background:"#25D366",fontSize:12}}>📲 WhatsApp</button>
                </div>
                <div style={S.dv}/>
                <div style={{fontSize:12,fontWeight:700,color:C.accent,marginBottom:8,textTransform:"uppercase"}}>Quick Actions</div>
                {[{i:"➕",l:"Add New Patient",f:()=>setShowAdd(true)},{i:"📋",l:"Protocol Manager",f:()=>setView("protocols")},{i:"🗄️",l:"Setup Cloud DB (Supabase)",f:()=>setShowSupa(true)},{i:"🏥",l:"View OT Queue",f:()=>setView("otqueue")}].map((a,idx)=>(
                  <div key={idx} onClick={a.f} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 12px",borderRadius:8,cursor:"pointer",border:`1px solid ${C.b}`,marginBottom:5,background:C.bg}}>
                    <span style={{fontSize:15}}>{a.i}</span>
                    <span style={{fontSize:13,fontWeight:600,color:C.t,flex:1}}>{a.l}</span>
                    <span style={{color:C.mu}}>→</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* ── WARD ── */}
        {view==="ward"&&(
          <div>
            <div style={{fontSize:21,fontWeight:800,color:C.t,marginBottom:3}}>Ward Patients</div>
            <div style={{fontSize:12,color:C.sub,marginBottom:18}}>{wardPts.length} patient(s) · Click a card to open</div>
            {wardPts.length===0
              ?<div style={{...S.card,textAlign:"center",padding:60,color:C.sub}}><div style={{fontSize:44}}>🛏️</div><Sp h={12}/>No patients yet — click + New Patient</div>
              :wardPts.map(p=><PatCard key={p.id} patient={p} onClick={setSel} onDel={delPt} protos={protos}/>)}
          </div>
        )}

        {/* ── REFERENCES ── */}
        {view==="references"&&(
          <div>
            <div style={{fontSize:21,fontWeight:800,color:C.t,marginBottom:3}}>Inter-Department References</div>
            <div style={{fontSize:12,color:C.sub,marginBottom:18}}>Patients referred from other departments</div>
            <div style={{...S.card,background:`linear-gradient(135deg,${C.accent}08,${C.card})`,borderTop:`3px solid ${C.accent}`,marginBottom:18}}>
              <div style={{fontSize:12,fontWeight:700,color:C.accent,marginBottom:8,textTransform:"uppercase"}}>📤 Shareable Reference Link</div>
              <div style={{fontSize:12,color:C.sub,marginBottom:12,lineHeight:1.6}}>
                Send this link to any department. They open it on any device (phone/laptop), fill in the patient details, and click submit — the patient appears here automatically. No login needed for the referring dept.
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                <input style={{...S.inp,flex:1,minWidth:200,fontSize:11}} readOnly value={shareUrl}/>
                <button onClick={()=>{navigator.clipboard?.writeText(shareUrl).then(()=>alert("✅ Copied! Paste in WhatsApp or email to other depts."));}} style={S.btn("p")}>📋 Copy Link</button>
                <button onClick={()=>window.open(shareUrl,"_blank")} style={S.btn()}>🔗 Preview</button>
                <button onClick={()=>{const msg="GMC Plastic Surgery Reference Form:\n"+shareUrl;window.open("https://wa.me/?text="+encodeURIComponent(msg),"_blank");}} style={{...S.btn(),background:"#25D366"}}>📲 WhatsApp</button>
              </div>
            </div>
            {refPts.length===0
              ?<div style={{...S.card,textAlign:"center",padding:40,color:C.sub}}><div style={{fontSize:36}}>📩</div><Sp h={10}/>No references yet — share the link above with other departments</div>
              :refPts.map(p=><PatCard key={p.id} patient={p} onClick={setSel} onDel={delPt} protos={protos}/>)}
          </div>
        )}

        {/* ── OT QUEUE ── */}
        {view==="otqueue"&&(
          <div>
            <div style={{fontSize:21,fontWeight:800,color:C.t,marginBottom:3}}>OT Queue</div>
            <div style={{fontSize:12,color:C.sub,marginBottom:18}}>Auto-sorted: Emergency → Urgent → Semi-Urgent → Elective</div>
            {qPts.length===0
              ?<div style={{...S.card,textAlign:"center",padding:60,color:C.sub}}><div style={{fontSize:44}}>🏥</div><Sp h={12}/>No patients in queue yet</div>
              :[...qPts].sort((a,b)=>["Emergency","Urgent","Semi-Urgent","Elective"].indexOf(a.priority)-["Emergency","Urgent","Semi-Urgent","Elective"].indexOf(b.priority)).map((p,i)=>{
                const pr=PRIO[p.priority];
                return(
                  <div key={p.id} onClick={()=>setSel(p)} style={{...S.card,borderLeft:`4px solid ${pr.c}`,cursor:"pointer"}} className="fi">
                    <div style={{display:"flex",alignItems:"center",gap:14}}>
                      <div style={{width:36,height:36,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:15,background:`${pr.c}18`,color:pr.c,flexShrink:0}}>{i+1}</div>
                      <div style={{flex:1}}>
                        <div style={{fontWeight:700,color:C.t}}>{p.name} <span style={S.bdg(p.priority)}>{pr.i} {p.priority}</span></div>
                        <div style={{fontSize:11,color:C.sub,marginTop:2}}>{p.diagnosis} · {p.ward} · Dr. {p.resident||"—"}</div>
                      </div>
                    </div>
                  </div>
                );
              })}
          </div>
        )}

        {view==="protocols"&&<ProtoManager protos={protos} onSave={saveProtos}/>}
      </div>

      {/* ── MODALS ── */}
      {showAdd&&<PatForm onSave={async p=>{await addPt(p);setShowAdd(false);setView("ward");}} onClose={()=>setShowAdd(false)} protos={protos}/>}
      {sel&&<PatDetail patient={sel} onClose={()=>setSel(null)} onUpdate={async p=>{await updPt(p);setSel(p);}} protos={protos}/>}
      {showSupa&&<SupaGuide onClose={()=>setShowSupa(false)}/>}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
