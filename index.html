const STORAGE_KEYS = { patients: "gmc_patients_v3", protocols: "gmc_protocols_v3", orders: "gmc_orders_v3", photos: "gmc_photos_meta_v3" };

function loadData(key, fallback) {
  try { const d = localStorage.getItem(key); return d ? JSON.parse(d) : fallback; }
  catch { return fallback; }
}
function saveData(key, data) {
  try { localStorage.setItem(key, JSON.stringify(data)); } catch {}
}

function Checkbox({ checked, onChange }) {
  return (
    <div onClick={onChange} style={{ width:18,height:18,borderRadius:5,border:`2px solid ${checked?"#22C55E":C.muted}`,background:checked?"#22C55E":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1,cursor:"pointer" }}>
      {checked && <span style={{ color:"#fff",fontSize:11,fontWeight:700 }}>✓</span>}

}

function Tag({ label, color = C.accent }) {
  return <span style={{ display:"inline-block",padding:"2px 8px",borderRadius:4,fontSize:11,fontWeight:600,background:`${color}18`,color,border:`1px solid ${color}25`,marginRight:4,marginBottom:3 }}>{label}</span>;

// ══════════════════════════════════════════════════════════════
// PROTOCOL PANEL (checklist-based)
// ══════════════════════════════════════════════════════════════
function ProtocolPanel({ diagnosis, patientId }) {
  const storageKey = `checks_${patientId}_${diagnosis}`;
  const [checks, setChecks] = useState(() => loadData(storageKey, {}));
  const [open, setOpen] = useState("investigations");
  const protocols = loadData(STORAGE_KEYS.protocols, DEFAULT_PROTOCOLS);
  const protocol = protocols[diagnosis];

  useEffect(() => { saveData(storageKey, checks); }, [checks, storageKey]);

  if (!protocol) return (
    <div style={{ ...S.card, textAlign:"center", padding:40, color:C.sub }}>
      <div style={{ fontSize:36,marginBottom:10 }}>🔬</div>
      No protocol found for this diagnosis. You can add it in Protocol Manager.
    </div>
  );

  const toggle = (sec, i) => setChecks(p => ({ ...p, [`${sec}-${i}`]: !p[`${sec}-${i}`] }));

  const sections = [
    { key:"investigations", icon:"🧪", title:"Pre-Op Investigations", items:protocol.investigations || [] },
    { key:"preop", icon:"✅", title:"Pre-Op Checklist (PAC)", items:protocol.preop_checklist || [] },
    { key:"intraop", icon:"🔪", title:"Intra-Op Requirements", items:protocol.intraop || [] },
    { key:"postop", icon:"💊", title:"Post-Op Orders", items:protocol.postop || [] },
    { key:"references", icon:"📚", title:"Key References", items:protocol.references || [] },
  ];

  const allInvestigationsDone = (protocol.investigations || []).every((_,i) => checks[`investigations-${i}`]);

  return (
    <div>
      <div style={{ ...S.card, background:`linear-gradient(135deg,${protocol.color}15,${C.card})`, borderLeft:`4px solid ${protocol.color}`, marginBottom:16 }}>
        <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start" }}>
          <div>
            <div style={{ fontSize:11,color:protocol.color,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:4 }}>🤖 Protocol Auto-Loaded</div>
            <div style={{ fontSize:17,fontWeight:800,color:C.text }}>{diagnosis}</div>
            <div style={{ fontSize:12,color:C.sub,marginTop:3 }}>GMC — Dept. of Plastic & Reconstructive Surgery</div>
          </div>
          <Tag label={protocol.category || "General"} color={protocol.color} />
        </div>
        {allInvestigationsDone && (
          <div style={{ marginTop:12,padding:"6px 12px",background:"rgba(34,197,94,0.12)",borderRadius:8,color:"#22C55E",fontSize:12,fontWeight:600,border:"1px solid #22C55E30" }}>
            ✅ All investigations checked — patient may be cleared for OT queue
          </div>
        )}
      </div>
      {sections.map(sec => {
        const done = sec.items.filter((_,i)=>checks[`${sec.key}-${i}`]).length;
        return (
          <div key={sec.key} style={{ marginBottom:10 }}>
            <div style={S.sectionHead} onClick={()=>setOpen(open===sec.key?null:sec.key)}>
              <span style={{ fontSize:17 }}>{sec.icon}</span>
              <span style={{ fontWeight:700,color:C.text,flex:1 }}>{sec.title}</span>
              <span style={{ fontSize:11,color:done===sec.items.length&&sec.items.length>0?"#22C55E":C.sub }}>{done}/{sec.items.length}</span>
              <span style={{ color:C.muted,marginLeft:8,fontSize:12 }}>{open===sec.key?"▲":"▼"}</span>
            </div>
            {open===sec.key && sec.items.map((item,i)=>(
              <div key={i} style={S.checkRow(checks[`${sec.key}-${i}`])} onClick={()=>toggle(sec.key,i)}>
                <Checkbox checked={!!checks[`${sec.key}-${i}`]} onChange={()=>toggle(sec.key,i)} />
                <span style={{ fontSize:13,color:checks[`${sec.key}-${i}`]?"#5E7A9E":C.text,textDecoration:checks[`${sec.key}-${i}`]?"line-through":"none" }}>{item}</span>
              </div>
            ))}
          </div>
        );
      })}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// PROTOCOL MANAGER (full CRUD)
// ══════════════════════════════════════════════════════════════
function ProtocolManager() {
  const [protocols, setProtocols] = useState(() => loadData(STORAGE_KEYS.protocols, DEFAULT_PROTOCOLS));
  const [selected, setSelected] = useState(null);
  const [editing, setEditing] = useState(null);
  const [showNew, setShowNew] = useState(false);
  const [catFilter, setCatFilter] = useState("All");
  const [newProto, setNewProto] = useState({ name:"",category:"Custom",color:"#3B82F6",investigations:[],preop_checklist:[],intraop:[],postop:[],references:[] });
  const [addItem, setAddItem] = useState({ section:"", text:"" });

  const save = (updated) => { setProtocols(updated); saveData(STORAGE_KEYS.protocols, updated); };

  const filtered = Object.entries(protocols).filter(([,v])=>catFilter==="All"||v.category===catFilter);

  const SectionEditor = ({ proto, setProto, sectionKey, label, icon }) => {
    const [txt, setTxt] = useState("");
    const items = proto[sectionKey] || [];
    const add = () => { if(!txt.trim()) return; setProto(p=>({...p,[sectionKey]:[...items,txt.trim()]})); setTxt(""); };
    const remove = (i) => setProto(p=>({...p,[sectionKey]:items.filter((_,j)=>j!==i)}));
    const moveUp = (i) => { if(i===0) return; const a=[...items]; [a[i-1],a[i]]=[a[i],a[i-1]]; setProto(p=>({...p,[sectionKey]:a})); };
    return (
      <div style={{ marginBottom:16 }}>
        <div style={{ fontSize:12,fontWeight:700,color:C.accent,marginBottom:8,textTransform:"uppercase",letterSpacing:"0.6px" }}>{icon} {label}</div>
        {items.map((item,i)=>(
          <div key={i} style={{ display:"flex",alignItems:"center",gap:6,marginBottom:5,background:C.bg,padding:"7px 10px",borderRadius:7,border:`1px solid ${C.border}` }}>
            <span style={{ flex:1,fontSize:12,color:C.text }}>{item}</span>
            <button onClick={()=>moveUp(i)} style={{ ...S.btn("sm"),padding:"2px 8px",fontSize:11 }}>↑</button>
            <button onClick={()=>remove(i)} style={{ ...S.btn("danger"),padding:"2px 8px",fontSize:11 }}>✕</button>
          </div>
        ))}
        <div style={{ display:"flex",gap:8,marginTop:6 }}>
          <input style={{ ...S.input,flex:1 }} value={txt} onChange={e=>setTxt(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()} placeholder={`Add ${label} item...`} />
          <button onClick={add} style={S.btn("primary")}>+ Add</button>
        </div>
      </div>
    );
  };

  const EditModal = ({ proto, name, onSave, onClose }) => {
    const [p, setP] = useState({ ...proto });
    const [n, setN] = useState(name);
    return (
      <div style={S.modal}>
        <div style={S.modalBox(860)}>
          <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20 }}>
            <div style={{ fontSize:18,fontWeight:800,color:C.text }}>{name?"Edit Protocol":"New Protocol"}</div>
            <button onClick={onClose} style={S.btn("secondary")}>✕ Close</button>
          </div>
          <div style={S.grid3}>
            <div><label style={S.label}>Protocol Name</label><input style={S.input} value={n} onChange={e=>setN(e.target.value)} /></div>
            <div><label style={S.label}>Category</label>
              <select style={S.select} value={p.category} onChange={e=>setP(x=>({...x,category:e.target.value}))}>
                {CATEGORIES.filter(c=>c!=="All").map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
            <div><label style={S.label}>Colour Tag</label><input type="color" style={{ ...S.input,height:40,padding:4 }} value={p.color||"#3B82F6"} onChange={e=>setP(x=>({...x,color:e.target.value}))} /></div>
          </div>
          <div style={S.divider} />
          <div style={{ maxHeight:500,overflowY:"auto",paddingRight:8 }}>
            <SectionEditor proto={p} setProto={setP} sectionKey="investigations" label="Investigations" icon="🧪" />
            <SectionEditor proto={p} setProto={setP} sectionKey="preop_checklist" label="Pre-Op Checklist" icon="✅" />
            <SectionEditor proto={p} setProto={setP} sectionKey="intraop" label="Intra-Op Requirements" icon="🔪" />
            <SectionEditor proto={p} setProto={setP} sectionKey="postop" label="Post-Op Orders" icon="💊" />
            <SectionEditor proto={p} setProto={setP} sectionKey="references" label="References" icon="📚" />
          </div>
          <div style={{ display:"flex",gap:10,justifyContent:"flex-end",marginTop:16 }}>
            <button onClick={onClose} style={S.btn()}>Cancel</button>
            <button onClick={()=>{ onSave(n,p); onClose(); }} style={S.btn("success")}>💾 Save Protocol</button>
          </div>
        </div>
      </div>
    );
  };

  return (
    <div>
      <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20 }}>
        <div>
          <div style={{ fontSize:22,fontWeight:800,color:C.text }}>Protocol Manager</div>
          <div style={{ fontSize:12,color:C.sub,marginTop:4 }}>All changes persist — add, edit, reorder anytime without data loss</div>
        </div>
        <button onClick={()=>{ setNewProto({name:"",category:"Custom",color:"#3B82F6",investigations:[],preop_checklist:[],intraop:[],postop:[],references:[]}); setShowNew(true); }} style={S.btn("primary")}>+ New Protocol</button>
      </div>
      <div style={{ display:"flex",gap:8,flexWrap:"wrap",marginBottom:20 }}>
        {CATEGORIES.map(c=>(
          <button key={c} onClick={()=>setCatFilter(c)} style={{ ...S.btn(catFilter===c?"primary":"secondary"),padding:"5px 14px",fontSize:12 }}>{c}</button>
        ))}
      </div>
      <div style={S.grid2}>
        {filtered.map(([name,proto])=>(
          <div key={name} style={{ ...S.card,borderLeft:`4px solid ${proto.color||C.accent}`,cursor:"pointer" }}>
            <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start" }}>
              <div style={{ flex:1 }}>
                <div style={{ fontWeight:700,color:C.text,fontSize:14,marginBottom:4 }}>{name}</div>
                <Tag label={proto.category||"General"} color={proto.color||C.accent} />
                <div style={{ fontSize:11,color:C.sub,marginTop:6 }}>
                  {(proto.investigations||[]).length} investigations · {(proto.preop_checklist||[]).length} checklist · {(proto.references||[]).length} refs
                </div>
              </div>
              <div style={{ display:"flex",gap:6 }}>
                <button onClick={()=>setEditing(name)} style={{ ...S.btn("primary"),padding:"4px 12px",fontSize:11 }}>✏️ Edit</button>
                <button onClick={()=>{ if(window.confirm(`Delete "${name}"?`)){const u={...protocols};delete u[name];save(u); }}} style={{ ...S.btn("danger"),padding:"4px 12px",fontSize:11 }}>🗑️</button>
              </div>
            </div>
          </div>
        ))}
      </div>
      {editing && (
        <EditModal proto={protocols[editing]} name={editing}
          onSave={(newName,proto)=>{ const u={...protocols}; if(newName!==editing){delete u[editing];} u[newName]=proto; save(u); setEditing(null); }}
          onClose={()=>setEditing(null)} />
      )}
      {showNew && (
        <EditModal proto={newProto} name=""
          onSave={(name,proto)=>{ if(!name.trim()) return; const u={...protocols,[name]:proto}; save(u); setShowNew(false); }}
          onClose={()=>setShowNew(false)} />
      )}
    </div>
  );
}

          <div><label style={S.label}>Ward / Location</label><select style={S.select} value={f.ward} onChange={e=>upd("ward",e.target.value)}>{WARDS.map(w=><option key={w}>{w}</option>)}</select></div>
          <div><label style={S.label}>Priority</label><select style={S.select} value={f.priority} onChange={e=>upd("priority",e.target.value)}>{Object.keys(PRIORITY_LEVELS).map(p=><option key={p}>{p}</option>)}</select></div>
          <div><label style={S.label}>Reference Type</label><select style={S.select} value={f.refType} onChange={e=>upd("refType",e.target.value)}><option value="Ward">Own Ward Patient</option><option value="Reference">Inter-Dept Reference</option><option value="OPD">OPD / Outpatient</option></select></div>
          <div><label style={S.label}>Resident In-Charge</label><input style={S.input} value={f.resident} onChange={e=>upd("resident",e.target.value)} placeholder="Dr. Mehta" /></div>
          <div style={{ gridColumn:"1/-1" }}><label style={S.label}>Diagnosis / Procedure (Auto-loads Protocol)</label>
            <select style={S.select} value={f.diagnosis} onChange={e=>upd("diagnosis",e.target.value)}>
              {Object.keys(protocols).map(d=><option key={d}>{d}</option>)}
            </select>
          </div>
          <div style={{ gridColumn:"1/-1" }}><label style={S.label}>Status</label><select style={S.select} value={f.status} onChange={e=>upd("status",e.target.value)}>{["Pre-Op Workup","Active Management","Cleared for OT","Post-Op","Discharged"].map(s=><option key={s}>{s}</option>)}</select></div>
          <div style={{ gridColumn:"1/-1" }}><label style={S.label}>Clinical Notes</label><textarea style={S.textarea} value={f.notes} onChange={e=>upd("notes",e.target.value)} placeholder="Brief clinical description, mechanism, relevant history..." /></div>
          <div style={{ gridColumn:"1/-1",display:"flex",alignItems:"center",gap:10 }}>
            <Checkbox checked={f.allInvestigationsDone} onChange={()=>upd("allInvestigationsDone",!f.allInvestigationsDone)} />
            <span style={{ fontSize:13,color:C.text }}>All investigations done — clear for OT queue</span>
          </div>
        </div>
        <div style={{ display:"flex",gap:10,justifyContent:"flex-end",marginTop:20 }}>
          <button onClick={onClose} style={S.btn()}>Cancel</button>
          <button onClick={()=>{
            if(!f.name.trim()) return alert("Patient name required");
            const id = existing?.id || `GMC-${new Date().getFullYear()}-${String(Math.floor(Math.random()*9000)+1000)}`;
            const admitDate = existing?.admitDate || new Date().toISOString().split("T")[0];
            onSave({ ...f, id, admitDate });
          }} style={S.btn("success")}>💾 {existing?"Update":"Add"} Patient</button>
        </div>
      </div>
    </div>
  );
}

// PATIENT DETAIL MODAL
// ══════════════════════════════════════════════════════════════
function PatientDetail({ patient, onClose, onUpdate }) {
  const [tab, setTab] = useState("protocol");
  const [orders, setOrders] = useState(() => loadData(`orders_${patient.id}`, []));
  const [orderText, setOrderText] = useState("");
  const [orderBy, setOrderBy] = useState("Resident");
  const [editing, setEditing] = useState(false);
  const [inQueue, setInQueue] = useState(() => loadData(`queue_${patient.id}`, false));

  useEffect(()=>{ saveData(`orders_${patient.id}`,orders); },[orders,patient.id]);
  useEffect(()=>{ saveData(`queue_${patient.id}`,inQueue); },[inQueue,patient.id]);

  const protocols = loadData(STORAGE_KEYS.protocols, DEFAULT_PROTOCOLS);
  const protocol = protocols[patient.diagnosis];
  const p = PRIORITY_LEVELS[patient.priority];

  const addOrder = () => {
    if(!orderText.trim()) return;
    const o = { id:Date.now(),text:orderText.trim(),by:orderBy,time:new Date().toLocaleString("en-IN"),type:orderBy==="Senior/Consultant"?"senior":"resident" };
    setOrders(prev=>[...prev,o]);
    setOrderText("");
  };

  const TABS = [
    {id:"protocol",label:"📋 Protocol"},
    {id:"photos",label:"📷 Photos & Inv."},
    {id:"orders",label:`📝 Orders (${orders.length})`},
    {id:"postop",label:"💊 Post-Op"},
    {id:"discharge",label:"🏥 Discharge"},
  ];

  const DischargeSummary = () => (
    <div>
      <div style={{ ...S.card,background:`linear-gradient(135deg,${protocol?.color||C.accent}10,${C.card})`,borderTop:`3px solid ${protocol?.color||C.accent}` }}>
        <div style={{ fontSize:12,color:protocol?.color||C.accent,fontWeight:700,marginBottom:12,textTransform:"uppercase",letterSpacing:"0.8px" }}>📄 Discharge Summary — GMC Plastic Surgery</div>
        <div style={S.grid2}>
          {[["Patient Name",patient.name],["IPD No.",patient.id],["Age / Gender",`${patient.age}y / ${patient.gender}`],["Ward",patient.ward],["Date of Admission",patient.admitDate],["Date of Discharge",new Date().toISOString().split("T")[0]],["Diagnosis",patient.diagnosis],["Operating Resident",`Dr. ${patient.resident}`]].map(([k,v])=>(
            <div key={k} style={{ padding:"8px 10px",background:C.bg,borderRadius:8,border:`1px solid ${C.border}` }}>
              <div style={{ fontSize:10,color:C.sub,marginBottom:3,textTransform:"uppercase" }}>{k}</div>
              <div style={{ fontSize:13,color:C.text,fontWeight:500 }}>{v}</div>
            </div>
          ))}
        </div>
      </div>
      <div style={S.card}>
        <div style={{ fontSize:12,fontWeight:700,color:C.accent,marginBottom:12,textTransform:"uppercase" }}>Follow-Up Instructions</div>
        {(protocol?.postop||[]).map((item,i)=>(
          <div key={i} style={{ padding:"7px 0",borderBottom:`1px solid ${C.border}`,fontSize:13,color:C.text }}>{i+1}. {item}</div>
        ))}
        <div style={{ marginTop:14 }}>
          <label style={S.label}>Additional Instructions / Remarks</label>
          <textarea style={S.textarea} placeholder="Review at Plastic Surgery OPD after __ days. Suture removal at __, Return immediately if..." />
        </div>
        <div style={{ display:"flex",gap:10,marginTop:14 }}>
          <button style={S.btn("success")}>⬇️ Download Summary (PDF)</button>
          <button style={S.btn("primary")}>🖨️ Print</button>
        </div>
      </div>
    </div>
  );

  return (
    <>
    {editing && <PatientForm existing={patient} onSave={(updated)=>{ onUpdate(updated); setEditing(false); }} onClose={()=>setEditing(false)} />}
    <div style={S.modal}>
      <div style={{ ...S.modalBox(940),maxHeight:"none" }}>
        {/* Header */}
        <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18 }}>
          <div>
            <div style={{ display:"flex",alignItems:"center",gap:10,flexWrap:"wrap" }}>
              <span style={{ fontSize:20,fontWeight:800,color:C.text }}>{patient.name}</span>
              <span style={S.badge(patient.priority)}>{p.icon} {patient.priority}</span>
              <span style={S.pill(patient.status==="Cleared for OT"?"#22C55E":patient.status==="Post-Op"?"#3B82F6":C.warning)}>{patient.status}</span>
            </div>
            <div style={{ fontSize:12,color:C.sub,marginTop:4 }}>{patient.id} · {patient.age}y / {patient.gender} · {patient.ward}</div>
            <div style={{ fontSize:13,color:protocol?.color||C.accent,marginTop:3,fontWeight:600 }}>{patient.diagnosis}</div>
          </div>
          <div style={{ display:"flex",gap:8,flexWrap:"wrap",justifyContent:"flex-end" }}>
            {patient.allInvestigationsDone && !inQueue && (
              <button onClick={()=>setInQueue(true)} style={S.btn("success")}>➕ Add to OT Queue</button>
            )}
            {inQueue && <span style={S.pill("#22C55E")}>✓ In OT Queue</span>}
            <button onClick={()=>setEditing(true)} style={S.btn("warn")}>✏️ Edit</button>
            <button onClick={onClose} style={S.btn()}>✕ Close</button>
          </div>
        </div>
        {/* Patient Notes */}
        {patient.notes && (
          <div style={{ padding:"8px 12px",background:C.bg,borderRadius:8,border:`1px solid ${C.border}`,marginBottom:14,fontSize:12,color:C.sub }}>
            📝 {patient.notes}
          </div>
        )}
        {/* Tabs */}
        <div style={{ display:"flex",gap:4,marginBottom:18,borderBottom:`1px solid ${C.border}`,paddingBottom:10,flexWrap:"wrap" }}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{ padding:"7px 14px",borderRadius:8,border:"none",cursor:"pointer",background:tab===t.id?"#1D4ED8":"transparent",color:tab===t.id?"#fff":C.sub,fontSize:12,fontWeight:600,fontFamily:"inherit" }}>{t.label}</button>
          ))}
        </div>

        {tab==="protocol" && <ProtocolPanel diagnosis={patient.diagnosis} patientId={patient.id} />}

        {tab==="photos" && (
          <div>
            <div style={S.card}>
              <div style={{ fontSize:12,fontWeight:700,color:C.accent,marginBottom:14,textTransform:"uppercase" }}>📷 Photo Upload</div>
              <div style={{ display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:14 }}>
                {["Pre-Op (Face / Wound)","Investigation (CT / X-Ray / USG)","Intra-Op","Post-Op Day 1","Post-Op Week 1","Follow-Up"].map(label=>(
                  <label key={label} style={{ border:`2px dashed ${C.border}`,borderRadius:10,padding:"22px 12px",textAlign:"center",cursor:"pointer",color:C.sub,display:"block" }}>
                    <div style={{ fontSize:26,marginBottom:6 }}>📎</div>
                    <div style={{ fontSize:11 }}>{label}</div>
                    <input type="file" style={{ display:"none" }} accept="image/*,application/pdf" multiple />
                  </label>
                ))}
              </div>
              <div style={{ fontSize:11,color:C.muted }}>Supports JPG, PNG, PDF, DICOM preview. Max 25MB per file.</div>
            </div>
            <div style={S.card}>
              <div style={{ fontSize:12,fontWeight:700,color:C.accent,marginBottom:12,textTransform:"uppercase" }}>👨‍⚕️ Senior / Consultant Orders on Investigation</div>
              <div style={S.grid2}>
                <div>
                  <label style={S.label}>Order By</label>
                  <select style={S.select} value={orderBy} onChange={e=>setOrderBy(e.target.value)}>
                    <option>Senior/Consultant</option><option>Resident</option><option>Anaesthesia</option><option>Allied Dept</option>
                  </select>
                </div>
              </div>
              <textarea style={{ ...S.textarea,marginTop:10 }} value={orderText} onChange={e=>setOrderText(e.target.value)} placeholder="Enter order / note based on investigation result (e.g., Repeat Hb after transfusion, Post-op CT review, Ophthalmology orders)..." />
              <button onClick={addOrder} style={{ ...S.btn("primary"),marginTop:10 }}>💾 Save Order</button>
              {orders.filter(o=>o.type==="senior").map(o=>(
                <div key={o.id} style={{ marginTop:10,padding:"10px 14px",background:C.bg,borderRadius:8,borderLeft:`3px solid #F59E0B` }}>
                  <div style={{ fontSize:10,color:C.sub,marginBottom:4 }}>👨‍⚕️ {o.by} · {o.time}</div>
                  <div style={{ fontSize:13,color:C.text }}>{o.text}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {tab==="orders" && (
          <div>
            <div style={S.card}>
              <div style={{ fontSize:12,fontWeight:700,color:C.accent,marginBottom:12,textTransform:"uppercase" }}>📋 All Orders & Notes</div>
              <div style={S.grid2}>
                <div><label style={S.label}>Order By</label><select style={S.select} value={orderBy} onChange={e=>setOrderBy(e.target.value)}><option>Resident</option><option>Senior/Consultant</option><option>Anaesthesia</option><option>Allied Dept</option></select></div>
              </div>
              <textarea style={{ ...S.textarea,marginTop:10 }} value={orderText} onChange={e=>setOrderText(e.target.value)} placeholder="Enter order..." />
              <button onClick={addOrder} style={{ ...S.btn("primary"),marginTop:10 }}>Add Order</button>
            </div>
            {orders.length===0 ? (
              <div style={{ ...S.card,textAlign:"center",padding:40,color:C.sub }}>No orders added yet</div>
            ) : [...orders].reverse().map(o=>(
              <div key={o.id} style={{ ...S.card,borderLeft:`3px solid ${o.type==="senior"?"#F59E0B":C.accent}` }}>
                <div style={{ fontSize:10,color:C.sub,marginBottom:5 }}>{o.type==="senior"?"👨‍⚕️":"👨‍💻"} {o.by} · {o.time}</div>
                <div style={{ fontSize:13,color:C.text }}>{o.text}</div>
              </div>
            ))}
          </div>
        )}

        {tab==="postop" && (
          <div>
            <div style={S.card}>
              <div style={{ fontSize:12,fontWeight:700,color:C.accent,marginBottom:12,textTransform:"uppercase" }}>💊 Post-Op Protocol Orders</div>
              {(protocol?.postop||[]).map((item,i)=>(
                <div key={i} style={{ ...S.checkRow(false),marginBottom:8 }}>
                  <span style={{ color:C.accent,fontWeight:700,minWidth:22,fontSize:12 }}>{i+1}.</span>
                  <span style={{ fontSize:13,color:C.text }}>{item}</span>
                </div>
              ))}
              <div style={S.divider} />
              <label style={S.label}>Additional Post-Op Orders</label>
              <textarea style={S.textarea} placeholder="Add specific post-op orders for this patient..." />
              <button style={{ ...S.btn("primary"),marginTop:10 }}>Save Orders</button>
            </div>
          </div>
        )}

        {tab==="discharge" && <DischargeSummary />}
      </div>
    </div>
    </>
  );
}

// PATIENT CARD
// ══════════════════════════════════════════════════════════════
function PatientCard({ patient, onClick, onDelete }) {
  const p = PRIORITY_LEVELS[patient.priority];
  const protocols = loadData(STORAGE_KEYS.protocols, DEFAULT_PROTOCOLS);
  const proto = protocols[patient.diagnosis];
  return (
    <div style={{ ...S.card,cursor:"pointer",borderLeft:`4px solid ${p.color}`,transition:"transform 0.12s" }}
      onClick={()=>onClick(patient)}>
      <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start" }}>
        <div style={{ flex:1 }}>
          <div style={{ display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:5 }}>
            <span style={{ fontSize:15,fontWeight:800,color:C.text }}>{patient.name}</span>
            <span style={S.badge(patient.priority)}>{p.icon} {patient.priority}</span>
            {patient.allInvestigationsDone && <span style={S.pill("#22C55E")}>✓ Cleared</span>}
          </div>
          <div style={{ fontSize:11,color:C.sub,marginBottom:5 }}>{patient.age}y / {patient.gender} · {patient.ward} · <span style={{ color:C.muted }}>{patient.id}</span></div>
          <div style={{ fontSize:13,color:proto?.color||C.accent,fontWeight:600 }}>{patient.diagnosis}</div>
        </div>
        <div style={{ textAlign:"right",marginLeft:12 }}>
          <div style={S.pill(patient.status==="Cleared for OT"?"#22C55E":patient.status==="Post-Op"?"#3B82F6":C.warning)}>{patient.status}</div>
          <div style={{ fontSize:11,color:C.sub,marginTop:5 }}>Dr. {patient.resident}</div>
          <div style={{ fontSize:11,color:C.muted }}>{patient.admitDate}</div>
          <button onClick={e=>{e.stopPropagation();if(window.confirm("Delete patient?"))onDelete(patient.id);}} style={{ ...S.btn("danger"),padding:"3px 10px",fontSize:10,marginTop:6 }}>Delete</button>
        </div>
      </div>
      {patient.notes && (
        <div style={{ marginTop:8,fontSize:11,color:C.muted,borderTop:`1px solid ${C.border}`,paddingTop:7 }}>📝 {patient.notes}</div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// OT QUEUE
// ══════════════════════════════════════════════════════════════
function OTQueue({ patients }) {
  const order = { Emergency:0,Urgent:1,"Semi-Urgent":2,Elective:3 };
  const queue = patients.filter(p=>p.allInvestigationsDone||loadData(`queue_${p.id}`,false))
    .sort((a,b)=>order[a.priority]-order[b.priority]);
  return (
    <div>
      <div style={{ fontSize:22,fontWeight:800,color:C.text,marginBottom:4 }}>OT Queue</div>
      <div style={{ fontSize:12,color:C.sub,marginBottom:22 }}>Sorted by clinical priority — Emergency → Urgent → Semi-Urgent → Elective</div>
      {queue.length===0 ? (
        <div style={{ ...S.card,textAlign:"center",padding:60,color:C.sub }}>
          <div style={{ fontSize:40,marginBottom:10 }}>🏥</div>
          No patients cleared for OT queue yet
        </div>
      ) : queue.map((p,i)=>{
        const pr = PRIORITY_LEVELS[p.priority];
        return (
          <div key={p.id} style={{ ...S.card,borderLeft:`4px solid ${pr.color}` }}>
            <div style={{ display:"flex",alignItems:"center",gap:14 }}>
              <div style={{ width:38,height:38,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:16,background:`${pr.color}18`,color:pr.color,flexShrink:0 }}>{i+1}</div>
              <div style={{ flex:1 }}>
                <div style={{ fontWeight:700,color:C.text,fontSize:14 }}>{p.name} <span style={S.badge(p.priority)}>{pr.icon} {p.priority}</span></div>
                <div style={{ fontSize:11,color:C.sub,marginTop:2 }}>{p.diagnosis} · {p.ward} · {p.id}</div>
              </div>
              <div style={{ textAlign:"right" }}>
                <div style={{ fontSize:12,color:C.sub }}>Dr. {p.resident}</div>
                <div style={{ fontSize:11,color:C.muted }}>{p.admitDate}</div>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

      <div style={S.card}>
        <div style={{ fontSize:12,fontWeight:700,color:C.accent,marginBottom:12,textTransform:"uppercase" }}>Protocol Categories Available</div>
        <div style={{ display:"flex",flexWrap:"wrap",gap:8 }}>
          {[...new Set(Object.values(protocols).map(p=>p.category))].map(cat=>(
            <div key={cat} style={{ padding:"6px 14px",background:C.bg,borderRadius:8,border:`1px solid ${C.border}`,fontSize:12,color:C.text,fontWeight:600 }}>{cat} ({Object.values(protocols).filter(p=>p.category===cat).length})</div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// MAIN APP
// ══════════════════════════════════════════════════════════════
function App() {
  const [view, setView] = useState("dashboard");
  const [patients, setPatients] = useState(() => loadData(STORAGE_KEYS.patients, []));
  const [selected, setSelected] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [search, setSearch] = useState("");
  const [wardFilter, setWardFilter] = useState("All");
  const [priorityFilter, setPriorityFilter] = useState("All");

  useEffect(()=>{ saveData(STORAGE_KEYS.patients, patients); }, [patients]);

  const addPatient = (p) => setPatients(prev => [p, ...prev.filter(x => x.id !== p.id)]);
  const updatePatient = (p) => setPatients(prev => prev.map(x => x.id === p.id ? p : x));
  const deletePatient = (id) => setPatients(prev => prev.filter(x => x.id !== id));

  const filtered = patients.filter(p => {
    const s = search.toLowerCase();
    const matchS = !s || p.name.toLowerCase().includes(s) || p.id.toLowerCase().includes(s) || p.diagnosis.toLowerCase().includes(s) || p.resident.toLowerCase().includes(s);
    const matchW = wardFilter === "All" || p.ward === wardFilter;
    const matchP = priorityFilter === "All" || p.priority === priorityFilter;
    return matchS && matchW && matchP;
  });

  const wardPatients = filtered.filter(p => p.refType === "Ward" || p.refType === "OPD");

  const NAV = [
    { id:"dashboard",icon:"🏠",label:"Dashboard" },
    { id:"ward",icon:"🛏️",label:"Ward Patients",count:patients.filter(p=>p.refType!=="Reference").length },
    { id:"references",icon:"📨",label:"References",count:patients.filter(p=>p.refType==="Reference").length },
    { id:"otqueue",icon:"🏥",label:"OT Queue",count:patients.filter(p=>p.allInvestigationsDone||loadData(`queue_${p.id}`,false)).length },
    { id:"protocols",icon:"📋",label:"Protocol Manager" },
  ];

  return (
    <div style={S.app}>
      <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
      {/* Sidebar */}
      <div style={S.sidebar}>
        <div style={{ padding:"22px 18px",borderBottom:`1px solid ${C.border}` }}>
          <div style={{ display:"flex",alignItems:"center",gap:10,marginBottom:8 }}>
            <div style={{ width:36,height:36,borderRadius:10,background:`linear-gradient(135deg,#1D4ED8,${C.accent})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18 }}>🏥</div>
            <div>
              <div style={{ fontSize:15,fontWeight:800,color:C.text,lineHeight:1.2 }}>GMC Plastics</div>
              <div style={{ fontSize:10,color:C.sub,textTransform:"uppercase",letterSpacing:"1px" }}>Patient Management</div>
            </div>
          </div>
          <div style={{ display:"flex",alignItems:"center",gap:6 }}>
            <div style={{ width:6,height:6,borderRadius:"50%",background:"#22C55E" }} />
            <span style={{ fontSize:11,color:"#22C55E" }}>System Active · Data Saved</span>
          </div>
        </div>

        <div style={{ padding:"12px 0",flex:1,overflowY:"auto" }}>
          {NAV.map(item=>(
            <div key={item.id} style={S.navItem(view===item.id)} onClick={()=>setView(item.id)}>
              <span style={{ fontSize:16 }}>{item.icon}</span>
              <span style={{ flex:1 }}>{item.label}</span>
              {item.count !== undefined && (
                <span style={{ background:view===item.id?C.accent:C.card,color:"#fff",borderRadius:10,padding:"1px 7px",fontSize:11,fontWeight:700,border:`1px solid ${C.border}` }}>{item.count}</span>
              )}
            </div>
          ))}
        </div>

        <div style={{ padding:"14px 18px",borderTop:`1px solid ${C.border}` }}>
          <div style={{ fontSize:11,color:C.muted }}>Grant Medical College</div>
          <div style={{ fontSize:11,color:C.muted }}>Dept. of Plastic Surgery</div>
          <div style={{ fontSize:11,color:C.accent,marginTop:3,fontWeight:600 }}>v2.0 · Persistent Storage</div>
        </div>
      </div>

      {/* Main */}
      <div style={S.main}>
        {/* Topbar */}
        <div style={{ display:"flex",gap:10,marginBottom:22,alignItems:"center",flexWrap:"wrap" }}>
          <input style={{ ...S.input,maxWidth:300,flex:1 }} placeholder="🔍 Search name, ID, diagnosis, resident..."
            value={search} onChange={e=>setSearch(e.target.value)} />
          <select style={{ ...S.select,width:170 }} value={wardFilter} onChange={e=>setWardFilter(e.target.value)}>
            <option value="All">All Wards</option>
            {WARDS.map(w=><option key={w}>{w}</option>)}
          </select>
          <select style={{ ...S.select,width:150 }} value={priorityFilter} onChange={e=>setPriorityFilter(e.target.value)}>
            <option value="All">All Priorities</option>
            {Object.keys(PRIORITY_LEVELS).map(p=><option key={p}>{p}</option>)}
          </select>
          <button onClick={()=>setShowAdd(true)} style={S.btn("primary")}>➕ New Patient</button>
        </div>

        {view==="dashboard" && <Dashboard patients={patients} setView={setView} setShowAdd={setShowAdd} />}

        {view==="ward" && (
          <div>
            <div style={{ fontSize:22,fontWeight:800,color:C.text,marginBottom:4 }}>Ward Patients</div>
            <div style={{ fontSize:12,color:C.sub,marginBottom:22 }}>{wardPatients.length} patient{wardPatients.length!==1?"s":""} · Click a card to view protocol, orders, photos, discharge</div>
            {wardPatients.length===0 ? (
              <div style={{ ...S.card,textAlign:"center",padding:60,color:C.sub }}>
                <div style={{ fontSize:40,marginBottom:12 }}>🛏️</div>
                No patients — click + New Patient to add
              </div>
            ) : wardPatients.map(p => (
              <PatientCard key={p.id} patient={p} onClick={setSelected} onDelete={deletePatient} />
            ))}
          </div>
        )}

        {view==="references" && <ReferencesView patients={filtered} setView={setView} setShowAdd={setShowAdd} />}
        {view==="otqueue" && <OTQueue patients={patients} />}
        {view==="protocols" && <ProtocolManager />}
      </div>

      {/* Modals */}
      {showAdd && (
        <PatientForm onSave={(p)=>{ addPatient(p); setShowAdd(false); setView("ward"); }} onClose={()=>setShowAdd(false)} />
      )}
      {selected && (
        <PatientDetail patient={selected} onClose={()=>setSelected(null)}
          onUpdate={(p)=>{ updatePatient(p); setSelected(p); }} />
      )}
    </div>
  );
}


const domRoot = ReactDOM.createRoot(document.getElementById('root'));
domRoot.render(React.createElement(App));
  </script>
</body>
</html>
