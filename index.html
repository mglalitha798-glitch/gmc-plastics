const DB={
  async getPts(){const{data,error}=await SB.from('patients').select('*').order('created_at',{ascending:false});if(!error&&data)return data.map(r=>({...r.data,_dbRow:true}));return LS.g('pts_v6',[]);},
  async savePt(p){const row={id:p.id,data:{...p},created_at:p.created_at||new Date().toISOString()};await SB.from('patients').upsert(row,{onConflict:'id'});const all=LS.g('pts_v6',[]);LS.s('pts_v6',[p,...all.filter(x=>x.id!==p.id)]);return p;},
  async delPt(id){await SB.from('patients').delete().eq('id',id);LS.s('pts_v6',LS.g('pts_v6',[]).filter(p=>p.id!==id));},
  async getProtos(){const{data}=await SB.from('protocols').select('*');if(data&&data.length){const o={};data.forEach(r=>o[r.name]=r.data);return o;}return LS.g('protos_v6',DP);},
  async saveProtos(pr){const rows=Object.entries(pr).map(([name,data])=>({name,data}));await SB.from('protocols').upsert(rows,{onConflict:'name'});LS.s('protos_v6',pr);},
  async uploadFile(path,file){
    const ext=file.name.split('.').pop()||'jpg';
    const fp=`${path}_${Date.now()}.${ext}`;
    const{error}=await SB.storage.from('patient-photos').upload(fp,file,{contentType:file.type,upsert:true});
    if(error){return new Promise(res=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.readAsDataURL(file);});}
    const{data:u}=SB.storage.from('patient-photos').getPublicUrl(fp);return u.publicUrl;
  },

  navItem:(a)=>({display:"flex",alignItems:"center",gap:12,padding:"14px 20px",cursor:"pointer",borderLeft:a?`3px solid ${C.accent}`:`3px solid transparent`,background:a?`${C.accent}10`:"transparent",color:a?C.accent:C.sub,fontSize:14,fontWeight:a?700:500,transition:"all 0.15s"}),
};
const CB=({chk,on})=>(
  <div onClick={on} style={{width:20,height:20,borderRadius:6,border:`2px solid ${chk?"#22C55E":C.mu}`,background:chk?"#22C55E":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1,cursor:"pointer",transition:"all 0.15s"}}>
    {chk&&<span style={{color:"#fff",fontSize:11,fontWeight:900}}>✓</span>}
  </div>
);
const Sp=({h=10})=><div style={{height:h}}/>;
const L=({t})=><label style={S.lbl}>{t}</label>;
const Tag=({label,color=C.accent})=><span style={{padding:"2px 9px",borderRadius:6,fontSize:11,fontWeight:600,background:`${color}18`,color,border:`1px solid ${color}25`}}>{label}</span>;

// AI FEATURE PANEL
// ═══════════════════════════════════
function AIPanel({patient,protos,onClose}){
  const [mode,setMode]=useState(null);
  const [result,setResult]=useState("");
  const [busy,setBusy]=useState(false);
  const [extra,setExtra]=useState("");
  const proto=protos[patient.diagnosis]||{};

  const run=async(promptFn)=>{
    setBusy(true);setResult("");
    try{const r=await promptFn();setResult(r);}
    catch(e){setResult("Error: "+e.message);}
    setBusy(false);
  };

  const FEATURES=[
    {id:"casesheet",icon:"📄",label:"Case Sheet",color:C.accent,
     prompt:()=>AI_CALL(`Generate a complete clinical case sheet for the following patient at GMC Mumbai Plastic Surgery department:
Patient: ${patient.name}, Age: ${patient.age}y, Gender: ${patient.gender}
Diagnosis: ${patient.diagnosis}
Ward: ${patient.ward}, IPD: ${patient.id}
Admitted: ${patient.admitDate}
Clinical Notes: ${patient.notes||"Not provided"}
Extra info: ${extra}
Format as a proper hospital case sheet with: Chief Complaint, History of Presenting Illness, Past History, Family History, Personal History, Examination findings (General + Local), Provisional Diagnosis, Differential Diagnosis, Investigations Required, Management Plan.`)},
    {id:"otnotes",icon:"🔪",label:"OT Notes",color:"#EF5350",
     prompt:()=>AI_CALL(`Generate complete operative notes for the following plastic surgery procedure at GMC Mumbai:
Patient: ${patient.name}, ${patient.age}y/${patient.gender}, IPD: ${patient.id}
Procedure: ${patient.diagnosis}
Surgeon: Dr. ${patient.resident}
Extra operative details provided: ${extra}
Protocol intraop requirements: ${(proto.intraop||[]).join(", ")}
Generate: Date, Patient position, Anaesthesia, Preparation & draping, Incision, Steps of procedure (detailed), Intraop findings, Closure, Specimens sent, Blood loss estimate, Post-op instructions. Use formal operative note format.`)},
    {id:"discharge",icon:"🏥",label:"DC Summary",color:"#22C55E",
     prompt:()=>AI_CALL(`Generate a complete discharge summary for:
Patient: ${patient.name}, ${patient.age}y/${patient.gender}, IPD: ${patient.id}
Diagnosis: ${patient.diagnosis}
Admitted: ${patient.admitDate}, Ward: ${patient.ward}
Procedure done: ${patient.diagnosis}
Resident: Dr. ${patient.resident}
Post-op orders from protocol: ${(proto.postop||[]).join("; ")}
Additional clinical info: ${extra}
Format: Chief Complaint, History, Examination, Investigations, Diagnosis, Treatment Given, Procedure Details, Course in Hospital, Condition at Discharge, Advice on Discharge (medications list), Follow-up date. GMC Mumbai letterhead format.`)},
    {id:"rehab",icon:"🏃",label:"Rehab Protocol",color:C.teal,
     prompt:()=>AI_CALL(`Generate a detailed rehabilitation protocol for a patient who underwent ${patient.diagnosis} at GMC Mumbai:
Patient: ${patient.name}, ${patient.age}y/${patient.gender}
Protocol rehab guidelines: ${(proto.rehab||[]).join("; ")}
Additional notes: ${extra}
Generate a week-by-week rehabilitation protocol including: Physiotherapy exercises, Activity restrictions, Return to work timeline, Scar management, Follow-up schedule, Red flag signs to watch. Format clearly with phases and timelines.`)},
    {id:"consent",icon:"⚖️",label:"Consent Form",color:C.warn,
     prompt:()=>AI_CALL(`Generate a detailed informed consent form for ${patient.diagnosis} at GMC Mumbai Plastic Surgery:
Patient: ${patient.name}, ${patient.age}y, IPD: ${patient.id}
Special consent points from protocol: ${(proto.special_consent||[]).join("; ")}
Additional: ${extra}
Generate a formal consent form with: Procedure description in simple language, Benefits, Risks (common and serious), Alternatives, Patient understanding confirmation, Signature lines. Should be legally appropriate for Indian medical practice.`)},
    {id:"referral",icon:"📨",label:"Referral Letter",color:C.purple,
     prompt:()=>AI_CALL(`Generate a professional inter-department referral letter from GMC Mumbai Plastic Surgery:
Patient: ${patient.name}, ${patient.age}y/${patient.gender}, IPD: ${patient.id}
Diagnosis: ${patient.diagnosis}
Referring for: ${extra||"specialist opinion and management"}
Ward: ${patient.ward}, Resident: Dr. ${patient.resident}
Write a formal referral letter with: Patient details, Clinical summary, Reason for referral, Specific requests, Contact details. Standard GMC hospital format.`)}
  ];

  const copyToClipboard=()=>{navigator.clipboard?.writeText(result).then(()=>alert("Copied to clipboard!"));};
  const printResult=()=>{const w=window.open('','_blank');w.document.write(`<html><head><title>${FEATURES.find(f=>f.id===mode)?.label} - ${patient.name}</title><style>body{font-family:Arial,sans-serif;font-size:11pt;margin:20mm;line-height:1.6}pre{white-space:pre-wrap;font-family:Arial}h1{font-size:13pt;color:#1B3A6B;border-bottom:2px solid #1B3A6B;padding-bottom:5px;margin-bottom:12px}</style></head><body><h1>GRANT MEDICAL COLLEGE & HOSPITAL, MUMBAI<br/><span style="font-size:11pt">Dept. of Plastic & Reconstructive Surgery</span></h1><pre>${result}</pre><div style="margin-top:30px;font-size:9pt;color:#666">Generated: ${new Date().toLocaleString('en-IN')} · GMC Plastics PMS</div></body></html>`);w.document.close();w.print();};

  return(
    <div style={S.ovl}>
      <div style={{...S.box(900)}} className="fu">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div>
            <div style={{fontSize:16,fontWeight:800,color:C.t,fontFamily:"Syne"}}>🤖 AI Assistant</div>
            <div style={{fontSize:12,color:C.sub,marginTop:2}}>{patient.name} · {patient.diagnosis}</div>
          </div>
          <button onClick={onClose} style={S.btnSm()}>✕ Close</button>
        </div>

        {/* Feature grid */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}}>
          {FEATURES.map(f=>(
            <button key={f.id} onClick={()=>{setMode(f.id);setResult("");}} style={{...S.card({cursor:"pointer",border:`2px solid ${mode===f.id?f.color:C.b}`,background:mode===f.id?`${f.color}12`:C.card,padding:14,textAlign:"center",borderRadius:12,outline:"none"}),...{cursor:"pointer"}}}>
              <div style={{fontSize:24,marginBottom:6}}>{f.icon}</div>
              <div style={{fontSize:13,fontWeight:700,color:mode===f.id?f.color:C.t}}>{f.label}</div>
            </button>
          ))}
        </div>

        {mode&&(
          <div className="fu">
            <div style={{marginBottom:12}}>
              <L t="Additional details / specific instructions for AI"/>
              <textarea style={{...S.ta,minHeight:72}} value={extra} onChange={e=>setExtra(e.target.value)} placeholder="e.g. patient has DM, procedure was done under GA, any specific findings to include..."/>
            </div>
            <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap"}}>
              <button onClick={()=>run(FEATURES.find(f=>f.id===mode).prompt)} style={S.btn("p")} disabled={busy}>
                {busy?<><span className="spin"/> Generating...</>:<>🚀 Generate {FEATURES.find(f=>f.id===mode)?.label}</>}
              </button>
            </div>
            {busy&&(
              <div style={{...S.card({padding:20,textAlign:"center"})}}>
                <div className="spin" style={{width:28,height:28,borderWidth:3}}></div>
                <div style={{fontSize:13,color:C.sub,marginTop:10}}>AI is generating your document...</div>
              </div>
            )}
            {result&&(
              <div className="fu">
                <div style={{...S.card({background:C.bg,padding:16,maxHeight:400,overflowY:"auto"})}}>
                  <pre style={{fontSize:13,color:C.t,whiteSpace:"pre-wrap",lineHeight:1.6,fontFamily:"inherit"}}>{result}</pre>
                </div>
                <Sp h={10}/>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  <button onClick={printResult} style={S.btn("g")}>🖨️ Print</button>
                  <button onClick={copyToClipboard} style={S.btn("teal")}>📋 Copy</button>
                  <button onClick={()=>run(FEATURES.find(f=>f.id===mode).prompt)} style={S.btn("ghost")}>🔄 Regenerate</button>
                </div>
              </div>
            )}
          </div>
        )}

        {!mode&&(
          <div style={{textAlign:"center",padding:"20px 0",color:C.sub,fontSize:13}}>
            Select a document type above to generate with AI
          </div>
        )}
      </div>
    </div>
  );
}

// PHOTO STORAGE PANEL
// ═══════════════════════════════════
function PhotoPanel({patient,onClose}){
  const [photos,setPhotos]=useState(()=>DB.getPhotos(patient.id));
  const [activeTab,setActiveTab]=useState("preop");
  const [uploading,setUploading]=useState(false);
  const fileRef=useRef(); const camRef=useRef();

  useEffect(()=>DB.setPhotos(patient.id,photos),[photos,patient.id]);

  const upload=async(file,category)=>{
    if(!file)return;
    setUploading(true);
    try{
      const url=await DB.uploadFile(`${patient.id}/${category}`,file);
      const ph={url,name:file.name,ts:Date.now(),caption:""};
      setPhotos(p=>({...p,[category]:[...(p[category]||[]),ph]}));
    }catch(e){console.error(e);}
    setUploading(false);
  };

  const delPhoto=(category,idx)=>setPhotos(p=>({...p,[category]:(p[category]||[]).filter((_,i)=>i!==idx)}));
  const updateCaption=(category,idx,caption)=>setPhotos(p=>({...p,[category]:(p[category]||[]).map((ph,i)=>i===idx?{...ph,caption}:ph)}));

  const exportPhotos=()=>{
    const w=window.open('','_blank');
    const cats=[{k:"preop",l:"Pre-Op Photos"},{k:"intraop",l:"Intra-Op Photos"},{k:"postop",l:"Post-Op Photos"}];
    w.document.write(`<html><head><title>Photos - ${patient.name}</title>
<style>body{font-family:Arial,sans-serif;margin:15mm}h1{font-size:13pt;color:#1B3A6B;border-bottom:2px solid #1B3A6B;padding-bottom:5px}h2{font-size:11pt;color:#1B3A6B;margin:14px 0 8px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.ph{break-inside:avoid}.ph img{width:100%;border-radius:6px;border:1px solid #ddd}.caption{font-size:9pt;color:#666;margin-top:4px;text-align:center}
.info{background:#f5f7ff;padding:8px;border-radius:6px;margin-bottom:14px;font-size:10pt}.ft{font-size:8pt;color:#888;margin-top:20px;text-align:right}
</style></head><body>
<h1>GRANT MEDICAL COLLEGE & HOSPITAL<br/><span style="font-size:10pt">Dept. of Plastic & Reconstructive Surgery — Photo Documentation</span></h1>
<div class="info"><b>Patient:</b> ${patient.name} &nbsp;|&nbsp; <b>IPD:</b> ${patient.id} &nbsp;|&nbsp; <b>Age/Gender:</b> ${patient.age}y/${patient.gender}<br/><b>Diagnosis:</b> ${patient.diagnosis} &nbsp;|&nbsp; <b>Admitted:</b> ${patient.admitDate}</div>
${cats.map(({k,l})=>{
  const phs=photos[k]||[];
  if(phs.length===0)return`<h2>${l} — No photos</h2>`;
  return`<h2>${l} (${phs.length} photos)</h2><div class="grid">${phs.map(ph=>`<div class="ph"><img src="${ph.url}" onerror="this.style.display='none'"/><div class="caption">${ph.caption||ph.name}</div></div>`).join("")}</div>`;
}).join("")}
<div class="ft">Exported: ${new Date().toLocaleString('en-IN')} · GMC Plastics PMS v6</div></body></html>`);
    w.document.close();w.print();
  };

  const TABS=[{id:"preop",l:"Pre-Op",icon:"📷"},{id:"intraop",l:"Intra-Op",icon:"🔪"},{id:"postop",l:"Post-Op",icon:"💊"}];

  return(
    <div style={S.ovl}>
      <div style={{...S.box(960)}} className="fu">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div>
            <div style={{fontSize:16,fontWeight:800,color:C.t,fontFamily:"Syne"}}>📸 Photo Storage</div>
            <div style={{fontSize:12,color:C.sub,marginTop:2}}>{patient.name} · {patient.id}</div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={exportPhotos} style={S.btnSm("g")}>📤 Export All</button>
            <button onClick={onClose} style={S.btnSm()}>✕</button>
          </div>
        </div>

        <div style={{display:"flex",gap:4,marginBottom:14,borderBottom:`1px solid ${C.b}`,paddingBottom:8}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setActiveTab(t.id)} style={{padding:"8px 16px",borderRadius:8,border:"none",cursor:"pointer",background:activeTab===t.id?"#1D4ED8":"transparent",color:activeTab===t.id?"#fff":C.sub,fontSize:13,fontWeight:600,fontFamily:"inherit"}}>
              {t.icon} {t.l} ({(photos[t.id]||[]).length})
            </button>
          ))}
        </div>

        {/* Upload buttons */}
        <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap"}}>
          <button onClick={()=>fileRef.current?.click()} style={S.btn("p")} disabled={uploading}>
            {uploading?<><span className="spin"/>Uploading...</>:<>📁 Upload File</>}
          </button>
          <button onClick={()=>camRef.current?.click()} style={S.btn("teal")} disabled={uploading}>📷 Take Photo</button>
          <input ref={fileRef} type="file" accept="image/*,application/pdf" multiple style={{display:"none"}} onChange={e=>{Array.from(e.target.files).forEach(f=>upload(f,activeTab));e.target.value="";}}/>
          <input ref={camRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={e=>{upload(e.target.files[0],activeTab);e.target.value="";}}/>
        </div>

        {/* Photo grid */}
        {(photos[activeTab]||[]).length===0?(
          <div style={{textAlign:"center",padding:48,color:C.sub,border:`2px dashed ${C.b}`,borderRadius:12}}>
            <div style={{fontSize:40,marginBottom:10}}>📷</div>
            <div>No {activeTab} photos yet</div>
            <div style={{fontSize:12,marginTop:4}}>Upload files or take a photo using buttons above</div>
          </div>
        ):(
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:12}}>
            {(photos[activeTab]||[]).map((ph,i)=>(
              <div key={i} style={{...S.card({padding:10})}}>
                {(ph.url.startsWith('data:image')||ph.url.startsWith('http'))?(
                  <img src={ph.url} alt={ph.name} style={{width:"100%",height:130,objectFit:"cover",borderRadius:8,cursor:"pointer",marginBottom:8}} onClick={()=>window.open(ph.url,'_blank')}/>
                ):(
                  <div style={{width:"100%",height:130,background:C.bg,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",marginBottom:8,border:`1px solid ${C.b}`,cursor:"pointer"}} onClick={()=>window.open(ph.url,'_blank')}>
                    <span style={{fontSize:32}}>📄</span>
                  </div>
                )}
                <input style={{...S.inp,fontSize:11,padding:"5px 8px"}} value={ph.caption||""} onChange={e=>updateCaption(activeTab,i,e.target.value)} placeholder="Add caption..."/>
                <div style={{display:"flex",gap:6,marginTop:6}}>
                  <button onClick={()=>window.open(ph.url,'_blank')} style={{...S.btnSm("p"),flex:1,justifyContent:"center"}}>View</button>
                  <button onClick={()=>delPhoto(activeTab,i)} style={{...S.btnSm("r"),justifyContent:"center"}}>🗑️</button>
                </div>
              </div>
            ))}
          </div>
        )}
        <Sp h={10}/>
        <div style={{fontSize:12,color:C.mu,textAlign:"center"}}>Photos saved to Supabase cloud storage · Click Export to download as printable PDF</div>
      </div>
    </div>
  );
}

// LOGBOOK
// ═══════════════════════════════════
function Logbook({pts,protos,user,onClose}){
  const [log,setLog]=useState(()=>DB.getLogbook());
  const [filter,setFilter]=useState("");
  const [showAdd,setShowAdd]=useState(false);
  const [newEntry,setNewEntry]=useState({patientId:"",procedure:"",date:new Date().toISOString().split("T")[0],role:"Resident",notes:"",outcome:"",supervisor:""});

  const addEntry=()=>{
    if(!newEntry.procedure||!newEntry.date)return alert("Procedure and date required");
    const pt=pts.find(p=>p.id===newEntry.patientId);
    const entry={...newEntry,patientName:pt?.name||newEntry.patientId,surgeon:user.name,addedAt:new Date().toISOString()};
    DB.addLogEntry(entry);
    setLog(DB.getLogbook());
    setShowAdd(false);
    setNewEntry({patientId:"",procedure:"",date:new Date().toISOString().split("T")[0],role:"Resident",notes:"",outcome:"",supervisor:""});
  };

  const filtered=log.filter(e=>!filter||e.procedure.toLowerCase().includes(filter.toLowerCase())||e.patientName.toLowerCase().includes(filter.toLowerCase())||e.date.includes(filter));

  const exportLogbook=()=>{
    const w=window.open('','_blank');
    w.document.write(`<html><head><title>Logbook - Dr. ${user.name}</title>
<style>body{font-family:Arial,sans-serif;font-size:10pt;margin:15mm}h1{font-size:13pt;color:#1B3A6B;border-bottom:2px solid #1B3A6B;padding-bottom:5px}
table{width:100%;border-collapse:collapse;margin-top:14px}th{background:#1B3A6B;color:#fff;padding:6px 10px;font-size:10pt;text-align:left}
td{padding:5px 10px;border-bottom:1px solid #eee;font-size:9.5pt}tr:nth-child(even){background:#f5f7ff}.ft{font-size:8pt;color:#888;margin-top:14px;text-align:right}
</style></head><body>
<h1>GRANT MEDICAL COLLEGE & HOSPITAL, MUMBAI<br/><span style="font-size:10pt">Dept. of Plastic & Reconstructive Surgery — Case Logbook</span></h1>
<div style="font-size:10pt;margin-bottom:10px"><b>Surgeon:</b> Dr. ${user.name} &nbsp;|&nbsp; <b>Total Cases:</b> ${log.length} &nbsp;|&nbsp; <b>Exported:</b> ${new Date().toLocaleDateString('en-IN')}</div>
<table><tr><th>#</th><th>Date</th><th>Patient</th><th>Procedure</th><th>Role</th><th>Supervisor</th><th>Outcome</th><th>Notes</th></tr>
${log.map((e,i)=>`<tr><td>${i+1}</td><td>${e.date}</td><td>${e.patientName}</td><td>${e.procedure}</td><td>${e.role}</td><td>${e.supervisor||"—"}</td><td>${e.outcome||"—"}</td><td>${e.notes||"—"}</td></tr>`).join("")}
</table>
<div class="ft">Total: ${log.length} cases · GMC Plastics PMS v6</div></body></html>`);
    w.document.close();w.print();
  };

  return(
    <div style={S.ovl}>
      <div style={{...S.box(1000)}} className="fu">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div>
            <div style={{fontSize:16,fontWeight:800,color:C.t,fontFamily:"Syne"}}>📚 Case Logbook</div>
            <div style={{fontSize:12,color:C.sub,marginTop:2}}>Dr. {user.name} · {log.length} cases logged</div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={exportLogbook} style={S.btnSm("g")}>📤 Export</button>
            <button onClick={()=>setShowAdd(!showAdd)} style={S.btnSm("p")}>+ Add Case</button>
            <button onClick={onClose} style={S.btnSm()}>✕</button>
          </div>
        </div>

        {showAdd&&(
          <div style={{...S.card({background:C.bg,marginBottom:14})}}>
            <div style={{fontSize:13,fontWeight:700,color:C.accent,marginBottom:12}}>Log New Case</div>
            <div style={S.g2}>
              <div><L t="Date"/><input type="date" style={S.inp} value={newEntry.date} onChange={e=>setNewEntry(p=>({...p,date:e.target.value}))}/></div>
              <div><L t="Patient (select from ward)"/>
                <select style={S.sel} value={newEntry.patientId} onChange={e=>setNewEntry(p=>({...p,patientId:e.target.value,procedure:pts.find(x=>x.id===e.target.value)?.diagnosis||p.procedure}))}>
                  <option value="">-- Select Patient --</option>
                  {pts.map(p=><option key={p.id} value={p.id}>{p.name} ({p.id})</option>)}
                </select>
              </div>
              <div><L t="Procedure"/><input style={S.inp} value={newEntry.procedure} onChange={e=>setNewEntry(p=>({...p,procedure:e.target.value}))} placeholder="e.g. STSG, Flap cover..."/></div>
              <div><L t="Your Role"/>
                <select style={S.sel} value={newEntry.role} onChange={e=>setNewEntry(p=>({...p,role:e.target.value}))}>
                  <option>Resident (Primary Surgeon)</option><option>Resident (First Assistant)</option><option>Senior Resident</option><option>Observer</option>
                </select>
              </div>
              <div><L t="Supervisor / Consultant"/><input style={S.inp} value={newEntry.supervisor} onChange={e=>setNewEntry(p=>({...p,supervisor:e.target.value}))} placeholder="Prof. / Dr."/></div>
              <div><L t="Outcome"/>
                <select style={S.sel} value={newEntry.outcome} onChange={e=>setNewEntry(p=>({...p,outcome:e.target.value}))}>
                  <option value="">-- Select --</option><option>Successful</option><option>Complicated</option><option>Reoperation needed</option><option>Discharged well</option>
                </select>
              </div>
              <div style={{gridColumn:"1/-1"}}><L t="Notes / Learning points"/>
                <textarea style={S.ta} value={newEntry.notes} onChange={e=>setNewEntry(p=>({...p,notes:e.target.value}))} placeholder="Key learning points, intraop findings, post-op course..."/>
              </div>
            </div>
            <div style={{display:"flex",gap:10,marginTop:12}}>
              <button onClick={addEntry} style={S.btn("g")}>💾 Log Case</button>
              <button onClick={()=>setShowAdd(false)} style={S.btn("ghost")}>Cancel</button>
            </div>
          </div>
        )}

        <input style={{...S.inp,marginBottom:14}} placeholder="🔍 Filter by procedure, patient or date..." value={filter} onChange={e=>setFilter(e.target.value)}/>

        {filtered.length===0?(
          <div style={{textAlign:"center",padding:40,color:C.sub}}>
            <div style={{fontSize:36,marginBottom:10}}>📚</div>
            <div>No cases logged yet. Click + Add Case to start.</div>
          </div>
        ):(
          <div>
            {filtered.map((e,i)=>(
              <div key={e.id||i} style={{...S.card({borderLeft:`4px solid ${C.accent}`})}}>
                <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
                  <div style={{flex:1}}>

// ═══════════════════════════════════
function InvRow({item,idx,patId,checked,onChk,photos,onAddPhoto}){
  const [exp,setExp]=useState(false);
  const [busy,setBusy]=useState(false);
  const fRef=useRef();const cRef=useRef();
  const key='inv_'+idx;
  const mine=(photos.inv||{})[key]||[];
  const handle=async file=>{
    if(!file)return;setBusy(true);
    try{const url=await DB.uploadFile(`${patId}/inv_${idx}`,file);onAddPhoto(key,{url,name:file.name,ts:Date.now()});}
    catch(e){const url=await new Promise(res=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.readAsDataURL(file);});onAddPhoto(key,{url,name:file.name,ts:Date.now()});}
    setBusy(false);setExp(true);
  };
  return(
    <div style={{marginBottom:6}}>
      <div style={S.chkrow(checked)} onClick={()=>onChk(key)}>
        <CB chk={checked} on={()=>onChk(key)}/>
        <span style={{flex:1,fontSize:13,color:checked?"#5E7A9E":C.t,textDecoration:checked?"line-through":"none",lineHeight:1.4}}>{item}</span>
        <div style={{display:"flex",gap:5,marginLeft:8}} onClick={e=>e.stopPropagation()}>
          {mine.length>0&&<button onClick={()=>setExp(!exp)} style={S.btnSm("p")}>📎{mine.length}</button>}
          <button onClick={()=>fRef.current?.click()} style={S.btnSm("p")} title="Upload">{busy?<span className="spin"/>:"📁"}</button>
          <button onClick={()=>cRef.current?.click()} style={S.btnSm("teal")} title="Camera">📷</button>
          <input ref={fRef} type="file" accept="image/*,application/pdf" style={{display:"none"}} onChange={e=>{handle(e.target.files[0]);e.target.value="";}}/>
          <input ref={cRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={e=>{handle(e.target.files[0]);e.target.value="";}}/>
        </div>
      </div>
      {exp&&mine.length>0&&(
        <div style={{marginLeft:30,marginBottom:6,display:"flex",flexWrap:"wrap",gap:8}}>
          {mine.map((ph,pi)=>(
            <div key={pi}>{(ph.url.startsWith('data:')||ph.url.startsWith('http'))
              ?<img src={ph.url} alt={ph.name} style={{width:76,height:76,objectFit:"cover",borderRadius:8,border:`1px solid ${C.b}`,cursor:"pointer"}} onClick={()=>window.open(ph.url,'_blank')}/>
              :<a href={ph.url} target="_blank" rel="noreferrer" style={{display:"flex",gap:5,alignItems:"center",padding:"5px 10px",background:C.card,borderRadius:8,border:`1px solid ${C.b}`,color:C.accent,fontSize:12,textDecoration:"none"}}>📄 {ph.name}</a>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function ProtPanel({diagnosis,patId,protos}){

  if(!proto)return<div style={S.card({textAlign:"center",padding:40,color:C.sub})}>No protocol. Add via Protocol Manager.</div>;
  const tog=k=>setChks(p=>({...p,[k]:!p[k]}));
  const addInvPhoto=(key,ph)=>setPhotos(p=>({...p,inv:{...(p.inv||{}),[key]:[...((p.inv||{})[key]||[]),ph]}}));
  const allInvDone=(proto.investigations||[]).every((_,i)=>chks['inv_'+i]);
  const Sec=({k,icon,title,items,isInv})=>(
    <div style={{marginBottom:10}}>
      <div style={S.sh} onClick={()=>setOpen(open===k?null:k)}>

            <CB chk={!!chks[key]} on={()=>tog(key)}/>

            <div style={{fontSize:15,fontWeight:800,color:C.t}}>{diagnosis}</div>
          </div>
          <Tag label={proto.category} color={proto.color}/>

        {allInvDone&&<div style={{marginTop:10,padding:"7px 12px",background:"rgba(34,197,94,0.1)",borderRadius:8,color:"#22C55E",fontSize:13,fontWeight:600}}>✅ All investigations checked — patient ready for OT</div>}
      </div>
      <Sec k="investigations" icon="🧪" title="Investigations" items={proto.investigations} isInv={true}/>
      <Sec k="preop" icon="✅" title="Pre-Op Checklist" items={proto.preop_checklist}/>
      <Sec k="preop_orders" icon="📝" title="Pre-Op Orders" items={proto.preop_orders}/>

    {editing&&<PatForm existing={patient} onSave={p=>{onUpdate(p);setEditing(false);}} onClose={()=>setEditing(false)} protos={protos}/>}
    <div style={S.ovl}>
      <div style={{...S.box(980)}} className="fu">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12,gap:8,flexWrap:"wrap"}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:4}}>
              <span style={{fontSize:15,fontWeight:800,color:C.t}}>{patient.name}</span>
              <span style={S.bdg(patient.priority)}>{pr.i} {patient.priority}</span>
              {inQ&&<Tag label="✓ OT Queue" color={C.ok}/>}
            </div>
            <div style={{fontSize:12,color:C.sub,marginBottom:1}}>
              <span style={{color:C.accent,fontWeight:600,fontFamily:"monospace"}}>{patient.id}</span> · {patient.age}y/{patient.gender} · {patient.ward}
            </div>
            <div style={{fontSize:13,color:proto?.color||C.accent,fontWeight:600}}>{patient.diagnosis}</div>
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {patient.allInvestigationsDone&&!inQ&&<button onClick={()=>setInQ(true)} style={S.btnSm("g")}>+ OT</button>}
            <button onClick={()=>setShowAI(true)} style={S.btnSm("pur")}>🤖 AI</button>
            <button onClick={()=>setShowPhotos(true)} style={S.btnSm("teal")}>📸</button>
            <button onClick={()=>setShowRehab(true)} style={S.btnSm("p")}>🏃</button>
            <button onClick={()=>setEditing(true)} style={S.btnSm("y")}>✏️</button>
            <button onClick={onClose} style={S.btnSm()}>✕</button>
          </div>
        </div>
        {patient.notes&&<div style={{padding:"6px 12px",background:C.bg,borderRadius:8,border:`1px solid ${C.b}`,marginBottom:10,fontSize:12,color:C.sub}}>{patient.notes.slice(0,120)}</div>}
        <div style={{display:"flex",gap:3,marginBottom:14,borderBottom:`1px solid ${C.b}`,paddingBottom:8,overflowX:"auto"}}>
          {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"8px 14px",borderRadius:8,border:"none",cursor:"pointer",background:tab===t.id?"#1D4ED8":"transparent",color:tab===t.id?"#fff":C.sub,fontSize:13,fontWeight:600,fontFamily:"inherit",whiteSpace:"nowrap"}}>{t.l}</button>)}
        </div>
        {tab==="protocol"&&<ProtPanel diagnosis={patient.diagnosis} patId={patient.id} protos={protos}/>}
        {tab==="orders"&&(
          <div>
            <div style={S.card()}>
              <L t="Add Order / Note"/>
              <select style={{...S.sel,marginBottom:10}} value={oby} onChange={e=>setOby(e.target.value)}>
                <option>Resident</option><option>Senior/Consultant</option><option>Anaesthesia</option><option>Allied Dept</option><option>Nursing</option>
              </select>
              <textarea style={S.ta} value={otxt} onChange={e=>setOtxt(e.target.value)} placeholder="Write order or note..."/>
              <Sp h={8}/><button onClick={addOrder} style={S.btn("p")}>Add Order</button>
            </div>
            {[...orders].reverse().map(o=>(
              <div key={o.id} style={S.card({borderLeft:`3px solid ${o.type==="senior"?"#F59E0B":C.accent}`})}>
                <div style={{fontSize:11,color:C.sub,marginBottom:4}}>{o.type==="senior"?"👨‍⚕️":"💊"} {o.by} · {o.time}</div>
                <div style={{fontSize:13,color:C.t,lineHeight:1.5}}>{o.text}</div>
              </div>
            ))}
            {orders.length===0&&<div style={S.card({textAlign:"center",padding:24,color:C.sub})}>No orders yet</div>}
          </div>
        )}
        {tab==="discharge"&&<DSSummary patient={patient} proto={proto}/>}
      </div>
    </div>
    </>
  );
}

function PatForm({existing,onSave,onClose,protos}){
  const [f,setF]=useState(existing||{name:"",age:"",gender:"Male",ward:WARDS[0],diagnosis:Object.keys(protos)[0],priority:"Urgent",resident:"",contact:"",refType:"Ward",notes:"",status:"Pre-Op Workup",allInvestigationsDone:false});
  const u=(k,v)=>setF(p=>({...p,[k]:v}));
  const save=()=>{
    if(!f.name.trim())return alert("Name required");
    const id=existing?.id||genIPD();
    onSave({...f,id,created_at:existing?.created_at||new Date().toISOString(),admitDate:existing?.admitDate||new Date().toISOString().split("T")[0]});
  };
  return(
    <div style={S.ovl}>
      <div style={S.box(800)} className="fu">
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}>
          <div>
            <div style={{fontSize:15,fontWeight:800,color:C.t,fontFamily:"Syne"}}>{existing?"Edit Patient":"Add New Patient"}</div>
            {!existing&&<div style={{fontSize:11,color:C.sub,marginTop:2}}>A unique IPD number will be auto-generated (GMC/PLAST/YYYY/NNNNN)</div>}
            {existing&&<div style={{fontSize:12,color:C.accent,fontFamily:"monospace",marginTop:2}}>{existing.id}</div>}
          </div>
          <button onClick={onClose} style={S.btnSm()}>✕</button>
        </div>
        <div style={S.g2}>
          <div><L t="Full Name *"/><input style={S.inp} value={f.name} onChange={e=>u("name",e.target.value)} placeholder="Patient full name"/></div>
          <div><L t="Age"/><input style={S.inp} type="number" value={f.age} onChange={e=>u("age",e.target.value)}/></div>
          <div><L t="Gender"/><select style={S.sel} value={f.gender} onChange={e=>u("gender",e.target.value)}><option>Male</option><option>Female</option><option>Other</option></select></div>
          <div><L t="Contact"/><input style={S.inp} value={f.contact} onChange={e=>u("contact",e.target.value)} placeholder="Mobile"/></div>
          <div><L t="Ward"/><select style={S.sel} value={f.ward} onChange={e=>u("ward",e.target.value)}>{WARDS.map(w=><option key={w}>{w}</option>)}</select></div>
          <div><L t="Priority"/><select style={S.sel} value={f.priority} onChange={e=>u("priority",e.target.value)}>{Object.keys(PRIO).map(p=><option key={p}>{p}</option>)}</select></div>
          <div><L t="Patient Type"/><select style={S.sel} value={f.refType} onChange={e=>u("refType",e.target.value)}><option value="Ward">Ward Patient</option><option value="Reference">Inter-Dept Ref</option><option value="OPD">OPD</option></select></div>
          <div><L t="Resident"/><input style={S.inp} value={f.resident} onChange={e=>u("resident",e.target.value)} placeholder="Dr. Name"/></div>
          <div style={{gridColumn:"1/-1"}}><L t="Diagnosis (Protocol Auto-Loads)"/>
            <select style={S.sel} value={f.diagnosis} onChange={e=>u("diagnosis",e.target.value)}>{Object.keys(protos).map(d=><option key={d}>{d}</option>)}</select>
          </div>
          <div style={{gridColumn:"1/-1"}}><L t="Status"/>
            <select style={S.sel} value={f.status} onChange={e=>u("status",e.target.value)}>{["Pre-Op Workup","Active Management","Cleared for OT","Post-Op","Discharged"].map(s=><option key={s}>{s}</option>)}</select>
          </div>
          <div style={{gridColumn:"1/-1"}}><L t="Clinical Notes"/>
            <textarea style={S.ta} value={f.notes} onChange={e=>u("notes",e.target.value)} placeholder="Mechanism, clinical description, relevant history..."/>
          </div>
          <div style={{gridColumn:"1/-1",display:"flex",alignItems:"center",gap:10}}>
            <CB chk={f.allInvestigationsDone} on={()=>u("allInvestigationsDone",!f.allInvestigationsDone)}/>
            <span style={{fontSize:13,color:C.t}}>All investigations done — cleared for OT</span>
          </div>
        </div>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:16}}>
          <button onClick={onClose} style={S.btn("ghost")}>Cancel</button>
          <button onClick={save} style={S.btn("g")}>💾 {existing?"Update":"Add Patient"}</button>
        </div>
      </div>
    </div>
  );
}

// REFERENCE PORTAL (public)
// ═══════════════════════════════════
function RefPortal({protos,allPts,onSubmit,onUpdate}){
  const [mode,setMode]=useState("home");
  const [refId,setRefId]=useState("");
  const [foundPt,setFoundPt]=useState(null);
  const [notFound,setNotFound]=useState(false);
  const [f,setF]=useState({name:"",age:"",gender:"Male",ward:"",contact:"",diagnosis:Object.keys(protos)[0],priority:"Semi-Urgent",notes:"",refDept:"",refDoctorName:"",refType:"Reference"});
  const [done,setDone]=useState(null);
  const [busy,setBusy]=useState(false);
  const u=(k,v)=>setF(p=>({...p,[k]:v}));

  const submit=async()=>{
    if(!f.name.trim()||!f.refDept.trim())return alert("Patient name and department required");
    setBusy(true);
    const id=genIPD();
    const pt={...f,id,created_at:new Date().toISOString(),admitDate:new Date().toISOString().split("T")[0],status:"Pre-Op Workup",allInvestigationsDone:false,resident:""};
    await onSubmit(pt);setBusy(false);setDone(id);
  };

  const findPatient=()=>{
    const query=refId.trim().toUpperCase();
    const pt=allPts.find(p=>p.id.toUpperCase()===query);
    if(pt){setFoundPt(pt);setNotFound(false);}
    else{setFoundPt(null);setNotFound(true);}
  };

  if(mode==="revisit"&&foundPt){
    const proto=protos[foundPt.diagnosis]||{};
    const [photos,setPhotos]=useState(()=>DB.getPhotos(foundPt.id));
    const [chks,setChks]=useState(()=>DB.getChks(foundPt.id));
    const [note,setNote]=useState("");
    const [saved,setSaved]=useState(false);
    useEffect(()=>DB.setPhotos(foundPt.id,photos),[photos]);
    useEffect(()=>DB.setChks(foundPt.id,chks),[chks]);
    const addInvPhoto=(key,ph)=>setPhotos(p=>({...p,inv:{...(p.inv||{}),[key]:[...((p.inv||{})[key]||[]),ph]}}));
    const tog=k=>setChks(p=>({...p,[k]:!p[k]}));
    const pr=PRIO[foundPt.priority];
    return(
      <div style={{minHeight:"100vh",background:C.bg,padding:"20px 16px"}}>
        <div style={{maxWidth:680,margin:"0 auto"}}>
          <button onClick={()=>{setMode("home");setFoundPt(null);setRefId("");}} style={{...S.btnSm(),marginBottom:14}}>← Back</button>
          <div style={S.card({borderLeft:`4px solid ${pr.c}`,marginBottom:16})}>
            <div style={{fontWeight:800,fontSize:15,color:C.t,marginBottom:4}}>{foundPt.name}</div>
            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:6}}>
              <span style={{fontSize:11,color:C.accent,fontFamily:"monospace",fontWeight:700}}>{foundPt.id}</span>
              <span style={S.bdg(foundPt.priority)}>{pr.i} {foundPt.priority}</span>
              <span style={S.pil(foundPt.status==="Cleared for OT"?C.ok:C.warn,true)}>{foundPt.status}</span>
            </div>
            <div style={{fontSize:13,color:proto.color||C.accent,fontWeight:600}}>{foundPt.diagnosis}</div>
          </div>
          <div style={S.card({background:`${C.accent}06`,border:`1px solid ${C.accent}25`,marginBottom:14})}>
            <div style={{fontSize:13,fontWeight:700,color:C.accent,marginBottom:10}}>🧪 Investigation Checklist & Report Upload</div>
            {(proto.investigations||[]).map((item,i)=>(
              <InvRow key={i} item={item} idx={i} patId={foundPt.id} checked={!!chks['inv_'+i]} onChk={tog} photos={photos} onAddPhoto={addInvPhoto}/>
            ))}
          </div>
          <div style={S.card()}>
            <div style={{fontSize:13,fontWeight:700,color:C.t,marginBottom:10}}>📝 Add Clinical Note / Update</div>
            <textarea style={{...S.ta,marginBottom:10}} value={note} onChange={e=>setNote(e.target.value)} placeholder="Any updates, new findings, urgency change..."/>
            <button onClick={()=>{if(!note.trim())return;const orders=DB.getOrders(foundPt.id);DB.setOrders(foundPt.id,[...orders,{id:Date.now(),text:note,by:`${foundPt.refDept||"Referring Dept"} - ${foundPt.refDoctorName||"Dr."}`,time:new Date().toLocaleString('en-IN'),type:"res"}]);setNote("");setSaved(true);setTimeout(()=>setSaved(false),2500);}} style={S.btn("p")}>
              Add Update
            </button>
            {saved&&<span style={{...S.pil(C.ok,true),marginLeft:10}}>✓ Saved & sent to Plastics team</span>}
          </div>
        </div>
      </div>
    );
  }

  if(done)return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={S.card({maxWidth:460,textAlign:"center",padding:44})} className="fu">
        <div style={{fontSize:52,marginBottom:14}}>✅</div>
        <div style={{fontSize:18,fontWeight:800,color:C.ok,marginBottom:8}}>Reference Submitted!</div>
        <div style={{fontSize:14,color:C.sub,lineHeight:1.6,marginBottom:20}}>Patient <strong style={{color:C.t}}>{f.name}</strong> sent to Plastics team.</div>
        <div style={{padding:"14px 18px",background:`${C.accent}10`,borderRadius:12,border:`1px solid ${C.accent}30`,marginBottom:20}}>
          <div style={{fontSize:11,color:C.sub,marginBottom:4,textTransform:"uppercase",letterSpacing:"0.5px"}}>Your Reference / IPD Number</div>
          <div style={{fontSize:22,fontWeight:800,color:C.accent,letterSpacing:"2px",fontFamily:"monospace"}}>{done}</div>
        </div>
        <div style={{fontSize:12,color:C.mu,marginBottom:20,lineHeight:1.5}}>Save this number. Use it to revisit, check status, and upload investigation reports.</div>
        <button onClick={()=>{setDone(null);setF({name:"",age:"",gender:"Male",ward:"",contact:"",diagnosis:Object.keys(protos)[0],priority:"Semi-Urgent",notes:"",refDept:"",refDoctorName:"",refType:"Reference"});setMode("home");}} style={S.btn("p",true)}>Done</button>
      </div>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:C.bg,padding:"20px 16px"}}>
      <div style={{maxWidth:620,margin:"0 auto"}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{display:"inline-flex",alignItems:"center",gap:12,padding:"14px 20px",background:C.panel,borderRadius:14,border:`1px solid ${C.b}`,marginBottom:14}}>
            <span style={{fontSize:26}}>🏥</span>
            <div>
              <div style={{fontSize:16,fontWeight:800,color:C.t,fontFamily:"Syne"}}>GMC Plastic Surgery</div>
              <div style={{fontSize:12,color:C.sub}}>Inter-Department Reference Portal</div>
            </div>
          </div>
          <div style={{fontSize:12,color:C.mu}}>Grant Medical College & Hospital, Mumbai</div>
        </div>

        {mode==="home"&&(
          <div className="fu">
            <div style={S.g2}>
              <button onClick={()=>setMode("new")} style={{...S.card({cursor:"pointer",border:`2px solid ${C.accent}30`,textAlign:"center",padding:24,background:`${C.accent}08`}),...{outline:"none"}}}>
                <div style={{fontSize:32,marginBottom:8}}>📤</div>
                <div style={{fontWeight:700,color:C.t,fontSize:15}}>New Reference</div>
                <div style={{fontSize:12,color:C.sub,marginTop:4}}>Send patient to Plastics</div>
              </button>
              <button onClick={()=>setMode("revisit")} style={{...S.card({cursor:"pointer",border:`2px solid ${C.teal}30`,textAlign:"center",padding:24,background:`${C.teal}08`}),...{outline:"none"}}}>
                <div style={{fontSize:32,marginBottom:8}}>🔍</div>
                <div style={{fontWeight:700,color:C.t,fontSize:15}}>Track Reference</div>
                <div style={{fontSize:12,color:C.sub,marginTop:4}}>Upload reports & updates</div>
              </button>
            </div>
          </div>
        )}

        {mode==="revisit"&&!foundPt&&(
          <div className="fu">
            <div style={S.card()}>
              <div style={{fontSize:14,fontWeight:700,color:C.t,marginBottom:14}}>🔍 Find Your Patient</div>
              <L t="Enter IPD / Reference Number"/>
              <input style={{...S.inp,marginBottom:12,fontFamily:"monospace"}} value={refId} onChange={e=>setRefId(e.target.value)} placeholder="GMC/PLAST/2024/01234" onKeyDown={e=>e.key==="Enter"&&findPatient()}/>
              {notFound&&<div style={{padding:"8px 12px",background:`${C.err}12`,borderRadius:8,color:C.err,fontSize:13,marginBottom:12}}>⚠️ No patient found. Check the ID and try again.</div>}
              <div style={{display:"flex",gap:10}}>
                <button onClick={findPatient} style={S.btn("p")}>Find Patient</button>
                <button onClick={()=>setMode("home")} style={S.btn("ghost")}>← Back</button>
              </div>
            </div>
          </div>
        )}

        {mode==="new"&&(
          <div className="fu">
            <div style={S.card()}>
              <div style={{fontSize:13,fontWeight:700,color:C.t,marginBottom:14}}>Referring Department</div>
              <div style={S.g2}>
                <div><L t="Department *"/><input style={S.inp} value={f.refDept} onChange={e=>u("refDept",e.target.value)} placeholder="ENT, Ortho, Medicine..."/></div>
                <div><L t="Doctor *"/><input style={S.inp} value={f.refDoctorName} onChange={e=>u("refDoctorName",e.target.value)} placeholder="Dr. Sharma"/></div>
              </div>
            </div>
            <div style={S.card()}>
              <div style={{fontSize:13,fontWeight:700,color:C.t,marginBottom:14}}>Patient Details</div>
              <div style={S.g2}>
                <div><L t="Patient Name *"/><input style={S.inp} value={f.name} onChange={e=>u("name",e.target.value)}/></div>
                <div><L t="Age"/><input style={S.inp} type="number" value={f.age} onChange={e=>u("age",e.target.value)}/></div>
                <div><L t="Gender"/><select style={S.sel} value={f.gender} onChange={e=>u("gender",e.target.value)}><option>Male</option><option>Female</option><option>Other</option></select></div>
                <div><L t="Contact"/><input style={S.inp} value={f.contact} onChange={e=>u("contact",e.target.value)}/></div>
                <div><L t="Ward / Bed"/><input style={S.inp} value={f.ward} onChange={e=>u("ward",e.target.value)} placeholder="Ward 5B Bed 12"/></div>
                <div><L t="Priority"/><select style={S.sel} value={f.priority} onChange={e=>u("priority",e.target.value)}>{Object.keys(PRIO).map(p=><option key={p}>{p}</option>)}</select></div>
                <div style={{gridColumn:"1/-1"}}><L t="Reason / Diagnosis"/>
                  <select style={S.sel} value={f.diagnosis} onChange={e=>u("diagnosis",e.target.value)}>{Object.keys(protos).map(d=><option key={d}>{d}</option>)}</select>
                </div>
                <div style={{gridColumn:"1/-1"}}><L t="Clinical Notes"/>
                  <textarea style={{...S.ta,minHeight:80}} value={f.notes} onChange={e=>u("notes",e.target.value)} placeholder="Clinical details, what opinion is needed..."/>
                </div>
              </div>
            </div>
            <button onClick={submit} disabled={busy} style={S.btn("g",true)}>
              {busy?<><span className="spin"/>Submitting...</>:<>📤 Submit Reference</>}
            </button>
            <Sp h={10}/>
            <button onClick={()=>setMode("home")} style={S.btn("ghost",true)}>← Back</button>
          </div>
        )}
      </div>
    </div>
  );
}

// PROTOCOL MANAGER
// ═══════════════════════════════════
function ProtoManager({protos,onSave}){
  const [cat,setCat]=useState("All");
  const [editing,setEditing]=useState(null);
  const [showNew,setShowNew]=useState(false);
  const CATS=["All","Trauma","Reconstruction","Oncoplastic","Vascular","Burns & Contracture","Aesthetic & Body","Congenital","Custom"];
  const SE=({proto,setProto,k,label,icon})=>{
    const [txt,setTxt]=useState("");const items=proto[k]||[];
    const add=()=>{if(!txt.trim())return;setProto(p=>({...p,[k]:[...(p[k]||[]),txt.trim()]}));setTxt("");};
    const rm=i=>setProto(p=>({...p,[k]:items.filter((_,j)=>j!==i)}));
    return(
      <div style={{marginBottom:14}}>
        <div style={{fontSize:11,fontWeight:700,color:C.accent,marginBottom:6,textTransform:"uppercase"}}>{icon} {label}</div>
        {items.map((item,i)=><div key={i} style={{display:"flex",gap:6,marginBottom:4,background:C.bg,padding:"6px 10px",borderRadius:8,border:`1px solid ${C.b}`,alignItems:"center"}}><span style={{flex:1,fontSize:12,color:C.t}}>{item}</span><button onClick={()=>rm(i)} style={S.btnSm("r")}>✕</button></div>)}
        <div style={{display:"flex",gap:8}}><input style={{...S.inp,flex:1}} value={txt} onChange={e=>setTxt(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()} placeholder="Add item, press Enter"/><button onClick={add} style={S.btn("p")}>+</button></div>
      </div>
    );
  };
  const EM=({proto,name,onSv,onClose})=>{
    const [p,setP]=useState({...proto});const [n,setN]=useState(name);
    return(
      <div style={S.ovl}><div style={{...S.box(900)}} className="fu">
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:14}}><div style={{fontSize:15,fontWeight:800,color:C.t,fontFamily:"Syne"}}>{name?"Edit":"New"} Protocol</div><button onClick={onClose} style={S.btnSm()}>✕</button></div>
        <div style={S.g2}>
          <div><L t="Name"/><input style={S.inp} value={n} onChange={e=>setN(e.target.value)}/></div>
          <div><L t="Category"/><select style={S.sel} value={p.category||"Custom"} onChange={e=>setP(x=>({...x,category:e.target.value}))}>{CATS.filter(c=>c!=="All").map(c=><option key={c}>{c}</option>)}</select></div>
        </div>
        <Sp h={8}/><L t="Colour"/><input type="color" style={{...S.inp,height:44,padding:4,marginBottom:14}} value={p.color||"#3B82F6"} onChange={e=>setP(x=>({...x,color:e.target.value}))}/>
        <div style={S.dv}/>
        <div style={{maxHeight:480,overflowY:"auto",paddingRight:4}}>
          <SE proto={p} setProto={setP} k="investigations" label="Investigations" icon="🧪"/>
          <SE proto={p} setProto={setP} k="preop_checklist" label="Pre-Op Checklist" icon="✅"/>
          <SE proto={p} setProto={setP} k="preop_orders" label="Pre-Op Orders" icon="📝"/>
          <SE proto={p} setProto={setP} k="special_consent" label="Special Consent" icon="⚖️"/>
          <SE proto={p} setProto={setP} k="materials" label="Materials & Equipment" icon="🛒"/>
          <SE proto={p} setProto={setP} k="intraop" label="Intra-Op" icon="🔪"/>
          <SE proto={p} setProto={setP} k="postop" label="Post-Op Orders" icon="💊"/>
          <SE proto={p} setProto={setP} k="rehab" label="Rehabilitation Protocol" icon="🏃"/>
          <SE proto={p} setProto={setP} k="references" label="References" icon="📚"/>
        </div>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:14}}>
          <button onClick={onClose} style={S.btn("ghost")}>Cancel</button>
          <button onClick={()=>{if(!n.trim())return alert("Name required");onSv(n,p);onClose();}} style={S.btn("g")}>💾 Save</button>
        </div>
      </div></div>
    );
  };
  const filt=Object.entries(protos).filter(([,v])=>cat==="All"||v.category===cat);
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div style={{fontSize:18,fontWeight:800,color:C.t,fontFamily:"Syne"}}>Protocol Manager</div>
        <button onClick={()=>setShowNew(true)} style={S.btn("p")}>+ New Protocol</button>
      </div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
        {CATS.map(c=><button key={c} onClick={()=>setCat(c)} style={{...S.btnSm(cat===c?"p":""),padding:"5px 12px"}}>{c}</button>)}
      </div>
      <div style={S.g2}>
        {filt.map(([name,proto])=>(
          <div key={name} style={S.card({borderLeft:`4px solid ${proto.color||C.accent}`})}>
            <div style={{fontWeight:700,color:C.t,fontSize:13,marginBottom:6}}>{name}</div>
            <Tag label={proto.category||"General"} color={proto.color||C.accent}/>
            <div style={{fontSize:11,color:C.sub,marginTop:6,marginBottom:10}}>{(proto.investigations||[]).length} inv · {(proto.materials||[]).length} mat · {(proto.special_consent||[]).length} consent · {(proto.rehab||[]).length} rehab</div>
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>setEditing(name)} style={S.btnSm("p")}>✏️ Edit</button>
              <button onClick={()=>{if(window.confirm(`Delete "${name}"?`)){const u={...protos};delete u[name];onSave(u);}}} style={S.btnSm("r")}>🗑️</button>
            </div>
          </div>
        ))}
      </div>
      {editing&&<EM proto={protos[editing]} name={editing} onSv={(n,p)=>{const u={...protos};if(n!==editing)delete u[editing];u[n]=p;onSave(u);setEditing(null);}} onClose={()=>setEditing(null)}/>}
      {showNew&&<EM proto={{name:"",category:"Custom",color:"#3B82F6",investigations:[],preop_checklist:[],preop_orders:[],special_consent:[],materials:[],intraop:[],postop:[],rehab:[],references:[]}} name="" onSv={(n,p)=>{onSave({...protos,[n]:p});setShowNew(false);}} onClose={()=>setShowNew(false)}/>}
    </div>
  );
}

// PATIENT CARD
// ═══════════════════════════════════
function PatCard({patient,onClick,onDel,protos}){
  const pr=PRIO[patient.priority];
  const proto=protos[patient.diagnosis];
  return(
    <div onClick={()=>onClick(patient)} style={S.card({cursor:"pointer",borderLeft:`4px solid ${pr.c}`,transition:"border-color 0.2s"})} className="fu">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap",marginBottom:4}}>
            <span style={{fontSize:15,fontWeight:800,color:C.t}}>{patient.name}</span>
            <span style={S.bdg(patient.priority)}>{pr.i} {patient.priority}</span>
            {patient.allInvestigationsDone&&<Tag label="✓ Cleared" color={C.ok}/>}
          </div>
          <div style={{fontSize:11,color:C.accent,fontFamily:"monospace",fontWeight:600,marginBottom:3}}>{patient.id}</div>
          <div style={{fontSize:12,color:C.sub,marginBottom:3}}>{patient.age}y/{patient.gender} · {patient.ward}</div>
          <div style={{fontSize:13,color:proto?.color||C.accent,fontWeight:600}}>{patient.diagnosis}</div>
          {patient.refType==="Reference"&&<div style={{fontSize:11,color:C.purple,marginTop:3}}>📨 {patient.refDept} — Dr. {patient.refDoctorName||"—"}</div>}
        </div>
        <div style={{textAlign:"right",flexShrink:0}}>
          <Tag label={patient.status} color={patient.status==="Cleared for OT"?C.ok:patient.status==="Post-Op"?C.accent:C.warn}/>
          <div style={{fontSize:11,color:C.sub,marginTop:6}}>Dr. {patient.resident||"—"}</div>
          <div style={{fontSize:11,color:C.mu,marginBottom:6}}>{patient.admitDate}</div>
          <button onClick={e=>{e.stopPropagation();if(window.confirm("Delete?"))onDel(patient.id);}} style={S.btnSm("r")}>🗑️</button>
        </div>
      </div>
      {patient.notes&&<div style={{marginTop:7,fontSize:11,color:C.mu,borderTop:`1px solid ${C.b}`,paddingTop:6,lineHeight:1.4}}>{patient.notes.slice(0,100)}{patient.notes.length>100?"...":""}</div>}
    </div>
  );
}

// LOGIN
// ═══════════════════════════════════
function Login({onLogin}){
  const [u,setU]=useState(""); const [p,setP]=useState(""); const [err,setErr]=useState(""); const [busy,setBusy]=useState(false);
  const login=()=>{
    if(!u||!p)return setErr("Enter username and password");
    setBusy(true);setErr("");
    setTimeout(()=>{
      const user=USERS.find(x=>x.username===u.trim()&&x.password===p);
      if(user){LS.s('gmc_sess',{...user,ts:Date.now()});onLogin(user);}
      else setErr("Invalid username or password");
      setBusy(false);
    },400);
  };
  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{width:"100%",maxWidth:380}} className="fu">
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{width:66,height:66,borderRadius:20,background:`linear-gradient(135deg,#1D4ED8,${C.accent})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:34,margin:"0 auto 14px"}}>🏥</div>
          <div style={{fontSize:26,fontWeight:800,color:C.t,fontFamily:"Syne"}}>GMC Plastics</div>
          <div style={{fontSize:13,color:C.sub,marginTop:4}}>Dept. of Plastic & Reconstructive Surgery</div>
          <div style={{fontSize:12,color:C.mu,marginTop:2}}>Grant Medical College & Hospital, Mumbai</div>
        </div>
        <div style={S.card()}>
          <div style={{marginBottom:14}}>
            <L t="Username"/>
            <input style={S.inp} value={u} onChange={e=>setU(e.target.value)} placeholder="Enter username" autoCapitalize="none" onKeyDown={e=>e.key==="Enter"&&login()}/>
          </div>
          <div style={{marginBottom:16}}>
            <L t="Password"/>
            <input style={S.inp} type="password" value={p} onChange={e=>setP(e.target.value)} placeholder="Enter password" onKeyDown={e=>e.key==="Enter"&&login()}/>
          </div>
          {err&&<div style={{padding:"8px 12px",background:`${C.err}12`,borderRadius:8,color:C.err,fontSize:13,marginBottom:12}}>⚠️ {err}</div>}
          <button onClick={login} style={S.btn("p",true)} disabled={busy}>
            {busy?<><span className="spin"/>Signing in...</>:<>🔐 Sign In</>}
          </button>
        </div>
        <div style={{textAlign:"center",fontSize:11,color:C.mu,marginTop:14}}>Default: drresident / gmc2024</div>
      </div>
    </div>
  );
}

// MAIN APP
// ═══════════════════════════════════
function App(){
  const [user,setUser]=useState(()=>{const s=LS.g('gmc_sess',null);if(s&&Date.now()-s.ts<604800000)return s;return null;});
  const [view,setView]=useState("dashboard");
  const [pts,setPts]=useState([]);
  const [protos,setProtos]=useState(DP);
  const [loading,setLoading]=useState(true);
  const [sel,setSel]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const [navOpen,setNavOpen]=useState(false);
  const [showLogbook,setShowLogbook]=useState(false);
  const [search,setSearch]=useState("");
  const [wf,setWf]=useState("All");
  const [pf,setPf]=useState("All");

  const isRef=window.location.hash==="#refer";

  useEffect(()=>{
    (async()=>{
      const[p,pr]=await Promise.all([DB.getPts(),DB.getProtos()]);
      setPts(p);setProtos(pr);setLoading(false);
    })();
  },[]);

  const addPt=async p=>{await DB.savePt(p);setPts(prev=>[p,...prev.filter(x=>x.id!==p.id)]);};
  const updPt=async p=>{await DB.savePt(p);setPts(prev=>prev.map(x=>x.id===p.id?p:x));};
  const delPt=async id=>{await DB.delPt(id);setPts(prev=>prev.filter(x=>x.id!==id));};
  const saveProtos=async pr=>{setProtos(pr);await DB.saveProtos(pr);};
  const logout=()=>{LS.s('gmc_sess',null);setUser(null);setNavOpen(false);};
  const go=(id)=>{setView(id);setNavOpen(false);};

  if(isRef)return<RefPortal protos={protos} allPts={pts} onSubmit={addPt} onUpdate={updPt}/>;
  if(!user)return<Login onLogin={setUser}/>;
  if(loading)return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column",gap:14}}>
      <div className="spin" style={{width:36,height:36,border:"3px solid #1E3A5F",borderTopColor:C.accent,borderRadius:"50%"}}></div>
      <div style={{color:C.sub}}>Loading GMC Plastics v6...</div>
    </div>
  );

  const filt=pts.filter(p=>{
    const s=search.toLowerCase();
    return(!s||p.name.toLowerCase().includes(s)||p.id.toLowerCase().includes(s)||p.diagnosis.toLowerCase().includes(s)||(p.resident||"").toLowerCase().includes(s)||(p.contact||"").includes(s))
      &&(wf==="All"||p.ward===wf)&&(pf==="All"||p.priority===pf);
  });
  const wardPts=filt.filter(p=>p.refType!=="Reference");
  const refPts=filt.filter(p=>p.refType==="Reference");
  const qPts=pts.filter(p=>p.allInvestigationsDone||LS.g('q_'+p.id,false));
  const shareUrl=`${window.location.href.split('#')[0]}#refer`;

  const NAV=[
    {id:"dashboard",icon:"🏠",label:"Dashboard"},
    {id:"ward",icon:"🛏️",label:"Ward Patients",cnt:pts.filter(p=>p.refType!=="Reference").length},
    {id:"references",icon:"📨",label:"References",cnt:refPts.length},
    {id:"otqueue",icon:"🏥",label:"OT Queue",cnt:qPts.length},
    {id:"protocols",icon:"📋",label:"Protocol Manager"},
  ];

  const SC=({value,label,color,icon,onClick})=>(
    <div onClick={onClick} style={{background:C.card,border:`1px solid ${C.b}`,borderRadius:12,padding:"14px 16px",borderTop:`3px solid ${color}`,cursor:onClick?"pointer":"default"}}>
      <div style={{fontSize:24,fontWeight:800,color:C.t}}>{value}</div>
      <div style={{fontSize:11,color:C.sub,marginTop:3,textTransform:"uppercase"}}>{icon} {label}</div>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:C.bg}}>

      {/* ─── TOP BAR ─── */}
      <div style={{position:"sticky",top:0,zIndex:150,background:C.panel,borderBottom:`1px solid ${C.b}`,padding:"0 14px",height:54,display:"flex",alignItems:"center",gap:10}}>
        {/* Hamburger — simple state toggle, NO portals */}
        <button
          onClick={()=>setNavOpen(v=>!v)}
          style={{background:"transparent",border:`1px solid ${C.b}`,borderRadius:8,width:40,height:40,cursor:"pointer",flexShrink:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:5,padding:0}}
        >
          <div style={{width:16,height:2,background:C.t,borderRadius:2}}></div>
          <div style={{width:16,height:2,background:C.t,borderRadius:2}}></div>
          <div style={{width:16,height:2,background:C.t,borderRadius:2}}></div>
        </button>

        <div style={{fontWeight:800,color:C.t,fontSize:15,fontFamily:"Syne",flex:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
          {NAV.find(n=>n.id===view)?.icon} {NAV.find(n=>n.id===view)?.label||"GMC Plastics"}
        </div>

        <button onClick={()=>setShowAdd(true)} style={{...S.btn("p"),padding:"8px 14px",fontSize:13,flexShrink:0}}>
          ➕
        </button>

        <button onClick={logout} style={{...S.btnSm(),flexShrink:0}} title="Sign out">
          👤
        </button>
      </div>

      {/* ─── NAV DRAWER ─── uses simple conditional render, NOT portal ─── */}
      {navOpen&&(
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:200}}>
          {/* backdrop */}
          <div
            onClick={()=>setNavOpen(false)}
            style={{position:"absolute",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.6)"}}
          />
          {/* drawer */}
          <div style={{position:"absolute",top:0,left:0,bottom:0,width:270,background:C.panel,borderRight:`1px solid ${C.b}`,display:"flex",flexDirection:"column",zIndex:1}} className="sr">
            <div style={{padding:"18px 20px",borderBottom:`1px solid ${C.b}`}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                <div style={{width:36,height:36,borderRadius:10,background:`linear-gradient(135deg,#1D4ED8,${C.accent})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🏥</div>
                <div>
                  <div style={{fontSize:14,fontWeight:800,color:C.t,fontFamily:"Syne"}}>GMC Plastics</div>
                  <div style={{fontSize:11,color:C.sub}}>PMS v6</div>
                </div>
              </div>
              <div style={{fontSize:12,color:C.sub}}>Dr. {user.name} · {user.role}</div>
            </div>
            <div style={{flex:1,overflowY:"auto",padding:"8px 0"}}>
              {NAV.map(item=>(
                <div key={item.id} style={S.navItem(view===item.id)} onClick={()=>go(item.id)}>
                  <span style={{fontSize:18}}>{item.icon}</span>
                  <span style={{flex:1}}>{item.label}</span>
                  {item.cnt!==undefined&&<span style={{background:view===item.id?C.accent:C.card,color:"#fff",borderRadius:10,padding:"2px 8px",fontSize:12,fontWeight:700,border:`1px solid ${C.b}`}}>{item.cnt}</span>}
                </div>
              ))}
              <div style={S.navItem(false)} onClick={()=>{setShowLogbook(true);setNavOpen(false);}}>
                <span style={{fontSize:18}}>📚</span>
                <span style={{flex:1}}>Case Logbook</span>
              </div>
            </div>
            <div style={{padding:"14px 20px",borderTop:`1px solid ${C.b}`}}>
              <button onClick={logout} style={{...S.btn("r"),width:"100%",fontSize:13}}>🚪 Sign Out</button>
            </div>
          </div>
        </div>
      )}

      {/* ─── MAIN ─── */}
      <div style={{padding:"14px 14px",maxWidth:980,margin:"0 auto"}}>

        {/* Search + filters */}
        <div style={{marginBottom:14,display:"flex",gap:8,flexWrap:"wrap"}}>
          <input style={{...S.inp,flex:1,minWidth:160}} placeholder="🔍 Search name, IPD, diagnosis..." value={search} onChange={e=>setSearch(e.target.value)}/>
          <select style={{...S.sel,width:130}} value={wf} onChange={e=>setWf(e.target.value)}>
            <option value="All">All Wards</option>{WARDS.map(w=><option key={w}>{w}</option>)}
          </select>
          <select style={{...S.sel,width:120}} value={pf} onChange={e=>setPf(e.target.value)}>
            <option value="All">All Priority</option>{Object.keys(PRIO).map(p=><option key={p}>{p}</option>)}
          </select>
        </div>

        {/* DASHBOARD */}
        {view==="dashboard"&&(
          <div>
            <div style={{fontFamily:"Syne",fontSize:20,fontWeight:800,color:C.t,marginBottom:3}}>Dashboard</div>
            <div style={{fontSize:12,color:C.sub,marginBottom:16}}>Dept. of Plastic & Reconstructive Surgery · GMC Mumbai</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:10}}>
              <SC value={pts.length} label="Total" color={C.accent} icon="🛏️"/>
              <SC value={pts.filter(p=>p.priority==="Emergency").length} label="Emergency" color="#EF4444" icon="🚨"/>
              <SC value={qPts.length} label="OT Ready" color={C.ok} icon="✅"/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:14}}>
              <SC value={pts.filter(p=>p.priority==="Urgent").length} label="Urgent" color="#FF7043" icon="⚡"/>
              <SC value={refPts.length} label="References" color={C.purple} icon="📨"/>
              <SC value={DB.getLogbook().length} label="Log Entries" color={C.teal} icon="📚" onClick={()=>setShowLogbook(true)}/>
            </div>
            <div style={S.card()}>
              <div style={{fontSize:12,fontWeight:700,color:C.accent,marginBottom:10,textTransform:"uppercase"}}>📤 Reference Link</div>
              <div style={{fontSize:12,color:C.sub,marginBottom:10}}>Share with ENT, Ortho etc. They fill the form → appears in References automatically.</div>
              <div style={{display:"flex",gap:8,marginBottom:8,flexWrap:"wrap"}}>
                <input style={{...S.inp,flex:1,minWidth:160,fontSize:12}} readOnly value={shareUrl}/>

              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                <button onClick={()=>window.open(shareUrl,"_blank")} style={{...S.btnSm("p")}}>🔗 Preview</button>
                <button onClick={()=>window.open("https://wa.me/?text="+encodeURIComponent("GMC Plastic Surgery Reference Form:\n"+shareUrl),"_blank")} style={{...S.btnSm("g")}}>📲 WhatsApp</button>
              </div>
            </div>
            <div style={S.card()}>
              <div style={{fontSize:12,fontWeight:700,color:C.accent,marginBottom:10,textTransform:"uppercase"}}>Recent Patients</div>

                <div key={p.id} onClick={()=>setSel(p)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:`1px solid ${C.b}`,cursor:"pointer",gap:8}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:600,color:C.t,fontSize:14}}>{p.name}</div>
                    <div style={{fontSize:11,color:C.accent,fontFamily:"monospace"}}>{p.id}</div>
                  </div>
                  <span style={S.bdg(p.priority)}>{p.priority}</span>
                </div>

              {pts.length===0&&<div style={{color:C.sub,fontSize:13,textAlign:"center",padding:20}}>No patients — tap ➕ to add</div>}
            </div>

        )}

        {view==="ward"&&(
          <div>
            <div style={{fontFamily:"Syne",fontSize:20,fontWeight:800,color:C.t,marginBottom:3}}>Ward Patients</div>
            <div style={{fontSize:12,color:C.sub,marginBottom:14}}>{wardPts.length} patient(s)</div>
            {wardPts.length===0
              ?<div style={S.card({textAlign:"center",padding:56,color:C.sub})}><div style={{fontSize:44}}>🛏️</div><Sp h={12}/>No patients — tap ➕ to add</div>

        )}

        {view==="references"&&(
          <div>
            <div style={{fontFamily:"Syne",fontSize:20,fontWeight:800,color:C.t,marginBottom:3}}>References</div>
            <div style={{fontSize:12,color:C.sub,marginBottom:14}}>From other departments</div>
            <div style={S.card({background:`${C.accent}08`,border:`1px solid ${C.accent}25`,marginBottom:14})}>
              <div style={{fontSize:12,fontWeight:700,color:C.accent,marginBottom:8}}>📤 Shareable Link</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                <input style={{...S.inp,flex:1,minWidth:140,fontSize:11}} readOnly value={shareUrl}/>
                <button onClick={()=>{navigator.clipboard?.writeText(shareUrl).then(()=>alert("✅ Copied!"));}} style={S.btn("p")}>Copy</button>
                <button onClick={()=>window.open("https://wa.me/?text="+encodeURIComponent("GMC Plastic Surgery Reference Form:\n"+shareUrl),"_blank")} style={{...S.btn(),background:"#25D366"}}>📲</button>

            </div>
            {refPts.length===0
              ?<div style={S.card({textAlign:"center",padding:40,color:C.sub})}><div style={{fontSize:36}}>📩</div><Sp h={10}/>No references yet</div>
              :refPts.map(p=><PatCard key={p.id} patient={p} onClick={setSel} onDel={delPt} protos={protos}/>)}

        )}

        {view==="otqueue"&&(
          <div>
            <div style={{fontFamily:"Syne",fontSize:20,fontWeight:800,color:C.t,marginBottom:3}}>OT Queue</div>
            <div style={{fontSize:12,color:C.sub,marginBottom:14}}>Emergency → Urgent → Semi-Urgent → Elective</div>
            {qPts.length===0
              ?<div style={S.card({textAlign:"center",padding:56,color:C.sub})}><div style={{fontSize:44}}>🏥</div><Sp h={12}/>No patients cleared for OT</div>
              :[...qPts].sort((a,b)=>["Emergency","Urgent","Semi-Urgent","Elective"].indexOf(a.priority)-["Emergency","Urgent","Semi-Urgent","Elective"].indexOf(b.priority)).map((p,i)=>{
                const pr=PRIO[p.priority];
                return(
                  <div key={p.id} onClick={()=>setSel(p)} style={S.card({borderLeft:`4px solid ${pr.c}`,cursor:"pointer"})} className="fu">
                    <div style={{display:"flex",alignItems:"center",gap:12}}>
                      <div style={{width:36,height:36,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:15,background:`${pr.c}18`,color:pr.c,flexShrink:0}}>{i+1}</div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:700,color:C.t,fontSize:14}}>{p.name} <span style={S.bdg(p.priority)}>{pr.i}</span></div>
                        <div style={{fontSize:11,color:C.accent,fontFamily:"monospace"}}>{p.id}</div>
                        <div style={{fontSize:12,color:C.sub,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.diagnosis}</div>
                      </div>

                  </div>
                );
              })}
          </div>
        )}

        {view==="protocols"&&<ProtoManager protos={protos} onSave={saveProtos}/>}
      </div>

      {/* Modals */}
      {showAdd&&<PatForm onSave={async p=>{await addPt(p);setShowAdd(false);setView("ward");}} onClose={()=>setShowAdd(false)} protos={protos}/>}
      {sel&&<PatDetail patient={sel} onClose={()=>setSel(null)} onUpdate={async p=>{await updPt(p);setSel(p);}} protos={protos} user={user}/>}
      {showLogbook&&<Logbook pts={pts} protos={protos} user={user} onClose={()=>setShowLogbook(false)}/>}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
