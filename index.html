        {/* INVESTIGATIONS */}
        {page==="inv"&&(
          <div>
            <div style={{fontWeight:800,fontSize:14,color:C.t,marginBottom:4}}>🧪 Enter Investigation Results</div>
            <div style={{fontSize:11,color:C.sub,marginBottom:12}}>Fill in available values — leave blank if not done</div>
            <div style={{marginBottom:10}}>
              <div style={{fontSize:11,fontWeight:700,color:C.sub,marginBottom:4}}>Date of Investigation</div>
              <input type="date" style={S.inp} value={invDate} onChange={e=>setInvDate(e.target.value)}/>
            </div>
            {INV_GROUPS.map(function(g){return(
              <div key={g.id} style={{background:C.card,borderRadius:12,border:"1px solid "+C.b,padding:12,marginBottom:10}}>
                <div style={{fontWeight:700,fontSize:12,color:C.accent,marginBottom:8}}>{g.label}</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  {g.fields.map(function(f){return(
                    <div key={f}>
                      <div style={{fontSize:10,color:C.sub,fontWeight:600,marginBottom:3}}>{f}</div>
                      <input style={{...S.inp,padding:"7px 8px",fontSize:13}} value={invVals[g.id+"_"+f]||""} onChange={e=>setInvVals(p=>({...p,[g.id+"_"+f]:e.target.value}))} placeholder="—"/>
                    </div>
                  );})}
                </div>
              </div>
            );})}
            <div style={{marginBottom:12}}>
              <div style={{fontSize:11,fontWeight:700,color:C.sub,marginBottom:4}}>Additional Notes / Remarks</div>
              <textarea style={{...S.ta,minHeight:60}} value={invNotes} onChange={e=>setInvNotes(e.target.value)} placeholder="Any additional remarks, flags, critical values..."/>
            </div>
            <button onClick={saveInvestigations} disabled={busy} style={{...S.btn("g"),width:"100%",padding:13,fontSize:14}}>
              {busy?"Saving...":"💾 Save Investigations"}
            </button>
          </div>
        )}

        {/* REFERRALS */}
        {page==="refs"&&(
          <div>
            <div style={{fontWeight:800,fontSize:14,color:C.t,marginBottom:12}}>🔗 Add Referral</div>
            <div style={{background:C.card,borderRadius:14,border:"1px solid "+C.b,padding:14}}>
              <div style={{marginBottom:10}}>
                <div style={{fontSize:11,fontWeight:700,color:C.sub,marginBottom:4}}>Refer to Department *</div>
                <input style={S.inp} value={refDept} onChange={e=>setRefDept(e.target.value)} placeholder="e.g. Ophthalmology, Cardiology..."/>
              </div>
              <div style={{marginBottom:10}}>
                <div style={{fontSize:11,fontWeight:700,color:C.sub,marginBottom:4}}>Reason / What is needed *</div>
                <textarea style={{...S.ta,minHeight:70}} value={refReason} onChange={e=>setRefReason(e.target.value)} placeholder="e.g. Pre-op cardiology fitness, fundus examination..."/>
              </div>
              <div style={{marginBottom:14}}>
                <div style={{fontSize:11,fontWeight:700,color:C.sub,marginBottom:4}}>Priority</div>
                <select style={S.inp} value={refPriority} onChange={e=>setRefPriority(e.target.value)}>
                  <option>Emergency</option><option>Urgent</option><option>Semi-Urgent</option><option>Elective</option>
                </select>
              </div>
              <button onClick={saveReferral} disabled={busy} style={{...S.btn("p"),width:"100%",padding:12}}>
                {busy?"Saving...":"📤 Add Referral"}
              </button>
            </div>
            {/* Existing refs */}
            {LS.g("refs_"+pt.id,[]).length>0&&(
              <div style={{marginTop:14}}>
                <div style={{fontWeight:700,fontSize:12,color:C.sub,marginBottom:8}}>EXISTING REFERRALS</div>
                {LS.g("refs_"+pt.id,[]).map(function(r){return(
                  <div key={r.id} style={{background:C.card,borderRadius:10,border:"1px solid "+C.b,padding:"10px 12px",marginBottom:8}}>
                    <div style={{fontWeight:700,fontSize:13,color:C.t}}>{r.dept}</div>
                    <div style={{fontSize:11,color:C.sub,marginTop:2}}>{r.reason}</div>
                    <div style={{fontSize:10,color:C.accent,marginTop:4}}>{r.priority} · {r.status} · {r.date}</div>
                  </div>
                );})}
              </div>
            )}
          </div>
        )}

        {/* UPLOAD */}
        {page==="upload"&&(
          <div>
            <div style={{fontWeight:800,fontSize:14,color:C.t,marginBottom:12}}>📎 Upload Files / Reports</div>
            <div style={{background:C.card,borderRadius:14,border:"1px solid "+C.b,padding:14}}>
              <div style={{marginBottom:10}}>
                <div style={{fontSize:11,fontWeight:700,color:C.sub,marginBottom:4}}>Category</div>
                <select style={S.inp} value={uploadSec} onChange={e=>setUploadSec(e.target.value)}>
                  {SECTIONS_UPLOAD.map(function(s){return <option key={s.id} value={s.id}>{s.label}</option>;})}
                </select>
              </div>
              <div style={{marginBottom:14}}>
                <div style={{fontSize:11,fontWeight:700,color:C.sub,marginBottom:4}}>Select Files (images / PDF)</div>
                <input type="file" multiple accept="image/*,application/pdf" onChange={e=>setFiles(Array.from(e.target.files))} style={{fontSize:12,color:C.sub,width:"100%"}}/>
                {files.length>0&&<div style={{fontSize:11,color:C.ok,marginTop:6,fontWeight:700}}>{files.length} file(s) selected</div>}
              </div>
              <button onClick={uploadFiles} disabled={uploading} style={{...S.btn("g"),width:"100%",padding:12}}>
                {uploading?"Uploading...":"📤 Upload to Patient File"}
              </button>
            </div>
          </div>
        )}

        {/* NOTES */}
        {page==="notes"&&(
          <div>
            <div style={{fontWeight:800,fontSize:14,color:C.t,marginBottom:12}}>📝 Clinical Notes / Findings</div>
            <div style={{background:C.card,borderRadius:14,border:"1px solid "+C.b,padding:14}}>
              <textarea style={{...S.ta,minHeight:150}} value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Enter clinical findings, examination notes, recommendations, opinion from your department..."/>
              <button onClick={saveNotes} disabled={busy} style={{...S.btn("p"),width:"100%",padding:12,marginTop:10}}>
                {busy?"Saving...":"💾 Save Notes"}
              </button>
            </div>
            {(pt.externalNotes||[]).length>0&&(
              <div style={{marginTop:14}}>
                <div style={{fontWeight:700,fontSize:12,color:C.sub,marginBottom:8}}>PREVIOUS NOTES</div>
                {(pt.externalNotes||[]).map(function(n){return(
                  <div key={n.id} style={{background:C.card,borderRadius:10,border:"1px solid "+C.b,padding:"10px 12px",marginBottom:8}}>
                    <div style={{fontSize:10,color:C.sub}}>{n.date} · {n.dept}</div>
                    <div style={{fontSize:13,color:C.t,marginTop:4}}>{n.text}</div>
                  </div>
                );})}
              </div>
            )}
          </div>
        )}

      </div>

      {toast&&<div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:C.ok,color:"#fff",padding:"10px 20px",borderRadius:12,fontWeight:700,fontSize:13,zIndex:999,boxShadow:"0 4px 16px #0003"}}>{toast}</div>}
    </div>
  );
}

// WARD ROUNDS DASHBOARD
// Fast round-entry: all patients on one screen
// ═══════════════════════════════════
function WardRoundsView({pts,onOpenPatient}){
  const today=new Date().toISOString().split("T")[0];
  const [expanded,setExpanded]=useState(null); // patient id
  const [roundData,setRoundData]=useState({}); // {pid: {notes,tasks,vitals}}
  const [filter,setFilter]=useState("All");
  const STATUS_ORDER=["Active Management","Pre-Op Workup","Cleared for OT","Post-Op","Follow Up"];
  const STATUS_COL={"Pre-Op Workup":"#F59E0B","Active Management":"#3B82F6","Cleared for OT":"#22C55E","Post-Op":"#A855F7","Follow Up":"#06B6D4","Discharged":"#6B7280"};

  // Load today's round data per patient from LS
  useEffect(()=>{
    const d={};
    pts.forEach(function(p){
      const all=LS.g("wr_"+p.id,[]);
      const todayRound=all.find(function(r){return r.date===today;});
      if(todayRound){
        d[p.id]={notes:todayRound.notes||"",tasks:todayRound.tasks||[],vitals:todayRound.vitals||{},saved:true};
      } else {
        // Pre-fill undone tasks from yesterday
        const yesterday=all[0];
        const carry=yesterday?(yesterday.tasks||[]).filter(function(t){return !t.done;}).map(function(t){return{...t,done:false,id:Date.now()+Math.random()};})
        :[];
        d[p.id]={notes:"",tasks:carry,vitals:{},saved:false};
      }
    });
    setRoundData(d);
  },[pts]);

  const getRD=(pid)=>roundData[pid]||{notes:"",tasks:[],vitals:{},saved:false};

  const saveRound=(pid)=>{
    const rd=getRD(pid);
    if(!rd.notes.trim()&&rd.tasks.length===0)return;
    const all=LS.g("wr_"+pid,[]).filter(function(r){return r.date!==today;});
    LS.s("wr_"+pid,[{id:Date.now(),date:today,notes:rd.notes,tasks:rd.tasks,vitals:rd.vitals,photos:[]},...all]);
    setRoundData(p=>({...p,[pid]:{...rd,saved:true}}));
  };

  const updRD=(pid,key,val)=>{
    setRoundData(p=>({...p,[pid]:{...getRD(pid),[key]:val,saved:false}}));
  };

  const toggleTask=(pid,tid)=>{
    const rd=getRD(pid);
    const tasks=rd.tasks.map(function(t){return t.id===tid?{...t,done:!t.done}:t;});
    setRoundData(p=>({...p,[pid]:{...rd,tasks,saved:false}}));
  };

  const addTask=(pid,text)=>{
    if(!text.trim())return;
    const rd=getRD(pid);
    setRoundData(p=>({...p,[pid]:{...rd,tasks:[...rd.tasks,{id:Date.now(),text:text.trim(),done:false,photos:[]}],saved:false}}));
  };

  const markAllDone=(pid)=>{
    const rd=getRD(pid);
    setRoundData(p=>({...p,[pid]:{...rd,tasks:rd.tasks.map(function(t){return{...t,done:true};}),saved:false}}));
  };

  const wardPts=pts.filter(function(p){return p.refType!=="Reference" && p.status!=="Discharged";});
  const filtered=filter==="All"?wardPts:wardPts.filter(function(p){return p.status===filter;});

  // Count done rounds today
  const doneToday=wardPts.filter(function(p){return getRD(p.id).saved;}).length;

  return(
    <div style={{paddingBottom:80}}>
      {/* Header stats */}
      <div style={{background:C.card,borderRadius:14,border:"1px solid "+C.b,padding:"14px",marginBottom:14,display:"flex",gap:14,alignItems:"center"}}>
        <div style={{flex:1}}>
          <div style={{fontSize:11,color:C.sub,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.5px"}}>Today's Rounds</div>
          <div style={{fontSize:22,fontWeight:800,color:C.t,fontFamily:"Syne",marginTop:2}}>{doneToday} <span style={{fontSize:14,color:C.sub,fontWeight:400}}>/ {wardPts.length} done</span></div>
          <div style={{fontSize:11,color:C.sub,marginTop:2}}>{today}</div>
        </div>
        <div style={{width:60,height:60,borderRadius:"50%",background:C.bg,border:"3px solid "+(doneToday===wardPts.length&&wardPts.length>0?C.ok:C.accent),display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",flexShrink:0}}>
          <div style={{fontSize:18,fontWeight:800,color:doneToday===wardPts.length&&wardPts.length>0?C.ok:C.accent}}>{wardPts.length>0?Math.round(doneToday/wardPts.length*100):0}%</div>
        </div>
      </div>

      {/* Status filter chips */}
      <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:8,marginBottom:12,WebkitOverflowScrolling:"touch"}}>
        {["All",...STATUS_ORDER].map(function(s){
          const cnt=s==="All"?wardPts.length:wardPts.filter(function(p){return p.status===s;}).length;
          return cnt===0&&s!=="All"?null:(
            <button key={s} onClick={()=>setFilter(s)} style={{flexShrink:0,padding:"7px 12px",borderRadius:20,border:"1px solid "+(filter===s?(STATUS_COL[s]||C.accent):C.b),background:filter===s?(STATUS_COL[s]||C.accent)+"20":"transparent",color:filter===s?(STATUS_COL[s]||C.accent):C.sub,fontSize:12,fontWeight:filter===s?700:400,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>
              {s} {cnt}
            </button>
          );
        })}
      </div>

      {/* Patient cards */}
      {filtered.map(function(p){
        const rd=getRD(p.id);
        const isOpen=expanded===p.id;
        const col=STATUS_COL[p.status]||C.accent;
        const doneTasks=(rd.tasks||[]).filter(function(t){return t.done;}).length;
        const totalTasks=(rd.tasks||[]).length;
        return(
          <div key={p.id} style={{background:C.card,borderRadius:14,border:"1px solid "+C.b,marginBottom:10,borderLeft:"3px solid "+(rd.saved?C.ok:col),overflow:"hidden"}}>
            {/* Patient row - always visible */}
            <div onClick={()=>setExpanded(isOpen?null:p.id)} style={{padding:"12px 14px",cursor:"pointer",display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:40,height:40,borderRadius:10,background:col+"20",border:"1px solid "+col+"40",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:800,color:col,flexShrink:0}}>
                {p.name.charAt(0)}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:800,fontSize:14,color:C.t,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.name}</div>
                <div style={{fontSize:11,color:C.sub,marginTop:1}}>{p.age}y/{p.gender} · {p.ward}{p.ipNumber?" · "+p.ipNumber:""}</div>
                <div style={{fontSize:12,color:col,marginTop:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.diagnosis}</div>
              </div>
              <div style={{textAlign:"right",flexShrink:0}}>
                {rd.saved?<span style={{fontSize:11,color:C.ok,fontWeight:700}}>✅ Done</span>:<span style={{fontSize:11,color:col,fontWeight:600}}>{p.status}</span>}
                {totalTasks>0&&<div style={{fontSize:11,color:C.sub,marginTop:2}}>{doneTasks}/{totalTasks} tasks</div>}
                <div style={{fontSize:16,color:C.sub,marginTop:4}}>{isOpen?"▲":"▼"}</div>
              </div>
            </div>

            {/* Expanded round entry */}
            {isOpen&&(
              <div style={{borderTop:"1px solid "+C.b,padding:"12px 14px",background:C.bg}}>
                {/* Quick vitals */}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6,marginBottom:12}}>
                  {[["PR","bpm"],["BP","mmHg"],["SPO2","%"],["Temp","°F"]].map(function(v){return(
                    <div key={v[0]}>
                      <div style={{fontSize:10,color:C.sub,fontWeight:600,marginBottom:3}}>{v[0]} <span style={{opacity:0.6}}>({v[1]})</span></div>
                      <input style={{...S.inp,padding:"7px 8px",fontSize:13,fontWeight:700,textAlign:"center"}} value={(rd.vitals||{})[v[0]]||""} onChange={e=>updRD(p.id,"vitals",{...(rd.vitals||{}),[v[0]]:e.target.value})} placeholder="--"/>
                    </div>
                  );})}
                </div>

                {/* Notes */}
                <div style={{marginBottom:10}}>
                  <div style={{fontSize:11,fontWeight:700,color:C.sub,marginBottom:4}}>📝 Round Notes</div>
                  <textarea style={{...S.ta,minHeight:60,fontSize:13}} value={rd.notes} onChange={e=>updRD(p.id,"notes",e.target.value)} placeholder="Patient condition, plan, instructions..."/>
                </div>

                {/* Tasks */}
                <div style={{marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                    <div style={{fontSize:11,fontWeight:700,color:C.sub}}>✅ Tasks</div>
                    {(rd.tasks||[]).length>0&&<button onClick={()=>markAllDone(p.id)} style={{...S.btnSm("g"),padding:"3px 10px",fontSize:11}}>Mark All Done</button>}
                  </div>
                  {(rd.tasks||[]).map(function(t){return(
                    <div key={t.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:"1px solid "+C.b+"30"}}>
                      <button onClick={()=>toggleTask(p.id,t.id)} style={{width:24,height:24,borderRadius:6,border:"2px solid "+(t.done?C.ok:C.b),background:t.done?C.ok:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontFamily:"inherit",color:"#fff",fontSize:13}}>
                        {t.done?"✓":""}
                      </button>
                      <span style={{fontSize:13,color:C.t,flex:1,textDecoration:t.done?"line-through":"none",opacity:t.done?0.5:1}}>{t.text}</span>
                    </div>
                  );})}
                  <TaskAdder onAdd={(txt)=>addTask(p.id,txt)}/>
                </div>

                {/* Action buttons */}
                <div style={{display:"flex",gap:8,marginTop:4}}>
                  <button onClick={()=>{saveRound(p.id);setExpanded(null);}} style={{...S.btn("g"),flex:2,padding:"11px"}}>💾 Save &amp; Next</button>
                  <button onClick={()=>onOpenPatient(p)} style={{...S.btn("ghost"),flex:1,padding:"11px",fontSize:12}}>📂 Full File</button>
                </div>
              </div>
            )}
          </div>
        );
      })}
      {filtered.length===0&&<div style={{textAlign:"center",padding:"40px 20px",color:C.sub}}><div style={{fontSize:40,marginBottom:8}}>🩺</div><div style={{fontWeight:700,fontSize:14}}>No active ward patients</div></div>}
    </div>
  );
}

function TaskAdder({onAdd}){
  const [txt,setTxt]=useState("");
  return(
    <div style={{display:"flex",gap:6,marginTop:8}}>
      <input style={{...S.inp,flex:1,fontSize:13}} value={txt} onChange={e=>setTxt(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&txt.trim()){onAdd(txt);setTxt("");}}} placeholder="Add task... (Enter)"/>
      <button onClick={()=>{if(txt.trim()){onAdd(txt);setTxt("");}}} style={{...S.btnSm("p"),padding:"8px 12px"}}>+</button>
    </div>
  );
}

// OT LIST GENERATOR

function OTListGenerator({pts,user}){
  const today=new Date().toISOString().split("T")[0];
  const [otDate,setOtDate]=useState(today);
  const [otNo,setOtNo]=useState("OT-1");
  const [surgeon,setSurgeon]=useState(user.name||"");
  const [anaType,setAnaType]=useState("GA");
  const [search,setSearch]=useState("");
  const [selected,setSelected]=useState([]);
  const [showPicker,setShowPicker]=useState(true);

  const wardPts=pts.filter(function(p){
    const s=search.toLowerCase();
    if(!s)return true;
    return (p.name||"").toLowerCase().includes(s)||(p.ward||"").toLowerCase().includes(s)||(p.diagnosis||"").toLowerCase().includes(s)||(p.ipNumber||"").toLowerCase().includes(s);
  });

  const isSelected=(id)=>selected.some(function(s){return s.ptId===id;});

  const togglePt=(pt)=>{
    if(isSelected(pt.id)){
      setSelected(function(prev){return prev.filter(function(s){return s.ptId!==pt.id;});});
    } else {
      setSelected(function(prev){return [...prev,{ptId:pt.id,name:pt.name||"Unknown",age:pt.age||"—",gender:pt.gender||"—",ward:pt.ward||"—",ipNumber:pt.ipNumber||"",diagnosis:pt.diagnosis||"—",procedure:"",anaesthesia:anaType,position:"Supine",surgeon:surgeon,notes:""}];});
    }
  };

  const updateSel=(ptId,key,val)=>setSelected(function(prev){return prev.map(function(s){return s.ptId===ptId?{...s,[key]:val}:s;});});
  const moveUp=(idx)=>{if(idx===0)return;setSelected(function(prev){var a=[...prev];var t=a[idx-1];a[idx-1]=a[idx];a[idx]=t;return a;});};
  const moveDown=(idx)=>setSelected(function(prev){if(idx===prev.length-1)return prev;var a=[...prev];var t=a[idx+1];a[idx+1]=a[idx];a[idx]=t;return a;});

  const printOTList=()=>{
    if(selected.length===0)return alert("Add at least one patient to the OT list");
    var missing=selected.filter(function(s){return !s.procedure.trim();});
    if(missing.length>0)return alert("Enter planned procedure for: "+missing.map(function(s){return s.name;}).join(", "));
    var rows=selected.map(function(s,i){
      return "<tr style='border-bottom:1px solid #ddd'>"
        +"<td style='padding:7px 6px;font-weight:700;text-align:center'>"+(i+1)+"</td>"
        +"<td style='padding:7px 6px'><b>"+s.name+"</b><br/><small>"+s.age+"y/"+s.gender+" | "+s.ipNumber+"</small></td>"
        +"<td style='padding:7px 6px;font-size:9pt'>"+s.ward+"</td>"
        +"<td style='padding:7px 6px;font-size:9pt'>"+s.diagnosis+"</td>"
        +"<td style='padding:7px 6px;font-weight:600;color:#1B3A6B'>"+s.procedure+"</td>"
        +"<td style='padding:7px 6px;font-size:9pt;text-align:center'>"+s.anaesthesia+"</td>"
        +"<td style='padding:7px 6px;font-size:9pt'>"+s.surgeon+"</td>"
        +"<td style='padding:7px 6px;font-size:9pt;color:#666'>"+s.notes+"</td>"
        +"</tr>";
    }).join("");
    var html="<!DOCTYPE html><html><head><title>OT List</title><style>body{font-family:Arial;font-size:10pt;margin:12mm}table{width:100%;border-collapse:collapse;margin-top:12px}th{background:#1B3A6B;color:#fff;padding:8px 6px;font-size:9pt;text-align:left}tr:nth-child(even){background:#f5f8ff}.hdr{border-bottom:3px solid #1B3A6B;padding-bottom:10px;display:flex;justify-content:space-between}.sig{margin-top:30px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}.sig div{border-top:1px solid #333;padding-top:6px;font-size:9pt;text-align:center}@media print{body{margin:8mm}}</style></head><body>"
      +"<div class='hdr'><div><h2 style='margin:0;color:#1B3A6B'>GMC — Plastic Surgery</h2><h3 style='margin:4px 0 0;color:#1B3A6B'>Operation Theatre List</h3></div>"
      +"<div style='text-align:right;font-size:9pt'><b style='font-size:11pt;color:#1B3A6B'>"+otNo+"</b><br/>Date: <b>"+otDate+"</b><br/>Surgeon: <b>"+surgeon+"</b><br/>Cases: <b>"+selected.length+"</b></div></div>"
      +"<table><thead><tr><th>#</th><th>Patient</th><th>Ward</th><th>Diagnosis</th><th>Planned Procedure</th><th>Anaesthesia</th><th>Surgeon</th><th>Notes</th></tr></thead><tbody>"+rows+"</tbody></table>"
      +"<div class='sig'><div>Surgeon<br/>"+surgeon+"</div><div>Anaesthetist</div><div>OT In-charge</div></div>"
      +"<p style='font-size:8pt;color:#aaa;margin-top:16px;text-align:center'>GMC Plastics PMS · "+new Date().toLocaleDateString("en-IN")+"</p>"
      +"</body></html>";
    var w=window.open("","_blank");w.document.write(html);w.document.close();w.focus();setTimeout(function(){w.print();},600);
  };

  return(
    <div style={{paddingBottom:80}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
        <div>
          <div style={{fontFamily:"Syne",fontSize:20,fontWeight:800,color:C.t}}>🗒️ OT List Generator</div>
          <div style={{fontSize:12,color:C.sub,marginTop:2}}>{selected.length} patient{selected.length!==1?"s":""} on list</div>
        </div>
        <button onClick={printOTList} style={{...S.btn("p"),padding:"10px 14px",fontSize:13}}>🖨️ Print</button>
      </div>

      <div style={{background:C.card,borderRadius:14,border:"1px solid "+C.b,padding:14,marginBottom:12}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div><div style={{fontSize:11,fontWeight:700,color:C.sub,marginBottom:4}}>OT Date</div><input type="date" style={S.inp} value={otDate} onChange={e=>setOtDate(e.target.value)}/></div>
          <div><div style={{fontSize:11,fontWeight:700,color:C.sub,marginBottom:4}}>OT Number</div>
            <select style={S.inp} value={otNo} onChange={e=>setOtNo(e.target.value)}>
              {["OT-1","OT-2","OT-3","Emergency OT","Minor OT"].map(function(o){return <option key={o}>{o}</option>;})}
            </select>
          </div>
          <div><div style={{fontSize:11,fontWeight:700,color:C.sub,marginBottom:4}}>Surgeon</div><input style={S.inp} value={surgeon} onChange={e=>setSurgeon(e.target.value)} placeholder="Surgeon name"/></div>
          <div><div style={{fontSize:11,fontWeight:700,color:C.sub,marginBottom:4}}>Default Anaesthesia</div>
            <select style={S.inp} value={anaType} onChange={e=>setAnaType(e.target.value)}>
              {["GA","SA","LA","Epidural","Regional Block","MAC"].map(function(a){return <option key={a}>{a}</option>;})}
            </select>
          </div>
        </div>
      </div>

      <div style={{display:"flex",gap:8,marginBottom:12}}>
        <button onClick={()=>setShowPicker(true)} style={{flex:1,padding:10,borderRadius:10,border:"none",background:showPicker?C.accent:C.card,color:showPicker?"#fff":C.sub,fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>
          ➕ Add Patients ({pts.length})
        </button>
        <button onClick={()=>setShowPicker(false)} style={{flex:1,padding:10,borderRadius:10,border:"none",background:!showPicker?C.accent:C.card,color:!showPicker?"#fff":C.sub,fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>
          📋 OT List ({selected.length})
        </button>
      </div>

      {showPicker&&(
        <div>
          <input style={{...S.inp,marginBottom:10}} value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search name, ward, diagnosis..."/>
          {wardPts.length===0&&<div style={{textAlign:"center",padding:30,color:C.sub}}>No patients found</div>}
          {wardPts.map(function(p){
            var sel=isSelected(p.id);
            return(
              <div key={p.id} onClick={()=>togglePt(p)} style={{background:sel?C.accent+"18":C.card,border:"2px solid "+(sel?C.accent:C.b),borderRadius:12,padding:"11px 14px",marginBottom:8,cursor:"pointer",display:"flex",alignItems:"center",gap:12,transition:"all 0.15s"}}>
                <div style={{width:26,height:26,borderRadius:6,border:"2px solid "+(sel?C.accent:C.b),background:sel?C.accent:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all 0.15s"}}>
                  {sel&&<span style={{color:"#fff",fontSize:15,fontWeight:800}}>✓</span>}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:13,color:C.t}}>{p.name}</div>
                  <div style={{fontSize:11,color:C.sub}}>{p.age}y/{p.gender} · {p.ward||"—"} · IP: {p.ipNumber||"—"}</div>
                  <div style={{fontSize:11,color:sel?C.accent:C.mu,marginTop:1,fontWeight:sel?700:400}}>{p.diagnosis}</div>
                </div>
                <div style={{fontSize:12,background:sel?C.accent:C.card,color:sel?"#fff":C.sub,padding:"4px 10px",borderRadius:8,fontWeight:700,border:"1px solid "+(sel?C.accent:C.b),flexShrink:0}}>{sel?"✓ Added":"+ Add"}</div>
              </div>
            );
          })}
          {selected.length>0&&<button onClick={()=>setShowPicker(false)} style={{...S.btn("g"),width:"100%",padding:13,fontSize:14,marginTop:6}}>View OT List ({selected.length}) →</button>}
        </div>
      )}

      {!showPicker&&(
        <div>
          {selected.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:C.sub}}><div style={{fontSize:40,marginBottom:10}}>🗒️</div><div style={{fontWeight:700}}>No patients added yet</div><button onClick={()=>setShowPicker(true)} style={{...S.btn("p"),marginTop:12,padding:"10px 20px"}}>➕ Add Patients</button></div>}
          {selected.map(function(s,idx){return(
            <div key={s.ptId} style={{background:C.card,borderRadius:14,border:"1px solid "+(s.procedure.trim()?C.b:C.warn+"88"),padding:14,marginBottom:10}}>
              <div style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:10}}>
                <div style={{width:30,height:30,borderRadius:8,background:C.accent,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:14,color:"#fff",flexShrink:0}}>{idx+1}</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:800,fontSize:14,color:C.t}}>{s.name}</div>
                  <div style={{fontSize:11,color:C.sub}}>{s.age}y/{s.gender} · {s.ward} · {s.ipNumber}</div>
                  <div style={{fontSize:11,color:C.mu}}>{s.diagnosis}</div>
                </div>
                <div style={{display:"flex",gap:4,flexShrink:0}}>
                  <button onClick={()=>moveUp(idx)} disabled={idx===0} style={{...S.btnSm("ghost"),opacity:idx===0?0.3:1,padding:"5px 9px"}}>↑</button>
                  <button onClick={()=>moveDown(idx)} disabled={idx===selected.length-1} style={{...S.btnSm("ghost"),opacity:idx===selected.length-1?0.3:1,padding:"5px 9px"}}>↓</button>
                  <button onClick={()=>setSelected(function(p){return p.filter(function(x){return x.ptId!==s.ptId;});})} style={{...S.btnSm("r"),padding:"5px 9px"}}>✕</button>
                </div>
              </div>
              <div style={{marginBottom:8}}>
                <div style={{fontSize:11,fontWeight:700,color:s.procedure.trim()?C.sub:C.warn,marginBottom:4}}>Planned Procedure {!s.procedure.trim()&&"⚠️ Required"}</div>
                <input style={{...S.inp,borderColor:s.procedure.trim()?undefined:C.warn}} value={s.procedure} onChange={e=>updateSel(s.ptId,"procedure",e.target.value)} placeholder="e.g. SSG, Flap cover, Debridement, Amputation..."/>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                <div>
                  <div style={{fontSize:11,fontWeight:700,color:C.sub,marginBottom:4}}>Anaesthesia</div>
                  <select style={S.inp} value={s.anaesthesia} onChange={e=>updateSel(s.ptId,"anaesthesia",e.target.value)}>
                    {["GA","SA","LA","Epidural","Regional Block","MAC"].map(function(a){return <option key={a}>{a}</option>;})}
                  </select>
                </div>
                <div>
                  <div style={{fontSize:11,fontWeight:700,color:C.sub,marginBottom:4}}>Position</div>
                  <select style={S.inp} value={s.position} onChange={e=>updateSel(s.ptId,"position",e.target.value)}>
                    {["Supine","Prone","Lateral","Lithotomy","Semi-Fowler"].map(function(p){return <option key={p}>{p}</option>;})}
                  </select>
                </div>
              </div>
              <div>
                <div style={{fontSize:11,fontWeight:700,color:C.sub,marginBottom:4}}>Special Notes / Instruments</div>
                <input style={S.inp} value={s.notes} onChange={e=>updateSel(s.ptId,"notes",e.target.value)} placeholder="Consents, special instruments, blood arranged..."/>
              </div>
            </div>
          );})}
          {selected.length>0&&<button onClick={printOTList} style={{...S.btn("p"),width:"100%",padding:14,fontSize:15,marginTop:4}}>🖨️ Print OT List ({selected.length} cases)</button>}
        </div>
      )}
    </div>
  );
}

function InstallButton(){
  const [deferredPrompt,setDeferredPrompt]=useState(null);
  const [isInstalled,setIsInstalled]=useState(false);
  const [showIOSGuide,setShowIOSGuide]=useState(false);
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  const isInStandalone=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone;

  useEffect(function(){
    if(isInStandalone){setIsInstalled(true);return;}
    var handler=function(e){e.preventDefault();setDeferredPrompt(e);};
    window.addEventListener('beforeinstallprompt',handler);
    window.addEventListener('appinstalled',function(){setIsInstalled(true);setDeferredPrompt(null);});
    return function(){window.removeEventListener('beforeinstallprompt',handler);};
  },[]);

  if(isInstalled)return(
    <div style={{padding:"10px 16px",fontSize:12,color:C.ok,display:"flex",alignItems:"center",gap:8}}>
      <span>✅</span><span>App installed!</span>
    </div>
  );

  const handleInstall=async function(){
    if(deferredPrompt){
      deferredPrompt.prompt();
      var result=await deferredPrompt.userChoice;
      if(result.outcome==='accepted')setIsInstalled(true);
      setDeferredPrompt(null);
    } else if(isIOS){
      setShowIOSGuide(true);
    } else {
      alert("To install: Open in Chrome browser and tap the menu (⋮) → 'Add to Home screen'");
    }
  };

  return(
    <>
      <div onClick={handleInstall} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 16px",cursor:"pointer",borderRadius:10,margin:"2px 8px",background:"linear-gradient(135deg,"+C.accent+"22,"+C.accent+"11)",border:"1px solid "+C.accent+"40"}}>
        <span style={{fontSize:18}}>📲</span>
        <div style={{flex:1}}>
          <div style={{fontSize:13,fontWeight:700,color:C.accent}}>Install App</div>
          <div style={{fontSize:10,color:C.sub,marginTop:1}}>{isIOS?"Tap for iPhone instructions":"Add to Home Screen"}</div>
        </div>
      </div>

      {showIOSGuide&&(
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"#000a",zIndex:9999,display:"flex",alignItems:"flex-end"}} onClick={()=>setShowIOSGuide(false)}>
          <div style={{background:C.panel,width:"100%",borderRadius:"20px 20px 0 0",padding:"24px 20px 40px",border:"1px solid "+C.b}} onClick={e=>e.stopPropagation()}>
            <div style={{textAlign:"center",marginBottom:20}}>
              <div style={{fontSize:40,marginBottom:8}}>📱</div>
              <div style={{fontWeight:800,fontSize:16,color:C.t}}>Install on iPhone</div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:14}}>
              {[["1","Tap the Share button","□↑ at the bottom of Safari"],["2","Scroll down and tap","Add to Home Screen"],["3","Tap","Add in the top right corner"]].map(function(s){return(
                <div key={s[0]} style={{display:"flex",alignItems:"center",gap:14,background:C.card,borderRadius:12,padding:"12px 14px"}}>
                  <div style={{width:32,height:32,borderRadius:"50%",background:C.accent,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:14,color:"#fff",flexShrink:0}}>{s[0]}</div>
                  <div>
                    <div style={{fontSize:13,fontWeight:700,color:C.t}}>{s[1]}</div>
                    <div style={{fontSize:12,color:C.accent,marginTop:2,fontWeight:700}}>{s[2]}</div>
                  </div>
                </div>
              );})}
            </div>
            <button onClick={()=>setShowIOSGuide(false)} style={{...S.btn("p"),width:"100%",padding:14,marginTop:20,fontSize:14}}>Got it ✓</button>
          </div>
        </div>
      )}
    </>
  );
}

function App(){
  const [user,setUser]=useState(()=>{const s=LS.g('gmc_sess',null);if(s&&s.role!=="guest"&&Date.now()-s.ts<604800000)return s;return null;});
  const [view,setView]=useState("dashboard");
  const [pts,setPts]=useState([]);
  const [protos,setProtos]=useState(DP);
  const [loading,setLoading]=useState(true);
  const [sel,setSel]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const [navOpen,setNavOpen]=useState(false);
  const [showProfile,setShowProfile]=useState(false);
  const [showList,setShowList]=useState(false);
  const [showAdmin,setShowAdmin]=useState(false);
  const [showLogbook,setShowLogbook]=useState(false);
  const [search,setSearch]=useState("");
  const [wf,setWf]=useState("All");
  const [pf,setPf]=useState("All");

  const isRef=window.location.hash==="#refer";
  const uploadMatch=window.location.hash.match(/^#upload\/(.+)$/);
  const uploadPatId=uploadMatch?uploadMatch[1]:null;
  const refLinkMatch=window.location.hash.match(/^#ref\/([^?]+)/);
  const refLinkPatId=refLinkMatch?refLinkMatch[1]:null;
  const refPortalOpen=window.location.hash==="#refportal"||refLinkMatch!==null;
  const refLinkDept=new URLSearchParams((window.location.hash.split("?")[1])||"").get("dept")||"";
  const fillMatch=window.location.hash.match(/^#fill\/([^?]+)/);
  const fillPatId=fillMatch?fillMatch[1]:null;

  useEffect(()=>{
    (async()=>{
      const[p,pr]=await Promise.all([DB.getPts(),DB.getProtos()]);
      setPts(p);setProtos(pr);setLoading(false);
    })();
  },[]);

  const addPt=async p=>{await DB.savePt(p);setPts(prev=>[p,...prev.filter(x=>x.id!==p.id)]);};
  const updPt=async p=>{await DB.savePt(p);setPts(prev=>prev.map(x=>x.id===p.id?p:x));};
  const delPt=async id=>{await DB.delPt(id);setPts(prev=>prev.filter(x=>x.id!==id));};
  const saveProtos=async pr=>{setProtos(pr);await DB.saveProtos(pr);};
  const logout=()=>{LS.s('gmc_sess',null);setUser(null);setNavOpen(false);};
  const go=(id)=>{setView(id);setNavOpen(false);};

    {id:"references",icon:"📨",label:"References",cnt:refPts.length},
    {id:"otqueue",icon:"🏥",label:"OT Queue",cnt:qPts.length},

        <button onClick={()=>setShowProfile(v=>!v)} style={{...S.btnSm(),flexShrink:0,background:showProfile?C.accent:"transparent",color:showProfile?"#fff":C.t,border:"1px solid "+(showProfile?C.accent:C.b)}} title="Profile">👤</button>

            <div style={{fontSize:12,color:C.sub,marginBottom:14}}>{user.role} · GMC Hospital</div>
            <div style={{borderTop:"1px solid "+C.b,paddingTop:12,display:"flex",flexDirection:"column",gap:8}}>

              <button onClick={()=>{setShowProfile(false);logout();}} style={{...S.btn("r"),width:"100%",fontSize:13}}>🚪 Sign Out</button>
            </div>
          </div>
        )}
      </div>

      {/* ─── NAV DRAWER ─── uses simple conditional render, NOT portal ─── */}
      {navOpen&&(

            style={{position:"absolute",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.6)"}}

          <div style={{position:"absolute",top:0,left:0,bottom:0,width:270,background:C.panel,borderRight:`1px solid ${C.b}`,display:"flex",flexDirection:"column",zIndex:1}} className="sr">

              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>

                  {view==="rounds"&&(

              <div style={{display:"flex",gap:8,marginBottom:8,flexWrap:"wrap"}}>
                <input style={{...S.inp,flex:1,minWidth:160,fontSize:12}} readOnly value={shareUrl}/>

              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                <button onClick={()=>window.open(shareUrl,"_blank")} style={{...S.btnSm("p")}}>🔗 Preview</button>
                <button onClick={()=>window.open("https://wa.me/?text="+encodeURIComponent("GMC Plastic Surgery Reference Form:\n"+shareUrl),"_blank")} style={{...S.btnSm("g")}}>📲 WhatsApp</button>
              </div>
            </div>
            <div style={S.card()}>
              <div style={{fontSize:12,fontWeight:700,color:C.accent,marginBottom:10,textTransform:"uppercase"}}>Recent Patients</div>
              {pts.slice(0,6).map(p=>(
                <div key={p.id} onClick={()=>setSel(p)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:`1px solid ${C.b}`,cursor:"pointer",gap:8}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:600,color:C.t,fontSize:14}}>{p.name}</div>
                    <div style={{fontSize:11,color:C.accent,fontFamily:"monospace"}}>{p.id}</div>
                  </div>
                  <span style={S.bdg(p.priority)}>{p.priority}</span>
                </div>
              ))}
              {pts.length===0&&<div style={{color:C.sub,fontSize:13,textAlign:"center",padding:20}}>No patients — tap ➕ to add</div>}
            </div>
          </div>
        )}

        {view==="ward"&&(
          <div>
            <div style={{fontFamily:"Syne",fontSize:20,fontWeight:800,color:C.t,marginBottom:3}}>Ward Patients</div>
            <div style={{fontSize:12,color:C.sub,marginBottom:14}}>{wardPts.length} patient(s)</div>
            {wardPts.length===0
              ?<div style={S.card({textAlign:"center",padding:56,color:C.sub})}><div style={{fontSize:44}}>🛏️</div><Sp h={12}/>No patients — tap ➕ to add</div>
              :wardPts.map(p=><PatCard key={p.id} patient={p} onClick={setSel} onDel={delPt} protos={protos}/>)}
          </div>
        )}

        {view==="references"&&(
          <div>
            <div style={{fontFamily:"Syne",fontSize:20,fontWeight:800,color:C.t,marginBottom:3}}>References</div>
            <div style={{fontSize:12,color:C.sub,marginBottom:14}}>From other departments</div>
            <div style={S.card({background:`${C.accent}08`,border:`1px solid ${C.accent}25`,marginBottom:14})}>
              <div style={{fontSize:12,fontWeight:700,color:C.accent,marginBottom:8}}>📤 Shareable Link</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                <input style={{...S.inp,flex:1,minWidth:140,fontSize:11}} readOnly value={shareUrl}/>
                <button onClick={()=>{navigator.clipboard?.writeText(shareUrl).then(()=>alert("✅ Copied!"));}} style={S.btn("p")}>Copy</button>
                <button onClick={()=>window.open("https://wa.me/?text="+encodeURIComponent("GMC Plastic Surgery Reference Form:\n"+shareUrl),"_blank")} style={{...S.btn(),background:"#25D366"}}>📲</button>
              </div>
            </div>
            {refPts.length===0
              ?<div style={S.card({textAlign:"center",padding:40,color:C.sub})}><div style={{fontSize:36}}>📩</div><Sp h={10}/>No references yet</div>
              :refPts.map(p=><PatCard key={p.id} patient={p} onClick={setSel} onDel={delPt} protos={protos}/>)}
          </div>
        )}

        {view==="otqueue"&&(
          <div>
            <div style={{fontFamily:"Syne",fontSize:20,fontWeight:800,color:C.t,marginBottom:3}}>OT Queue</div>

                const w=window.open("","_blank");
                const priorities=["Emergency","Urgent","Semi-Urgent","Elective"];
                let body="";
                priorities.forEach(function(pr){
                  const grp=qPts.filter(function(p){return p.priority===pr;});
                  if(!grp.length)return;
                  body+="<h3 style='color:#1B3A6B;border-left:3px solid #1B3A6B;padding-left:8px;margin:14px 0 6px'>"+pr+" ("+grp.length+")</h3>";
                  body+="<table style='width:100%;border-collapse:collapse;font-size:9pt'><tr style='background:#1B3A6B'><th style='color:#fff;padding:6px 8px;text-align:left'>No.</th><th style='color:#fff;padding:6px 8px;text-align:left'>Patient</th><th style='color:#fff;padding:6px 8px;text-align:left'>IP No.</th><th style='color:#fff;padding:6px 8px;text-align:left'>Age/Sex</th><th style='color:#fff;padding:6px 8px;text-align:left'>Diagnosis / Procedure</th><th style='color:#fff;padding:6px 8px;text-align:left'>Surgeon</th><th style='color:#fff;padding:6px 8px;text-align:left'>Anaes.</th><th style='color:#fff;padding:6px 8px;text-align:left'>OT No.</th><th style='color:#fff;padding:6px 8px;text-align:left'>Time</th></tr>";
                  grp.forEach(function(p,i){body+="<tr><td style='padding:5px 8px;border-bottom:1px solid #eee'>"+(i+1)+"</td><td style='padding:5px 8px;border-bottom:1px solid #eee;font-weight:600'>"+p.name+"</td><td style='padding:5px 8px;border-bottom:1px solid #eee;font-family:monospace;color:#1B3A6B'>"+(p.ipNumber||p.id)+"</td><td style='padding:5px 8px;border-bottom:1px solid #eee'>"+p.age+"y/"+p.gender+"</td><td style='padding:5px 8px;border-bottom:1px solid #eee'>"+p.diagnosis+"</td><td style='padding:5px 8px;border-bottom:1px solid #eee'>"+(p.surgeon||"--")+"</td><td style='padding:5px 8px;border-bottom:1px solid #eee'>--</td><td style='padding:5px 8px;border-bottom:1px solid #eee'>--</td><td style='padding:5px 8px;border-bottom:1px solid #eee'>--</td></tr>";});
                  body+="</table>";
                });
                w.document.write("<!DOCTYPE html><html><head><title>OT List</title><style>body{font-family:Arial;font-size:10pt;margin:12mm}h1{color:#1B3A6B;border-bottom:2px solid #1B3A6B;font-size:13pt}.sig{margin-top:24px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}.sl{border-bottom:1px solid #333;height:36px}.sn{font-size:8pt;text-align:center;color:#555;margin-top:4px}</style></head><body><h1>GMC Hospital — OT List · Plastic Surgery</h1><div style='background:#f0f4ff;padding:8px 12px;border-radius:6px;margin-bottom:14px;font-size:9pt'><b>Date:</b> "+new Date().toLocaleDateString("en-IN")+" &nbsp; <b>Total Cases:</b> "+qPts.length+"</div>"+body+"<div class='sig'><div><div class='sl'></div><div class='sn'>Surgeon</div></div><div><div class='sl'></div><div class='sn'>Anaesthetist</div></div><div><div class='sl'></div><div class='sn'>OT In-charge</div></div></div><div style='margin-top:14px;font-size:8pt;color:#888;text-align:right'>Printed: "+new Date().toLocaleString("en-IN")+"</div></body></html>");
                w.document.close();w.print();
              }} style={{...S.btnSm("g"),padding:"8px 14px",flexShrink:0}}>🖨️ Print OT List</button>
            </div>
            {qPts.length===0
              ?<div style={S.card({textAlign:"center",padding:56,color:C.sub})}><div style={{fontSize:44}}>🏥</div><Sp h={12}/>No patients cleared for OT</div>
              :[...qPts].sort((a,b)=>["Emergency","Urgent","Semi-Urgent","Elective"].indexOf(a.priority)-["Emergency","Urgent","Semi-Urgent","Elective"].indexOf(b.priority)).map((p,i)=>{
                const pr=PRIO[p.priority];
                return(
                  <div key={p.id} onClick={()=>setSel(p)} style={S.card({borderLeft:`4px solid ${pr.c}`,cursor:"pointer"})} className="fu">
                    <div style={{display:"flex",alignItems:"center",gap:12}}>
                      <div style={{width:36,height:36,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:15,background:`${pr.c}18`,color:pr.c,flexShrink:0}}>{i+1}</div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:700,color:C.t,fontSize:14}}>{p.name} <span style={S.bdg(p.priority)}>{pr.i}</span></div>
                        <div style={{fontSize:11,color:C.accent,fontFamily:"monospace"}}>{p.id}</div>
                        <div style={{fontSize:12,color:C.sub,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.diagnosis}</div>
                      </div>
                    </div>
                  </div>
                );
              })}
          </div>
        )}

        {view==="otlist"&&<OTListGenerator pts={pts} user={user}/> }

        {view==="protocols"&&<ProtoManager protos={protos} onSave={saveProtos}/>}
      </div>

      {/* Modals */}
      {showAdd&&<PatForm onSave={async p=>{await addPt(p);setShowAdd(false);setView("ward");}} onClose={()=>setShowAdd(false)} protos={protos}/>}
      {sel&&<PatDetail patient={sel} onClose={()=>setSel(null)} onUpdate={async p=>{await updPt(p);setSel(p);}} protos={protos} user={user}/>}
      
      {showList&&(
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.88)",zIndex:350,display:"flex",flexDirection:"column",overflow:"hidden"}}>
          <div style={{background:C.panel,borderBottom:"1px solid "+C.b,padding:"12px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
            <div style={{fontSize:15,fontWeight:800,color:C.t}}>📋 Ward Patient List</div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>{
                const w=window.open("","_blank");
                const statuses=["Pre-Op Workup","Active Management","Cleared for OT","Post-Op","Follow Up","Discharged"];
                let body="";
                statuses.forEach(function(st){
                  const grp=pts.filter(function(p){return p.status===st;});
                  if(!grp.length)return;
                  body+="<h3 style='color:#1B3A6B;border-left:3px solid #1B3A6B;padding-left:8px;margin:14px 0 6px'>"+st+" ("+grp.length+")</h3>";
                  body+="<table style='width:100%;border-collapse:collapse;font-size:9pt;margin-bottom:8px'><tr style='background:#1B3A6B'><th style='color:#fff;padding:6px 8px;text-align:left'>Name</th><th style='color:#fff;padding:6px 8px;text-align:left'>IP No.</th><th style='color:#fff;padding:6px 8px;text-align:left'>Age/Sex</th><th style='color:#fff;padding:6px 8px;text-align:left'>Ward</th><th style='color:#fff;padding:6px 8px;text-align:left'>Diagnosis</th><th style='color:#fff;padding:6px 8px;text-align:left'>Resident</th></tr>";
                  grp.forEach(function(p){body+="<tr><td style='padding:5px 8px;border-bottom:1px solid #eee;font-weight:600'>"+p.name+"</td><td style='padding:5px 8px;border-bottom:1px solid #eee;color:#1B3A6B;font-family:monospace'>"+(p.ipNumber||p.id)+"</td><td style='padding:5px 8px;border-bottom:1px solid #eee'>"+p.age+"y/"+p.gender+"</td><td style='padding:5px 8px;border-bottom:1px solid #eee'>"+p.ward+"</td><td style='padding:5px 8px;border-bottom:1px solid #eee'>"+p.diagnosis+"</td><td style='padding:5px 8px;border-bottom:1px solid #eee'>"+(p.resident?"Dr. "+p.resident:"--")+"</td></tr>";});
                  body+="</table>";
                });
                w.document.write("<!DOCTYPE html><html><head><title>Ward List</title><style>body{font-family:Arial;font-size:10pt;margin:12mm}h1{color:#1B3A6B;border-bottom:2px solid #1B3A6B;font-size:13pt}.sig{margin-top:24px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}.sl{border-bottom:1px solid #333;height:36px}.sn{font-size:8pt;text-align:center;color:#555;margin-top:4px}</style></head><body><h1>GMC Hospital — Dept. of Plastic & Reconstructive Surgery</h1><div style='background:#f0f4ff;padding:8px 12px;border-radius:6px;margin-bottom:14px;font-size:9pt'><b>Date:</b> "+new Date().toLocaleDateString("en-IN")+" &nbsp;&nbsp; <b>Total Patients:</b> "+pts.length+"</div>"+body+"<div class='sig'><div><div class='sl'></div><div class='sn'>Sr. Resident</div></div><div><div class='sl'></div><div class='sn'>Registrar</div></div><div><div class='sl'></div><div class='sn'>Consultant</div></div></div><div style='margin-top:14px;font-size:8pt;color:#888;text-align:right'>Printed: "+new Date().toLocaleString("en-IN")+" · GMC Plastics PMS</div></body></html>");
                w.document.close();w.print();
              }} style={S.btnSm("g")}>🖨️ Print List</button>
              <button onClick={()=>setShowList(false)} style={S.btnSm("r")}>✕</button>
            </div>
          </div>
          <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch"}}>
            {["Pre-Op Workup","Active Management","Cleared for OT","Post-Op","Follow Up","Discharged"].map(function(status){
              const grp=pts.filter(function(p){return p.status===status;});
              if(!grp.length)return null;
              const colors={"Pre-Op Workup":"#F59E0B","Active Management":"#3B82F6","Cleared for OT":"#22C55E","Post-Op":"#A855F7","Follow Up":"#06B6D4","Discharged":"#6B7280"};
              const col=colors[status]||C.accent;
              return(
                <div key={status}>
                  <div style={{padding:"10px 14px 8px",fontSize:11,fontWeight:700,color:col,textTransform:"uppercase",letterSpacing:"0.5px",background:col+"10",borderBottom:"1px solid "+col+"30",borderTop:"1px solid "+col+"20",display:"flex",alignItems:"center",gap:8}}>
                    <span style={{background:col,color:"#fff",fontSize:11,padding:"2px 8px",borderRadius:10,fontWeight:800}}>{grp.length}</span>
                    {status}
                  </div>
                  {grp.map(function(p){return(
                    <div key={p.id} style={{display:"flex",gap:12,padding:"12px 14px",borderBottom:"1px solid "+C.b+"40",alignItems:"center",cursor:"pointer",WebkitTapHighlightColor:"transparent"}} onClick={()=>{setSel(p);setShowList(false);}}>
                      <div style={{width:38,height:38,borderRadius:10,background:col+"20",border:"1px solid "+col+"40",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,fontWeight:800,color:col,flexShrink:0}}>
                        {p.name.charAt(0)}
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:700,fontSize:14,color:C.t,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.name}</div>
                        <div style={{fontSize:11,color:C.sub,marginTop:2}}>{p.age}y/{p.gender} · {p.ward}</div>
                        <div style={{fontSize:12,color:col,marginTop:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.diagnosis}</div>
                      </div>
                      <div style={{textAlign:"right",flexShrink:0}}>
                        {p.ipNumber&&<div style={{fontSize:11,color:"#93C5FD",fontFamily:"monospace",fontWeight:700}}>IP: {p.ipNumber}</div>}
                        {p.resident&&<div style={{fontSize:11,color:C.sub,marginTop:2}}>Dr. {p.resident}</div>}
                        <div style={{fontSize:10,color:C.mu,marginTop:2}}>{p.admitDate||""}</div>
                      </div>
                    </div>
                  );})}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {showAdmin&&<AdminPanel onClose={()=>setShowAdmin(false)}/>}
      {showLogbook&&<Logbook pts={pts} protos={protos} user={user} onClose={()=>setShowLogbook(false)}/>}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
