const DB={
  async getPts(){const{data,error}=await SB.from('patients').select('*').order('created_at',{ascending:false});if(!error&&data)return data.map(r=>r.data||r);return LS.g('pts_v5',[]);},
  async savePt(p){await SB.from('patients').upsert({id:p.id,data:p,created_at:p.created_at||new Date().toISOString()},{onConflict:'id'});const all=LS.g('pts_v5',[]);LS.s('pts_v5',[p,...all.filter(x=>x.id!==p.id)]);return p;},
  async delPt(id){await SB.from('patients').delete().eq('id',id);LS.s('pts_v5',LS.g('pts_v5',[]).filter(p=>p.id!==id));},
  async getProtos(){const{data}=await SB.from('protocols').select('*');if(data&&data.length){const o={};data.forEach(r=>o[r.name]=r.data);return o;}return LS.g('protos_v5',DP);},
  async saveProtos(pr){const rows=Object.entries(pr).map(([name,data])=>({name,data}));await SB.from('protocols').upsert(rows,{onConflict:'name'});LS.s('protos_v5',pr);},
  async uploadPhoto(path,file){
    const ext=file.name.split('.').pop()||'jpg';
    const fp=`${path}_${Date.now()}.${ext}`;
    const{error}=await SB.storage.from('patient-photos').upload(fp,file,{contentType:file.type,upsert:true});
    if(error)throw error;
    const{data:u}=SB.storage.from('patient-photos').getPublicUrl(fp);
    return u.publicUrl;
  },
  getChks:(pid)=>LS.g('chk_'+pid,{}),setChks:(pid,v)=>LS.s('chk_'+pid,v),

// ═══════════════════════════════════════════════════
// INVESTIGATION ROW + PHOTO UPLOAD
// ═══════════════════════════════════════════════════
function InvRow({item,idx,patId,checked,onChk,photos,onAddPhoto,readOnly}){
  const [exp,setExp]=useState(false);
  const [busy,setBusy]=useState(false);
  const fRef=useRef(); const cRef=useRef();
  const key='inv_'+idx;
  const mine=photos[key]||[];
  const handle=async file=>{
    if(!file)return;
    setBusy(true);
    try{const url=await DB.uploadPhoto(`${patId}/inv_${idx}`,file);onAddPhoto(key,{url,name:file.name,ts:Date.now()});}
    catch(e){
      const url=await new Promise(res=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.readAsDataURL(file);});
      onAddPhoto(key,{url,name:file.name,ts:Date.now()});
    }
    setBusy(false);setExp(true);
  };
  return(
    <div style={{marginBottom:6}}>
      <div style={S.chkrow(checked)} onClick={()=>!readOnly&&onChk(key)}>
        {!readOnly&&<CB chk={checked} on={()=>onChk(key)}/>}
        {readOnly&&<div style={{width:20,height:20,borderRadius:6,background:checked?"#22C55E20":"transparent",border:`2px solid ${checked?"#22C55E":C.mu}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}>{checked&&<span style={{fontSize:11,color:"#22C55E"}}>✓</span>}</div>}
        <span style={{flex:1,fontSize:13,color:checked?"#5E7A9E":C.t,textDecoration:checked?"line-through":"none",lineHeight:1.4}}>{item}</span>
        <div style={{display:"flex",gap:5,marginLeft:8}} onClick={e=>e.stopPropagation()}>
          {mine.length>0&&<button onClick={()=>setExp(!exp)} style={{...S.btn("sm"),background:"rgba(59,130,246,0.18)",color:C.accent}}>📎{mine.length}</button>}
          <button onClick={()=>fRef.current?.click()} style={{...S.btn("sm"),background:"rgba(59,130,246,0.1)",color:C.accent}} title="Upload">{busy?<span className="sp"/>:"📁"}</button>
          <button onClick={()=>cRef.current?.click()} style={{...S.btn("sm"),background:"rgba(20,184,166,0.1)",color:C.teal}} title="Camera">📷</button>
          <input ref={fRef} type="file" accept="image/*,application/pdf" style={{display:"none"}} onChange={e=>{handle(e.target.files[0]);e.target.value="";}}/>
          <input ref={cRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={e=>{handle(e.target.files[0]);e.target.value="";}}/>
        </div>
      </div>
      {exp&&mine.length>0&&(
        <div style={{marginLeft:30,marginBottom:6,display:"flex",flexWrap:"wrap",gap:8}}>
          {mine.map((ph,pi)=>(
            <div key={pi}>{(ph.url.startsWith('data:image')||ph.url.startsWith('http'))
              ?<img src={ph.url} alt={ph.name} style={{width:80,height:80,objectFit:"cover",borderRadius:8,border:`1px solid ${C.b}`,cursor:"pointer"}} onClick={()=>window.open(ph.url,'_blank')}/>
              :<a href={ph.url} target="_blank" rel="noreferrer" style={{display:"flex",gap:5,alignItems:"center",padding:"5px 10px",background:C.card,borderRadius:8,border:`1px solid ${C.b}`,color:C.accent,fontSize:12,textDecoration:"none"}}>📄 {ph.name}</a>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════
// PROTOCOL PANEL
// ═══════════════════════════════════════════════════
function ProtPanel({diagnosis,patId,protos,readOnly}){
  const proto=protos[diagnosis];
  const [chks,setChks]=useState(()=>DB.getChks(patId));
  const [photos,setPhotos]=useState(()=>DB.getPhotos(patId));
  const [open,setOpen]=useState("investigations");
  useEffect(()=>DB.setChks(patId,chks),[chks,patId]);
  useEffect(()=>DB.setPhotos(patId,photos),[photos,patId]);
  if(!proto)return<div style={{...S.card,textAlign:"center",padding:40,color:C.sub}}>No protocol found for this diagnosis.</div>;
  const tog=k=>!readOnly&&setChks(p=>({...p,[k]:!p[k]}));
  const addPhoto=(key,ph)=>setPhotos(p=>({...p,[key]:[...(p[key]||[]),ph]}));
  const allInvDone=(proto.investigations||[]).every((_,i)=>chks['inv_'+i]);
  const Sec=({k,icon,title,items,isInv})=>{
    const isOpen=open===k;
    return(
      <div style={{marginBottom:10}}>
        <div style={S.sh} onClick={()=>setOpen(isOpen?null:k)}>
          <span style={{fontSize:16}}>{icon}</span>
          <span style={{fontWeight:700,color:C.t,flex:1,fontSize:14}}>{title}</span>
          <span style={{color:C.mu,fontSize:14}}>{isOpen?"▲":"▼"}</span>
        </div>
        {isOpen&&(items||[]).map((item,i)=>{
          const key=isInv?'inv_'+i:`${k}_${i}`;
          return isInv
            ?<InvRow key={i} item={item} idx={i} patId={patId} checked={!!chks['inv_'+i]} onChk={tog} photos={photos} onAddPhoto={addPhoto} readOnly={readOnly}/>
            :<div key={i} style={S.chkrow(!!chks[key])} onClick={()=>tog(key)}>
              {!readOnly&&<CB chk={!!chks[key]} on={()=>tog(key)}/>}
              <span style={{fontSize:13,color:chks[key]?"#5E7A9E":C.t,textDecoration:chks[key]?"line-through":"none",lineHeight:1.4}}>{item}</span>
            </div>;
        })}
      </div>
    );
  };
  return(
    <div>
      <div style={{...S.card,background:`linear-gradient(135deg,${proto.color}12,${C.card})`,borderLeft:`4px solid ${proto.color}`,marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
          <div>
            <div style={{fontSize:11,color:proto.color,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:4}}>🤖 Protocol Loaded</div>
            <div style={{fontSize:15,fontWeight:800,color:C.t}}>{diagnosis}</div>
          </div>
          <span style={{padding:"3px 10px",borderRadius:6,fontSize:12,fontWeight:600,background:`${proto.color}18`,color:proto.color,border:`1px solid ${proto.color}25`}}>{proto.category}</span>
        </div>
        {allInvDone&&<div style={{marginTop:10,padding:"7px 12px",background:"rgba(34,197,94,0.1)",borderRadius:8,color:"#22C55E",fontSize:13,fontWeight:600}}>✅ All investigations checked</div>}
      </div>
      <Sec k="investigations" icon="🧪" title="Investigations" items={proto.investigations} isInv={true}/>
      <Sec k="preop" icon="✅" title="Pre-Op Checklist" items={proto.preop_checklist}/>
      <Sec k="preop_orders" icon="📝" title="Pre-Op Orders" items={proto.preop_orders}/>
      <Sec k="special_consent" icon="⚖️" title="Special Consent" items={proto.special_consent}/>
      <Sec k="materials" icon="🛒" title="Materials & Equipment" items={proto.materials}/>
      <Sec k="intraop" icon="🔪" title="Intra-Op" items={proto.intraop}/>
      <Sec k="postop" icon="💊" title="Post-Op Orders" items={proto.postop}/>
      <Sec k="references" icon="📚" title="References" items={proto.references}/>
    </div>
  );
}

// PATIENT DETAIL MODAL

function PatDetail({patient,onClose,onUpdate,protos,user}){
  const [tab,setTab]=useState("protocol");

  const [otxt,setOtxt]=useState(""); const [oby,setOby]=useState("Resident");

  const proto=protos[patient.diagnosis];
  useEffect(()=>DB.setOrders(patient.id,orders),[orders,patient.id]);
  useEffect(()=>LS.s('q_'+patient.id,inQ),[inQ]);
  const addOrder=()=>{if(!otxt.trim())return;setOrders(p=>[...p,{id:Date.now(),text:otxt.trim(),by:oby,time:new Date().toLocaleString('en-IN'),type:(oby.includes("Senior")||oby.includes("Consultant"))?"senior":"res"}]);setOtxt("");};

              <span style={S.bdg(patient.priority)}>{pr.i} {patient.priority}</span>

          <div>
            <div style={S.card}>
              <Lbl t="Add Order / Note"/>

              <textarea style={S.ta} value={otxt} onChange={e=>setOtxt(e.target.value)} placeholder="Write order or clinical note..."/>

            </div>
            {[...orders].reverse().map(o=>(
              <div key={o.id} style={{...S.card,borderLeft:`3px solid ${o.type==="senior"?"#F59E0B":C.accent}`}}>
                <div style={{fontSize:11,color:C.sub,marginBottom:4}}>{o.type==="senior"?"👨‍⚕️":"💊"} {o.by} · {o.time}</div>
                <div style={{fontSize:13,color:C.t,lineHeight:1.5}}>{o.text}</div>

            {orders.length===0&&<div style={{...S.card,textAlign:"center",padding:24,color:C.sub}}>No orders yet</div>}
          </div>
        )}
        {tab==="discharge"&&<DSSummary patient={patient} proto={proto}/>}
      </div>
    </div>
    </>
  );
}

// REFERENCE PORTAL — full portal for other depts
// ═══════════════════════════════════════════════════
function RefPortal({protos,allPts,onSubmit,onUpdate}){
  const [mode,setMode]=useState("home"); // home | new | revisit
  const [refId,setRefId]=useState("");
  const [foundPt,setFoundPt]=useState(null);
  const [notFound,setNotFound]=useState(false);

  // New reference form state
  const [f,setF]=useState({name:"",age:"",gender:"Male",ward:"",contact:"",diagnosis:Object.keys(protos)[0],priority:"Semi-Urgent",notes:"",refDept:"",refDoctorName:"",refType:"Reference"});
  const [done,setDone]=useState(null);
  const [busy,setBusy]=useState(false);
  const u=(k,v)=>setF(p=>({...p,[k]:v}));

  const submit=async()=>{
    if(!f.name.trim()||!f.refDept.trim())return alert("Patient name and department required");
    setBusy(true);
    const id=`REF-${new Date().getFullYear()}-${String(Math.floor(Math.random()*9000)+1000)}`;
    const pt={...f,id,created_at:new Date().toISOString(),admitDate:new Date().toISOString().split("T")[0],status:"Pre-Op Workup",allInvestigationsDone:false,resident:""};
    await onSubmit(pt);
    setBusy(false);
    setDone(id);
  };

  const findPatient=()=>{
    const id=refId.trim().toUpperCase();
    const pt=allPts.find(p=>p.id.toUpperCase()===id||p.id.toUpperCase().includes(id));
    if(pt){setFoundPt(pt);setNotFound(false);}
    else{setFoundPt(null);setNotFound(true);}
  };

  // REVISIT VIEW — other dept can see patient + add investigations
  if(mode==="revisit"&&foundPt){
    return <RefPatientView patient={foundPt} protos={protos} onBack={()=>{setMode("home");setFoundPt(null);setRefId("");}} onUpdate={onUpdate}/>;
  }

  if(done) return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{...S.card,maxWidth:460,textAlign:"center",padding:44}} className="fi">
        <div style={{fontSize:52,marginBottom:14}}>✅</div>
        <div style={{fontSize:18,fontWeight:800,color:"#22C55E",marginBottom:8}}>Reference Submitted!</div>
        <div style={{fontSize:14,color:C.sub,lineHeight:1.6,marginBottom:20}}>Patient <strong style={{color:C.t}}>{f.name}</strong> has been sent to Plastics team.</div>
        <div style={{padding:"12px 16px",background:"rgba(59,130,246,0.1)",borderRadius:10,border:`1px solid ${C.accent}30`,marginBottom:20}}>
          <div style={{fontSize:12,color:C.sub,marginBottom:4}}>REFERENCE ID (save this to revisit)</div>
          <div style={{fontSize:20,fontWeight:800,color:C.accent,letterSpacing:"2px"}}>{done}</div>
        </div>
        <div style={{fontSize:12,color:C.mu,marginBottom:20}}>Use this ID to revisit and upload investigation reports</div>
        <button onClick={()=>{setDone(null);setF({name:"",age:"",gender:"Male",ward:"",contact:"",diagnosis:Object.keys(protos)[0],priority:"Semi-Urgent",notes:"",refDept:"",refDoctorName:"",refType:"Reference"});setMode("home");}} style={S.btn("p",true)}>Done</button>
      </div>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:C.bg,padding:"20px 16px"}}>
      <div style={{maxWidth:620,margin:"0 auto"}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{display:"inline-flex",alignItems:"center",gap:12,padding:"14px 20px",background:C.panel,borderRadius:14,border:`1px solid ${C.b}`,marginBottom:14}}>
            <span style={{fontSize:26}}>🏥</span>
            <div>
              <div style={{fontSize:16,fontWeight:800,color:C.t,fontFamily:"Syne"}}>GMC Plastic Surgery</div>
              <div style={{fontSize:12,color:C.sub}}>Inter-Department Reference Portal</div>
            </div>
          </div>
          <div style={{fontSize:12,color:C.mu}}>Grant Medical College & Hospital, Mumbai</div>
        </div>

        {mode==="home"&&(
          <div className="fi">
            <div style={{...S.g2,marginBottom:14}}>
              <button onClick={()=>setMode("new")} style={{...S.card,border:`2px solid ${C.accent}30`,cursor:"pointer",textAlign:"center",padding:24,background:`${C.accent}08`}}>
                <div style={{fontSize:32,marginBottom:8}}>📤</div>
                <div style={{fontWeight:700,color:C.t,fontSize:15}}>New Reference</div>
                <div style={{fontSize:12,color:C.sub,marginTop:4}}>Send a patient to Plastics</div>
              </button>
              <button onClick={()=>setMode("revisit")} style={{...S.card,border:`2px solid ${C.teal}30`,cursor:"pointer",textAlign:"center",padding:24,background:`${C.teal}08`}}>
                <div style={{fontSize:32,marginBottom:8}}>🔍</div>
                <div style={{fontWeight:700,color:C.t,fontSize:15}}>Revisit Reference</div>
                <div style={{fontSize:12,color:C.sub,marginTop:4}}>Upload reports & updates</div>
              </button>
            </div>
            <div style={{...S.card,padding:16}}>
              <div style={{fontSize:12,color:C.sub,textAlign:"center"}}>Use your Reference ID to track patient status and add investigation results</div>
            </div>
          </div>
        )}

        {mode==="revisit"&&!foundPt&&(
          <div className="fi">
            <div style={S.card}>
              <div style={{fontSize:14,fontWeight:700,color:C.t,marginBottom:14}}>🔍 Find Your Reference</div>
              <Lbl t="Enter Reference ID"/>
              <input style={{...S.inp,marginBottom:12}} value={refId} onChange={e=>setRefId(e.target.value)} placeholder="e.g. REF-2024-1234" onKeyDown={e=>e.key==="Enter"&&findPatient()}/>
              {notFound&&<div style={{padding:"8px 12px",background:"rgba(239,68,68,0.1)",borderRadius:8,color:"#EF4444",fontSize:13,marginBottom:12}}>⚠️ No patient found with this ID. Check the ID and try again.</div>}
              <div style={{display:"flex",gap:10}}>
                <button onClick={findPatient} style={S.btn("p")}>Find Patient</button>
                <button onClick={()=>setMode("home")} style={S.btn()}>← Back</button>
              </div>
            </div>
          </div>
        )}

        {mode==="new"&&(
          <div className="fi">
            <div style={S.card}>
              <div style={{fontSize:14,fontWeight:700,color:C.t,marginBottom:14}}>Referring Department</div>
              <div style={S.g2}>
                <div><Lbl t="Department *"/><input style={S.inp} value={f.refDept} onChange={e=>u("refDept",e.target.value)} placeholder="ENT, Ortho, Medicine..."/></div>
                <div><Lbl t="Referring Doctor *"/><input style={S.inp} value={f.refDoctorName} onChange={e=>u("refDoctorName",e.target.value)} placeholder="Dr. Sharma"/></div>
              </div>
            </div>
            <div style={S.card}>
              <div style={{fontSize:14,fontWeight:700,color:C.t,marginBottom:14}}>Patient Details</div>
              <div style={S.g2}>
                <div><Lbl t="Patient Name *"/><input style={S.inp} value={f.name} onChange={e=>u("name",e.target.value)}/></div>
                <div><Lbl t="Age"/><input style={S.inp} type="number" value={f.age} onChange={e=>u("age",e.target.value)}/></div>
                <div><Lbl t="Gender"/><select style={S.sel} value={f.gender} onChange={e=>u("gender",e.target.value)}><option>Male</option><option>Female</option><option>Other</option></select></div>
                <div><Lbl t="Contact"/><input style={S.inp} value={f.contact} onChange={e=>u("contact",e.target.value)}/></div>
                <div><Lbl t="Current Ward / Bed"/><input style={S.inp} value={f.ward} onChange={e=>u("ward",e.target.value)} placeholder="Ward 5B Bed 12"/></div>
                <div><Lbl t="Priority"/><select style={S.sel} value={f.priority} onChange={e=>u("priority",e.target.value)}>{Object.keys(PRIO).map(p=><option key={p}>{p}</option>)}</select></div>
                <div style={{gridColumn:"1/-1"}}><Lbl t="Reason / Diagnosis"/>
                  <select style={S.sel} value={f.diagnosis} onChange={e=>u("diagnosis",e.target.value)}>{Object.keys(protos).map(d=><option key={d}>{d}</option>)}</select>
                </div>
                <div style={{gridColumn:"1/-1"}}><Lbl t="Clinical Notes / Reason for Reference"/>
                  <textarea style={{...S.ta,minHeight:90}} value={f.notes} onChange={e=>u("notes",e.target.value)} placeholder="Clinical details, what opinion is needed, urgency, relevant history..."/>
                </div>
              </div>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={submit} disabled={busy} style={S.btn("g",true)}>
                {busy?<span className="sp"/>:"📤 Submit Reference"}
              </button>
            </div>
            <Sp h={10}/>
            <button onClick={()=>setMode("home")} style={S.btn("",true)}>← Back</button>
          </div>
        )}
      </div>
    </div>
  );
}

// Revisit view — referring dept can see status + upload investigations
function RefPatientView({patient,protos,onBack,onUpdate}){
  const [photos,setPhotos]=useState(()=>DB.getPhotos(patient.id));
  const [chks,setChks]=useState(()=>DB.getChks(patient.id));
  const [notes,setNotes]=useState("");
  const [saved,setSaved]=useState(false);
  useEffect(()=>DB.setPhotos(patient.id,photos),[photos,patient.id]);
  useEffect(()=>DB.setChks(patient.id,chks),[chks,patient.id]);
  const addPhoto=(key,ph)=>setPhotos(p=>({...p,[key]:[...(p[key]||[]),ph]}));
  const tog=k=>setChks(p=>({...p,[k]:!p[k]}));
  const proto=protos[patient.diagnosis];
  const pr=PRIO[patient.priority];
  return(
    <div style={{minHeight:"100vh",background:C.bg,padding:"20px 16px"}}>
      <div style={{maxWidth:680,margin:"0 auto"}}>
        <button onClick={onBack} style={{...S.btn("sm"),marginBottom:14}}>← Back</button>
        <div style={{...S.card,borderLeft:`4px solid ${pr.c}`,marginBottom:16}}>
          <div style={{fontWeight:800,fontSize:16,color:C.t,marginBottom:4}}>{patient.name}</div>
          <div style={{fontSize:12,color:C.sub,marginBottom:4}}>{patient.id} · {patient.age}y/{patient.gender}</div>
          <div style={{fontSize:13,color:proto?.color||C.accent,fontWeight:600,marginBottom:6}}>{patient.diagnosis}</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <span style={S.bdg(patient.priority)}>{pr.i} {patient.priority}</span>
            <span style={S.pil(patient.status==="Cleared for OT"?"#22C55E":C.warn,"sm")}>{patient.status}</span>
          </div>
        </div>
        <div style={{...S.card,background:"rgba(59,130,246,0.06)",border:`1px solid ${C.accent}25`,marginBottom:16}}>
          <div style={{fontSize:13,fontWeight:700,color:C.accent,marginBottom:10}}>📋 Investigation Checklist</div>
          <div style={{fontSize:12,color:C.sub,marginBottom:12}}>Tick investigations done and upload reports:</div>
          {(proto?.investigations||[]).map((item,i)=>(
            <InvRow key={i} item={item} idx={i} patId={patient.id} checked={!!chks['inv_'+i]} onChk={tog} photos={photos} onAddPhoto={addPhoto} readOnly={false}/>
          ))}
        </div>
        <div style={S.card}>
          <div style={{fontSize:13,fontWeight:700,color:C.t,marginBottom:10}}>📝 Add Note / Update</div>
          <textarea style={{...S.ta,marginBottom:10}} value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Any clinical updates, new findings, urgency change..."/>
          <button onClick={()=>{if(!notes.trim())return;const orders=DB.getOrders(patient.id);DB.setOrders(patient.id,[...orders,{id:Date.now(),text:notes,by:`${patient.refDept||"Referring Dept"} - ${patient.refDoctorName||"Dr."}`,time:new Date().toLocaleString('en-IN'),type:"res"}]);setNotes("");setSaved(true);setTimeout(()=>setSaved(false),2000);}} style={S.btn("p")}>
            Add Update
          </button>
          {saved&&<span style={{...S.pil("#22C55E","sm"),marginLeft:10}}>✓ Saved</span>}
        </div>
        <div style={{...S.card,background:"rgba(34,197,94,0.05)",border:"1px solid #22C55E25"}}>
          <div style={{fontSize:12,color:"#22C55E",fontWeight:600}}>ℹ️ Updates visible to Plastics team immediately</div>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════
// PROTOCOL MANAGER
// ═══════════════════════════════════════════════════
function ProtoManager({protos,onSave}){
  const [cat,setCat]=useState("All");
  const [editing,setEditing]=useState(null);
  const [showNew,setShowNew]=useState(false);
  const CATS=["All","Trauma","Reconstruction","Oncoplastic","Vascular","Burns & Contracture","Aesthetic & Body","Congenital","Custom"];
  const SE=({proto,setProto,k,label,icon})=>{
    const [txt,setTxt]=useState(""); const items=proto[k]||[];
    const add=()=>{if(!txt.trim())return;setProto(p=>({...p,[k]:[...(p[k]||[]),txt.trim()]}));setTxt("");};
    const rm=i=>setProto(p=>({...p,[k]:items.filter((_,j)=>j!==i)}));
    return(
      <div style={{marginBottom:14}}>
        <div style={{fontSize:11,fontWeight:700,color:C.accent,marginBottom:6,textTransform:"uppercase"}}>{icon} {label}</div>
        {items.map((item,i)=><div key={i} style={{display:"flex",gap:6,marginBottom:4,background:C.bg,padding:"6px 10px",borderRadius:8,border:`1px solid ${C.b}`,alignItems:"center"}}><span style={{flex:1,fontSize:12,color:C.t}}>{item}</span><button onClick={()=>rm(i)} style={{...S.btn("r"),padding:"2px 8px",fontSize:10}}>✕</button></div>)}
        <div style={{display:"flex",gap:8}}><input style={{...S.inp,flex:1}} value={txt} onChange={e=>setTxt(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()} placeholder="Add item and press Enter"/><button onClick={add} style={S.btn("p")}>+</button></div>
      </div>
    );
  };
  const EM=({proto,name,onSv,onClose})=>{
    const [p,setP]=useState({...proto}); const [n,setN]=useState(name);
    return(
      <div style={S.ovl}><div style={{...S.box(900)}} className="fi">
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:14}}><div style={{fontSize:15,fontWeight:800,color:C.t}}>{name?"Edit":"New"} Protocol</div><button onClick={onClose} style={S.btn()}>✕</button></div>
        <div style={S.g2}>
          <div><Lbl t="Name"/><input style={S.inp} value={n} onChange={e=>setN(e.target.value)}/></div>
          <div><Lbl t="Category"/><select style={S.sel} value={p.category||"Custom"} onChange={e=>setP(x=>({...x,category:e.target.value}))}>{CATS.filter(c=>c!=="All").map(c=><option key={c}>{c}</option>)}</select></div>
        </div>
        <Sp h={8}/><Lbl t="Colour"/><input type="color" style={{...S.inp,height:44,padding:4,marginBottom:14}} value={p.color||"#3B82F6"} onChange={e=>setP(x=>({...x,color:e.target.value}))}/>
        <div style={S.dv}/>
        <div style={{maxHeight:480,overflowY:"auto",paddingRight:4}}>
          <SE proto={p} setProto={setP} k="investigations" label="Investigations" icon="🧪"/>
          <SE proto={p} setProto={setP} k="preop_checklist" label="Pre-Op Checklist" icon="✅"/>
          <SE proto={p} setProto={setP} k="preop_orders" label="Pre-Op Orders" icon="📝"/>
          <SE proto={p} setProto={setP} k="special_consent" label="Special Consent" icon="⚖️"/>
          <SE proto={p} setProto={setP} k="materials" label="Materials & Equipment" icon="🛒"/>
          <SE proto={p} setProto={setP} k="intraop" label="Intra-Op" icon="🔪"/>
          <SE proto={p} setProto={setP} k="postop" label="Post-Op Orders" icon="💊"/>
          <SE proto={p} setProto={setP} k="references" label="References" icon="📚"/>
        </div>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:14}}>
          <button onClick={onClose} style={S.btn()}>Cancel</button>
          <button onClick={()=>{if(!n.trim())return alert("Name required");onSv(n,p);onClose();}} style={S.btn("g")}>💾 Save</button>
        </div>
      </div></div>
    );
  };
  const filt=Object.entries(protos).filter(([,v])=>cat==="All"||v.category===cat);
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div style={{fontSize:18,fontWeight:800,color:C.t}}>Protocol Manager</div>
        <button onClick={()=>setShowNew(true)} style={S.btn("p")}>+ New</button>
      </div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
        {CATS.map(c=><button key={c} onClick={()=>setCat(c)} style={{...S.btn(cat===c?"p":""),padding:"5px 12px",fontSize:12}}>{c}</button>)}
      </div>
      <div style={S.g2}>
        {filt.map(([name,proto])=>(
          <div key={name} style={{...S.card,borderLeft:`4px solid ${proto.color||C.accent}`}}>
            <div style={{fontWeight:700,color:C.t,fontSize:13,marginBottom:4}}>{name}</div>
            <span style={{padding:"2px 8px",borderRadius:4,fontSize:11,fontWeight:600,background:`${proto.color||C.accent}18`,color:proto.color||C.accent,border:`1px solid ${proto.color||C.accent}25`}}>{proto.category}</span>
            <div style={{fontSize:11,color:C.sub,marginTop:6}}>{(proto.investigations||[]).length} inv · {(proto.materials||[]).length} mat · {(proto.special_consent||[]).length} consent</div>
            <div style={{display:"flex",gap:6,marginTop:10}}>
              <button onClick={()=>setEditing(name)} style={{...S.btn("p"),padding:"4px 12px",fontSize:12}}>✏️ Edit</button>
              <button onClick={()=>{if(window.confirm(`Delete "${name}"?`)){const u={...protos};delete u[name];onSave(u);}}} style={{...S.btn("r"),padding:"4px 10px",fontSize:12}}>🗑️</button>
            </div>
          </div>
        ))}
      </div>
      {editing&&<EM proto={protos[editing]} name={editing} onSv={(n,p)=>{const u={...protos};if(n!==editing)delete u[editing];u[n]=p;onSave(u);setEditing(null);}} onClose={()=>setEditing(null)}/>}
      {showNew&&<EM proto={{name:"",category:"Custom",color:"#3B82F6",investigations:[],preop_checklist:[],preop_orders:[],special_consent:[],materials:[],intraop:[],postop:[],references:[]}} name="" onSv={(n,p)=>{onSave({...protos,[n]:p});setShowNew(false);}} onClose={()=>setShowNew(false)}/>}
    </div>
  );
}

        </div>
        <div style={{textAlign:"right",flexShrink:0}}>
          <div style={S.pil(patient.status==="Cleared for OT"?"#22C55E":patient.status==="Post-Op"?"#3B82F6":C.warn,"sm")}>{patient.status}</div>
          <div style={{fontSize:11,color:C.sub,marginTop:4}}>Dr. {patient.resident||"—"}</div>
          <div style={{fontSize:11,color:C.mu}}>{patient.admitDate}</div>
          <button onClick={e=>{e.stopPropagation();if(window.confirm("Delete patient?"))onDel(patient.id);}} style={{...S.btn("r"),padding:"2px 8px",fontSize:10,marginTop:6}}>Delete</button>
        </div>
      </div>
      {patient.notes&&<div style={{marginTop:7,fontSize:11,color:C.mu,borderTop:`1px solid ${C.b}`,paddingTop:6,lineHeight:1.4}}>{patient.notes.slice(0,100)}{patient.notes.length>100?"...":""}</div>}
    </div>
  );
}

// ═══════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════
function App(){
  const [user,setUser]=useState(()=>{
    const s=LS.g('gmc_session',null);
    if(s&&Date.now()-s.ts<86400000*7)return s;
    return null;
  });
  const [view,setView]=useState("dashboard");
  const [pts,setPts]=useState([]);
  const [protos,setProtos]=useState(DP);
  const [loading,setLoading]=useState(true);
  const [sel,setSel]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const [navOpen,setNavOpen]=useState(false);
  const [search,setSearch]=useState("");
  const [wf,setWf]=useState("All");
  const [pf,setPf]=useState("All");

  const isRef=window.location.hash==="#refer";

  useEffect(()=>{
    (async()=>{
      const[p,pr]=await Promise.all([DB.getPts(),DB.getProtos()]);
      setPts(p);setProtos(pr);setLoading(false);
    })();
  },[]);

  const addPt=async p=>{await DB.savePt(p);setPts(prev=>[p,...prev.filter(x=>x.id!==p.id)]);};
  const updPt=async p=>{await DB.savePt(p);setPts(prev=>prev.map(x=>x.id===p.id?p:x));};
  const delPt=async id=>{await DB.delPt(id);setPts(prev=>prev.filter(x=>x.id!==id));};
  const saveProtos=async pr=>{setProtos(pr);await DB.saveProtos(pr);};
  const logout=()=>{LS.s('gmc_session',null);setUser(null);setNavOpen(false);};

  // Public reference portal
  if(isRef)return<RefPortal protos={protos} allPts={pts} onSubmit={addPt} onUpdate={updPt}/>;

  // Login wall
  if(!user)return<LoginPage onLogin={setUser}/>;

  if(loading)return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column",gap:14}}>
      <div className="sp" style={{width:36,height:36,border:"3px solid #1E3A5F",borderTopColor:C.accent,borderRadius:"50%"}}></div>
      <div style={{color:C.sub}}>Loading...</div>
    </div>
  );

  const filt=pts.filter(p=>{
    const s=search.toLowerCase();
    return(!s||p.name.toLowerCase().includes(s)||p.id.toLowerCase().includes(s)||p.diagnosis.toLowerCase().includes(s)||(p.resident||"").toLowerCase().includes(s))
      &&(wf==="All"||p.ward===wf)&&(pf==="All"||p.priority===pf);
  });
  const wardPts=filt.filter(p=>p.refType!=="Reference");
  const refPts=filt.filter(p=>p.refType==="Reference");
  const qPts=pts.filter(p=>p.allInvestigationsDone||LS.g('q_'+p.id,false));
  const shareUrl=`${window.location.href.split('#')[0]}#refer`;

  const NAV=[
    {id:"dashboard",icon:"🏠",label:"Dashboard"},
    {id:"ward",icon:"🛏️",label:"Ward Patients",cnt:pts.filter(p=>p.refType!=="Reference").length},
    {id:"references",icon:"📨",label:"References",cnt:refPts.length},
    {id:"otqueue",icon:"🏥",label:"OT Queue",cnt:qPts.length},
    {id:"protocols",icon:"📋",label:"Protocols"},
  ];

  const navTo=(id)=>{setView(id);setNavOpen(false);};

  const SC=({value,label,color,icon})=>(
    <div style={{background:C.card,border:`1px solid ${C.b}`,borderRadius:12,padding:"14px 16px",borderTop:`3px solid ${color}`}}>
      <div style={{fontSize:24,fontWeight:800,color:C.t}}>{value}</div>
      <div style={{fontSize:11,color:C.sub,marginTop:3,textTransform:"uppercase"}}>{icon} {label}</div>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:C.bg}}>

      {/* ── TOP BAR (mobile-first) ── */}
      <div style={{position:"sticky",top:0,zIndex:150,background:C.panel,borderBottom:`1px solid ${C.b}`,padding:"0 16px",height:56,display:"flex",alignItems:"center",gap:12}}>
        {/* Hamburger */}
        <button onClick={()=>setNavOpen(!navOpen)} style={{background:"transparent",border:`1px solid ${C.b}`,borderRadius:8,width:40,height:40,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:5,flexShrink:0}}>
          <div style={{width:18,height:2,background:navOpen?C.accent:C.t,borderRadius:2,transition:"all 0.2s",transform:navOpen?"rotate(45deg) translate(5px,5px)":"none"}}></div>
          <div style={{width:18,height:2,background:navOpen?C.accent:C.t,borderRadius:2,transition:"all 0.2s",opacity:navOpen?0:1}}></div>
          <div style={{width:18,height:2,background:navOpen?C.accent:C.t,borderRadius:2,transition:"all 0.2s",transform:navOpen?"rotate(-45deg) translate(5px,-5px)":"none"}}></div>
        </button>

        {/* Title */}
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:15,fontWeight:800,color:C.t,fontFamily:"Syne",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
            {NAV.find(n=>n.id===view)?.icon} {NAV.find(n=>n.id===view)?.label||"GMC Plastics"}
          </div>
        </div>

        {/* Search (compact) */}
        <input style={{...S.inp,width:160,fontSize:13,padding:"7px 12px"}} placeholder="🔍 Search..." value={search} onChange={e=>setSearch(e.target.value)} className="hide-mobile"/>

        {/* Add button */}
        <button onClick={()=>setShowAdd(true)} style={{...S.btn("p"),padding:"8px 14px",fontSize:13,flexShrink:0}}>➕</button>

        {/* User */}
        <div style={{fontSize:11,color:C.sub,flexShrink:0,cursor:"pointer"}} onClick={logout} title="Tap to logout">
          👤 {user.name.split(" ")[0]}
        </div>
      </div>

      {/* ── SLIDE-OUT NAV ── */}
      {navOpen&&(
        <>
          <div onClick={()=>setNavOpen(false)} style={{position:"fixed",top:56,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.5)",zIndex:140}}/>
          <div style={{position:"fixed",top:56,left:0,bottom:0,width:260,background:C.panel,borderRight:`1px solid ${C.b}`,zIndex:145,display:"flex",flexDirection:"column"}} className="si">
            <div style={{padding:"8px 0",flex:1,overflowY:"auto"}}>
              {NAV.map(item=>(
                <div key={item.id} style={{...S.nav(view===item.id),padding:"13px 20px"}} onClick={()=>navTo(item.id)}>
                  <span style={{fontSize:18}}>{item.icon}</span>
                  <span style={{flex:1,fontSize:14}}>{item.label}</span>
                  {item.cnt!==undefined&&<span style={{background:view===item.id?C.accent:C.card,color:"#fff",borderRadius:10,padding:"2px 8px",fontSize:12,fontWeight:700,border:`1px solid ${C.b}`}}>{item.cnt}</span>}
                </div>
              ))}
            </div>
            <div style={{padding:"16px 20px",borderTop:`1px solid ${C.b}`}}>
              <div style={{fontSize:11,color:C.mu,marginBottom:4}}>Signed in as</div>
              <div style={{fontSize:13,fontWeight:600,color:C.t,marginBottom:2}}>Dr. {user.name}</div>
              <div style={{fontSize:11,color:C.sub,marginBottom:12}}>{user.role}</div>
              <button onClick={logout} style={{...S.btn("r"),width:"100%",fontSize:13}}>🚪 Sign Out</button>
            </div>
          </div>
        </>
      )}

      {/* ── MAIN CONTENT ── */}
      <div style={{padding:"16px 16px",maxWidth:980,margin:"0 auto"}}>

        {/* Mobile search */}
        <div style={{marginBottom:14,display:"flex",gap:8,flexWrap:"wrap"}}>
          <input style={{...S.inp,flex:1,minWidth:140}} placeholder="🔍 Search name, ID, diagnosis..." value={search} onChange={e=>setSearch(e.target.value)}/>
          <select style={{...S.sel,width:130}} value={wf} onChange={e=>setWf(e.target.value)}>
            <option value="All">All Wards</option>{WARDS.map(w=><option key={w}>{w}</option>)}
          </select>
          <select style={{...S.sel,width:130}} value={pf} onChange={e=>setPf(e.target.value)}>
            <option value="All">All Priority</option>{Object.keys(PRIO).map(p=><option key={p}>{p}</option>)}
          </select>
        </div>

        {/* ── DASHBOARD ── */}
        {view==="dashboard"&&(
          <div>
            <div style={{fontSize:18,fontWeight:800,color:C.t,marginBottom:3,fontFamily:"Syne"}}>Dashboard</div>
            <div style={{fontSize:12,color:C.sub,marginBottom:16}}>Dept. of Plastic & Reconstructive Surgery · GMC Mumbai</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}}>
              <SC value={pts.length} label="Total" color={C.accent} icon="🛏️"/>
              <SC value={pts.filter(p=>p.priority==="Emergency").length} label="Emergency" color="#EF4444" icon="🚨"/>
              <SC value={qPts.length} label="OT Ready" color="#22C55E" icon="✅"/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}}>
              <SC value={pts.filter(p=>p.priority==="Urgent").length} label="Urgent" color="#FF7043" icon="⚡"/>
              <SC value={refPts.length} label="References" color="#A855F7" icon="📨"/>
              <SC value={Object.keys(protos).length} label="Protocols" color={C.teal} icon="📋"/>
            </div>
            <div style={S.card}>
              <div style={{fontSize:12,fontWeight:700,color:C.accent,marginBottom:12,textTransform:"uppercase"}}>📤 Reference Link</div>
              <div style={{fontSize:12,color:C.sub,marginBottom:10}}>Share with ENT, Ortho, Medicine etc. They fill the form and it appears in References automatically.</div>
              <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>
                <input style={{...S.inp,flex:1,minWidth:180,fontSize:12}} readOnly value={shareUrl}/>
                <button onClick={()=>{navigator.clipboard?.writeText(shareUrl).then(()=>alert("✅ Copied!"));}} style={S.btn("p")}>Copy</button>
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                <button onClick={()=>window.open(shareUrl,"_blank")} style={{...S.btn(),fontSize:12}}>🔗 Preview</button>
                <button onClick={()=>window.open("https://wa.me/?text="+encodeURIComponent("GMC Plastic Surgery Reference Form:\n"+shareUrl),"_blank")} style={{...S.btn(),background:"#25D366",fontSize:12}}>📲 WhatsApp</button>
              </div>
            </div>
            <div style={S.card}>
              <div style={{fontSize:12,fontWeight:700,color:C.accent,marginBottom:10,textTransform:"uppercase"}}>Recent Patients</div>
              {pts.slice(0,5).map(p=>(
                <div key={p.id} onClick={()=>setSel(p)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:`1px solid ${C.b}`,cursor:"pointer",gap:8}}>
                  <div style={{flex:1,minWidth:0}}><span style={{fontWeight:600,color:C.t}}>{p.name}</span><div style={{fontSize:11,color:C.sub,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.diagnosis}</div></div>
                  <span style={S.bdg(p.priority)}>{p.priority}</span>
                </div>
              ))}
              {pts.length===0&&<div style={{color:C.sub,fontSize:13,textAlign:"center",padding:20}}>No patients — tap ➕ to add</div>}
            </div>
          </div>
        )}

        {/* ── WARD ── */}
        {view==="ward"&&(
          <div>
            <div style={{fontSize:18,fontWeight:800,color:C.t,marginBottom:3,fontFamily:"Syne"}}>Ward Patients</div>
            <div style={{fontSize:12,color:C.sub,marginBottom:14}}>{wardPts.length} patient(s)</div>
            {wardPts.length===0
              ?<div style={{...S.card,textAlign:"center",padding:56,color:C.sub}}><div style={{fontSize:40}}>🛏️</div><Sp h={12}/>No patients — tap ➕ to add</div>
              :wardPts.map(p=><PatCard key={p.id} patient={p} onClick={setSel} onDel={delPt} protos={protos}/>)}
          </div>
        )}

        {/* ── REFERENCES ── */}
        {view==="references"&&(
          <div>
            <div style={{fontSize:18,fontWeight:800,color:C.t,marginBottom:3,fontFamily:"Syne"}}>References</div>
            <div style={{fontSize:12,color:C.sub,marginBottom:14}}>From other departments</div>
            <div style={{...S.card,background:`${C.accent}08`,border:`1px solid ${C.accent}25`,marginBottom:14}}>
              <div style={{fontSize:12,fontWeight:700,color:C.accent,marginBottom:8}}>📤 Shareable Link</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                <input style={{...S.inp,flex:1,minWidth:140,fontSize:11}} readOnly value={shareUrl}/>
                <button onClick={()=>{navigator.clipboard?.writeText(shareUrl).then(()=>alert("✅ Copied!"));}} style={S.btn("p")}>Copy</button>
                <button onClick={()=>window.open("https://wa.me/?text="+encodeURIComponent("GMC Plastic Surgery Reference Form:\n"+shareUrl),"_blank")} style={{...S.btn(),background:"#25D366"}}>📲</button>
              </div>
            </div>
            {refPts.length===0
              ?<div style={{...S.card,textAlign:"center",padding:40,color:C.sub}}><div style={{fontSize:36}}>📩</div><Sp h={10}/>No references yet</div>
              :refPts.map(p=><PatCard key={p.id} patient={p} onClick={setSel} onDel={delPt} protos={protos}/>)}
          </div>
        )}

        {/* ── OT QUEUE ── */}
        {view==="otqueue"&&(
          <div>
            <div style={{fontSize:18,fontWeight:800,color:C.t,marginBottom:3,fontFamily:"Syne"}}>OT Queue</div>
            <div style={{fontSize:12,color:C.sub,marginBottom:14}}>Emergency → Urgent → Semi-Urgent → Elective</div>
            {qPts.length===0
              ?<div style={{...S.card,textAlign:"center",padding:56,color:C.sub}}><div style={{fontSize:40}}>🏥</div><Sp h={12}/>No patients cleared for OT</div>
              :[...qPts].sort((a,b)=>["Emergency","Urgent","Semi-Urgent","Elective"].indexOf(a.priority)-["Emergency","Urgent","Semi-Urgent","Elective"].indexOf(b.priority)).map((p,i)=>{
                const pr=PRIO[p.priority];
                return(
                  <div key={p.id} onClick={()=>setSel(p)} style={{...S.card,borderLeft:`4px solid ${pr.c}`,cursor:"pointer"}} className="fi">
                    <div style={{display:"flex",alignItems:"center",gap:12}}>
                      <div style={{width:36,height:36,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:15,background:`${pr.c}18`,color:pr.c,flexShrink:0}}>{i+1}</div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:700,color:C.t,fontSize:14}}>{p.name} <span style={S.bdg(p.priority)}>{pr.i}</span></div>
                        <div style={{fontSize:12,color:C.sub,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.diagnosis} · {p.ward}</div>
                      </div>
                    </div>
                  </div>
                );
              })}
          </div>
        )}

        {view==="protocols"&&<ProtoManager protos={protos} onSave={saveProtos}/>}
      </div>

      {/* ── MODALS ── */}
      {showAdd&&<PatForm onSave={async p=>{await addPt(p);setShowAdd(false);setView("ward");}} onClose={()=>setShowAdd(false)} protos={protos}/>}
      {sel&&<PatDetail patient={sel} onClose={()=>setSel(null)} onUpdate={async p=>{await updPt(p);setSel(p);}} protos={protos} user={user}/>}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
