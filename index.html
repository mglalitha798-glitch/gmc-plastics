const compressImage=(file,maxPx=900,quality=0.65)=>new Promise(resolve=>{
  const img=new Image();
  const url=URL.createObjectURL(file);
  img.onload=()=>{
    let w=img.width,h=img.height;
    if(w>maxPx||h>maxPx){const r=Math.min(maxPx/w,maxPx/h);w=Math.round(w*r);h=Math.round(h*r);}
    const c=document.createElement('canvas');c.width=w;c.height=h;
    c.getContext('2d').drawImage(img,0,0,w,h);
    c.toBlob(b=>resolve(new File([b],file.name,{type:'image/jpeg'})),'image/jpeg',quality);
    URL.revokeObjectURL(url);
  };
  img.src=url;
});

const DB={
  async getPts(){
    const{data,error}=await SB.from('patients').select('*').order('created_at',{ascending:false});
    if(!error&&data&&data.length){
      const cloud=data.map(r=>({...r.data,_dbRow:true}));
      LS.s('pts_v6',cloud);
      // flush pending queue
      const q=LS.g('gmcQ',[]);
      if(q.length){for(const row of q){const{error:e}=await SB.from('patients').upsert(row,{onConflict:'id'});if(!e){LS.s('gmcQ',LS.g('gmcQ',[]).filter(x=>x.id!==row.id));}}
      }
      return cloud;
    }
    return LS.g('pts_v6',[]);
  },
  async savePt(p){
    // 1. Save to localStorage immediately (never fails)
    const all=LS.g('pts_v6',[]);
    LS.s('pts_v6',[p,...all.filter(x=>x.id!==p.id)]);
    // 2. Save to Supabase with 2 retries
    const row={id:p.id,data:{...p},created_at:p.created_at||new Date().toISOString()};
    for(let i=1;i<=2;i++){
      const{error}=await SB.from('patients').upsert(row,{onConflict:'id'});
      if(!error)break;
      if(i<2)await new Promise(r=>setTimeout(r,1200));
      else{const q=LS.g('gmcQ',[]);if(!q.find(x=>x.id===p.id))LS.s('gmcQ',[...q,row]);}
    }
    return p;
  },
  async delPt(id){await SB.from('patients').delete().eq('id',id);LS.s('pts_v6',LS.g('pts_v6',[]).filter(p=>p.id!==id));},
  async getProtos(){const{data}=await SB.from('protocols').select('*');if(data&&data.length){const o={};data.forEach(r=>o[r.name]=r.data);return o;}return LS.g('protos_v6',DP);},
  async saveProtos(pr){const rows=Object.entries(pr).map(([name,data])=>({name,data}));await SB.from('protocols').upsert(rows,{onConflict:'name'});LS.s('protos_v6',pr);},
  async uploadFile(path,file){
    const ext=file.name.split('.').pop()||'jpg';
    const fp=`${path}_${Date.now()}.${ext}`;
    const{error}=await SB.storage.from('patient-photos').upload(fp,file,{contentType:file.type,upsert:true});
    if(error){return new Promise(res=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.readAsDataURL(file);});}
    const{data:u}=SB.storage.from('patient-photos').getPublicUrl(fp);return u.publicUrl;
  },
  getChks:(pid)=>LS.g('chk_'+pid,{}),setChks:(pid,v)=>LS.s('chk_'+pid,v),
  getPhotos:(pid)=>LS.g('pho_'+pid,{preop:[],intraop:[],postop:[],other:[],inv:{},qr:{}}),

function AIPanel({patient,protos,onClose}){
  const [mode,setMode]=useState(null);
  const [result,setResult]=useState("");
  const [busy,setBusy]=useState(false);
  const [extra,setExtra]=useState("");
  const proto=protos[patient.diagnosis]||{};

  const run=async(promptFn)=>{
    setBusy(true);setResult("");
    try{const r=await promptFn();setResult(r);}
    catch(e){setResult("Error: "+e.message);}
    setBusy(false);
  };

  const FEATURES=[
    {id:"casesheet",icon:"📄",label:"Case Sheet",color:C.accent,
     prompt:()=>AI_CALL(`Generate a complete clinical case sheet for the following patient at GMC Mumbai Plastic Surgery department:
Patient: ${patient.name}, Age: ${patient.age}y, Gender: ${patient.gender}
Diagnosis: ${patient.diagnosis}
Ward: ${patient.ward}, IPD: ${patient.id}
Admitted: ${patient.admitDate}
Clinical Notes: ${patient.notes||"Not provided"}
Extra info: ${extra}
Format as a proper hospital case sheet with: Chief Complaint, History of Presenting Illness, Past History, Family History, Personal History, Examination findings (General + Local), Provisional Diagnosis, Differential Diagnosis, Investigations Required, Management Plan.`)},
    {id:"otnotes",icon:"🔪",label:"OT Notes",color:"#EF5350",
     prompt:()=>AI_CALL(`Generate complete operative notes for the following plastic surgery procedure at GMC Mumbai:
Patient: ${patient.name}, ${patient.age}y/${patient.gender}, IPD: ${patient.id}
Procedure: ${patient.diagnosis}
Surgeon: Dr. ${patient.resident}
Extra operative details provided: ${extra}
Protocol intraop requirements: ${(proto.intraop||[]).join(", ")}
Generate: Date, Patient position, Anaesthesia, Preparation & draping, Incision, Steps of procedure (detailed), Intraop findings, Closure, Specimens sent, Blood loss estimate, Post-op instructions. Use formal operative note format.`)},
    {id:"discharge",icon:"🏥",label:"DC Summary",color:"#22C55E",
     prompt:()=>AI_CALL(`Generate a complete discharge summary for:
Patient: ${patient.name}, ${patient.age}y/${patient.gender}, IPD: ${patient.id}
Diagnosis: ${patient.diagnosis}
Admitted: ${patient.admitDate}, Ward: ${patient.ward}
Procedure done: ${patient.diagnosis}
Resident: Dr. ${patient.resident}
Post-op orders from protocol: ${(proto.postop||[]).join("; ")}
Additional clinical info: ${extra}
Format: Chief Complaint, History, Examination, Investigations, Diagnosis, Treatment Given, Procedure Details, Course in Hospital, Condition at Discharge, Advice on Discharge (medications list), Follow-up date. GMC Mumbai letterhead format.`)},
    {id:"rehab",icon:"🏃",label:"Rehab Protocol",color:C.teal,
     prompt:()=>AI_CALL(`Generate a detailed rehabilitation protocol for a patient who underwent ${patient.diagnosis} at GMC Mumbai:
Patient: ${patient.name}, ${patient.age}y/${patient.gender}
Protocol rehab guidelines: ${(proto.rehab||[]).join("; ")}
Additional notes: ${extra}
Generate a week-by-week rehabilitation protocol including: Physiotherapy exercises, Activity restrictions, Return to work timeline, Scar management, Follow-up schedule, Red flag signs to watch. Format clearly with phases and timelines.`)},
    {id:"consent",icon:"⚖️",label:"Consent Form",color:C.warn,
     prompt:()=>AI_CALL(`Generate a detailed informed consent form for ${patient.diagnosis} at GMC Mumbai Plastic Surgery:
Patient: ${patient.name}, ${patient.age}y, IPD: ${patient.id}
Special consent points from protocol: ${(proto.special_consent||[]).join("; ")}
Additional: ${extra}
Generate a formal consent form with: Procedure description in simple language, Benefits, Risks (common and serious), Alternatives, Patient understanding confirmation, Signature lines. Should be legally appropriate for Indian medical practice.`)},
    {id:"referral",icon:"📨",label:"Referral Letter",color:C.purple,
     prompt:()=>AI_CALL(`Generate a professional inter-department referral letter from GMC Mumbai Plastic Surgery:
Patient: ${patient.name}, ${patient.age}y/${patient.gender}, IPD: ${patient.id}
Diagnosis: ${patient.diagnosis}
Referring for: ${extra||"specialist opinion and management"}
Ward: ${patient.ward}, Resident: Dr. ${patient.resident}
Write a formal referral letter with: Patient details, Clinical summary, Reason for referral, Specific requests, Contact details. Standard GMC hospital format.`)}
  ];

  const copyToClipboard=()=>{navigator.clipboard?.writeText(result).then(()=>alert("Copied to clipboard!"));};
  const printResult=()=>{const w=window.open('','_blank');w.document.write(`<html><head><title>${FEATURES.find(f=>f.id===mode)?.label} - ${patient.name}</title><style>body{font-family:Arial,sans-serif;font-size:11pt;margin:20mm;line-height:1.6}pre{white-space:pre-wrap;font-family:Arial}h1{font-size:13pt;color:#1B3A6B;border-bottom:2px solid #1B3A6B;padding-bottom:5px;margin-bottom:12px}</style></head><body><h1>GRANT MEDICAL COLLEGE & HOSPITAL, MUMBAI<br/><span style="font-size:11pt">Dept. of Plastic & Reconstructive Surgery</span></h1><pre>${result}</pre><div style="margin-top:30px;font-size:9pt;color:#666">Generated: ${new Date().toLocaleString('en-IN')} · GMC Plastics PMS</div></body></html>`);w.document.close();w.print();};

  return(
    <div style={S.ovl}>
      <div style={{...S.box(900)}} className="fu">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div>
            <div style={{fontSize:16,fontWeight:800,color:C.t,fontFamily:"Syne"}}>🤖 AI Assistant</div>
            <div style={{fontSize:12,color:C.sub,marginTop:2}}>{patient.name} · {patient.diagnosis}</div>
          </div>
          <button onClick={onClose} style={S.btnSm()}>✕ Close</button>
        </div>

        {/* Feature grid */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}}>
          {FEATURES.map(f=>(
            <button key={f.id} onClick={()=>{setMode(f.id);setResult("");}} style={{...S.card({cursor:"pointer",border:`2px solid ${mode===f.id?f.color:C.b}`,background:mode===f.id?`${f.color}12`:C.card,padding:14,textAlign:"center",borderRadius:12,outline:"none"}),...{cursor:"pointer"}}}>
              <div style={{fontSize:24,marginBottom:6}}>{f.icon}</div>
              <div style={{fontSize:13,fontWeight:700,color:mode===f.id?f.color:C.t}}>{f.label}</div>
            </button>
          ))}
        </div>

        {mode&&(
          <div className="fu">
            <div style={{marginBottom:12}}>
              <L t="Additional details / specific instructions for AI"/>
              <textarea style={{...S.ta,minHeight:72}} value={extra} onChange={e=>setExtra(e.target.value)} placeholder="e.g. patient has DM, procedure was done under GA, any specific findings to include..."/>
            </div>
            <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap"}}>
              <button onClick={()=>run(FEATURES.find(f=>f.id===mode).prompt)} style={S.btn("p")} disabled={busy}>
                {busy?<><span className="spin"/> Generating...</>:<>🚀 Generate {FEATURES.find(f=>f.id===mode)?.label}</>}
              </button>
            </div>
            {busy&&(
              <div style={{...S.card({padding:20,textAlign:"center"})}}>
                <div className="spin" style={{width:28,height:28,borderWidth:3}}></div>
                <div style={{fontSize:13,color:C.sub,marginTop:10}}>AI is generating your document...</div>
              </div>
            )}
            {result&&(
              <div className="fu">
                <div style={{...S.card({background:C.bg,padding:16,maxHeight:400,overflowY:"auto"})}}>
                  <pre style={{fontSize:13,color:C.t,whiteSpace:"pre-wrap",lineHeight:1.6,fontFamily:"inherit"}}>{result}</pre>
                </div>
                <Sp h={10}/>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  <button onClick={printResult} style={S.btn("g")}>🖨️ Print</button>
                  <button onClick={copyToClipboard} style={S.btn("teal")}>📋 Copy</button>
                  <button onClick={()=>run(FEATURES.find(f=>f.id===mode).prompt)} style={S.btn("ghost")}>🔄 Regenerate</button>
                </div>
              </div>
            )}
          </div>
        )}

        {!mode&&(
          <div style={{textAlign:"center",padding:"20px 0",color:C.sub,fontSize:13}}>
            Select a document type above to generate with AI
          </div>
        )}
      </div>
    </div>
  );
}

function PhotoPanel({patient,onClose}){
  const [photos,setPhotos]=useState(()=>DB.getPhotos(patient.id));
  const [activeTab,setActiveTab]=useState("preop");
  const [uploading,setUploading]=useState(false);
  const fileRef=useRef(); const camRef=useRef();

  useEffect(()=>DB.setPhotos(patient.id,photos),[photos,patient.id]);

  const upload=async(file,category)=>{
    if(!file)return;
    setUploading(true);
    try{
      const url=await DB.uploadFile(`${patient.id}/${category}`,file);
      const ph={url,name:file.name,ts:Date.now(),caption:""};
      setPhotos(p=>({...p,[category]:[...(p[category]||[]),ph]}));
    }catch(e){console.error(e);}
    setUploading(false);
  };

  const delPhoto=(category,idx)=>setPhotos(p=>({...p,[category]:(p[category]||[]).filter((_,i)=>i!==idx)}));
  const updateCaption=(category,idx,caption)=>setPhotos(p=>({...p,[category]:(p[category]||[]).map((ph,i)=>i===idx?{...ph,caption}:ph)}));

  const exportPhotos=()=>{
    const w=window.open('','_blank');
    const cats=[{k:"preop",l:"Pre-Op Photos"},{k:"intraop",l:"Intra-Op Photos"},{k:"postop",l:"Post-Op Photos"}];
    w.document.write(`<html><head><title>Photos - ${patient.name}</title>
<style>body{font-family:Arial,sans-serif;margin:15mm}h1{font-size:13pt;color:#1B3A6B;border-bottom:2px solid #1B3A6B;padding-bottom:5px}h2{font-size:11pt;color:#1B3A6B;margin:14px 0 8px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.ph{break-inside:avoid}.ph img{width:100%;border-radius:6px;border:1px solid #ddd}.caption{font-size:9pt;color:#666;margin-top:4px;text-align:center}
.info{background:#f5f7ff;padding:8px;border-radius:6px;margin-bottom:14px;font-size:10pt}.ft{font-size:8pt;color:#888;margin-top:20px;text-align:right}
</style></head><body>
<h1>GRANT MEDICAL COLLEGE & HOSPITAL<br/><span style="font-size:10pt">Dept. of Plastic & Reconstructive Surgery — Photo Documentation</span></h1>
<div class="info"><b>Patient:</b> ${patient.name} &nbsp;|&nbsp; <b>IPD:</b> ${patient.id} &nbsp;|&nbsp; <b>Age/Gender:</b> ${patient.age}y/${patient.gender}<br/><b>Diagnosis:</b> ${patient.diagnosis} &nbsp;|&nbsp; <b>Admitted:</b> ${patient.admitDate}</div>
${cats.map(({k,l})=>{
  const phs=photos[k]||[];
  if(phs.length===0)return`<h2>${l} — No photos</h2>`;
  return`<h2>${l} (${phs.length} photos)</h2><div class="grid">${phs.map(ph=>`<div class="ph"><img src="${ph.url}" onerror="this.style.display='none'"/><div class="caption">${ph.caption||ph.name}</div></div>`).join("")}</div>`;
}).join("")}
<div class="ft">Exported: ${new Date().toLocaleString('en-IN')} · GMC Plastics PMS v6</div></body></html>`);
    w.document.close();w.print();
  };

  const TABS=[{id:"preop",l:"Pre-Op",icon:"📸"},{id:"intraop",l:"Intra-Op",icon:"🔬"},{id:"postop",l:"Post-Op",icon:"✅"},{id:"other",l:"Other",icon:"📎"}];

  return(
    <div style={S.ovl}>
      <div style={{...S.box(960)}} className="fu">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div>
            <div style={{fontSize:16,fontWeight:800,color:C.t,fontFamily:"Syne"}}>📸 Photo Storage</div>
            <div style={{fontSize:12,color:C.sub,marginTop:2}}>{patient.name} · {patient.id}</div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={exportPhotos} style={S.btnSm("g")}>📤 Export All</button>
            <button onClick={onClose} style={S.btnSm()}>✕</button>
          </div>
        </div>

        <div style={{display:"flex",gap:4,marginBottom:14,borderBottom:`1px solid ${C.b}`,paddingBottom:8}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setActiveTab(t.id)} style={{padding:"8px 16px",borderRadius:8,border:"none",cursor:"pointer",background:activeTab===t.id?"#1D4ED8":"transparent",color:activeTab===t.id?"#fff":C.sub,fontSize:13,fontWeight:600,fontFamily:"inherit"}}>
              {t.icon} {t.l} ({(photos[t.id]||[]).length})
            </button>
          ))}
        </div>

        {/* Upload buttons */}
        <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap"}}>
          <button onClick={()=>fileRef.current?.click()} style={S.btn("p")} disabled={uploading}>
            {uploading?<><span className="spin"/>Uploading...</>:<>📁 Upload File</>}
          </button>
          <button onClick={()=>camRef.current?.click()} style={S.btn("teal")} disabled={uploading}>📷 Take Photo</button>
          <input ref={fileRef} type="file" accept="image/*,application/pdf" multiple style={{display:"none"}} onChange={e=>{Array.from(e.target.files).forEach(f=>upload(f,activeTab));e.target.value="";}}/>
          <input ref={camRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={e=>{upload(e.target.files[0],activeTab);e.target.value="";}}/>
        </div>

        {/* Photo grid */}
        {(photos[activeTab]||[]).length===0?(
          <div style={{textAlign:"center",padding:48,color:C.sub,border:`2px dashed ${C.b}`,borderRadius:12}}>
            <div style={{fontSize:40,marginBottom:10}}>📷</div>
            <div>No {activeTab} photos yet</div>
            <div style={{fontSize:12,marginTop:4}}>Upload files or take a photo using buttons above</div>
          </div>
        ):(
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:12}}>
            {(photos[activeTab]||[]).map((ph,i)=>(
              <div key={i} style={{...S.card({padding:10})}}>
                {(ph.url.startsWith('data:image')||ph.url.startsWith('http'))?(
                  <img src={ph.url} alt={ph.name} style={{width:"100%",height:130,objectFit:"cover",borderRadius:8,cursor:"pointer",marginBottom:8}} onClick={()=>window.open(ph.url,'_blank')}/>
                ):(
                  <div style={{width:"100%",height:130,background:C.bg,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",marginBottom:8,border:`1px solid ${C.b}`,cursor:"pointer"}} onClick={()=>window.open(ph.url,'_blank')}>
                    <span style={{fontSize:32}}>📄</span>
                  </div>
                )}
                <input style={{...S.inp,fontSize:11,padding:"5px 8px"}} value={ph.caption||""} onChange={e=>updateCaption(activeTab,i,e.target.value)} placeholder="Add caption..."/>
                <div style={{display:"flex",gap:6,marginTop:6}}>
                  <button onClick={()=>window.open(ph.url,'_blank')} style={{...S.btnSm("p"),flex:1,justifyContent:"center"}}>View</button>
                  <button onClick={()=>delPhoto(activeTab,i)} style={{...S.btnSm("r"),justifyContent:"center"}}>🗑️</button>
                </div>
              </div>
            ))}
          </div>
        )}
        <Sp h={10}/>
        <div style={{fontSize:12,color:C.mu,textAlign:"center"}}>Photos saved to Supabase cloud storage · Click Export to download as printable PDF</div>
      </div>
    </div>
  );
}

function Logbook({pts,protos,user,onClose}){
  const [log,setLog]=useState(()=>DB.getLogbook());
  const [filter,setFilter]=useState("");
  const [showAdd,setShowAdd]=useState(false);

  const addEntry=()=>{
    if(!newEntry.procedure||!newEntry.date)return alert("Procedure and date required");
    const pt=pts.find(p=>p.id===newEntry.patientId);
    const entry={...newEntry,patientName:pt?.name||newEntry.patientId,surgeon:user.name,addedAt:new Date().toISOString()};
    DB.addLogEntry(entry);
    setLog(DB.getLogbook());
    setShowAdd(false);
    setNewEntry({patientId:"",procedure:"",date:new Date().toISOString().split("T")[0],role:"Resident",notes:"",outcome:"",supervisor:""});
  };

  const filtered=log.filter(e=>!filter||e.procedure.toLowerCase().includes(filter.toLowerCase())||e.patientName.toLowerCase().includes(filter.toLowerCase())||e.date.includes(filter));

Patient: ${patient.name}, ${patient.age}y/${patient.gender}

<style>body{font-family:Arial,sans-serif;font-size:10.5pt;margin:15mm;line-height:1.6}h1{font-size:13pt;color:#1B3A6B;border-bottom:2px solid #1B3A6B;padding-bottom:5px}pre{white-space:pre-wrap;font-size:10.5pt}</style></head><body>

            <div style={{fontSize:12,color:C.sub,marginTop:2}}>{patient.name} · {patient.diagnosis}</div>

            <button onClick={onClose} style={S.btnSm()}>✕</button>

        {/* Protocol guidelines */}
        {(proto.rehab||[]).length>0&&(
          <div style={{...S.card({background:`${C.teal}08`,border:`1px solid ${C.teal}25`,marginBottom:14})}}>
            <div style={{fontSize:12,fontWeight:700,color:C.teal,marginBottom:8}}>📋 Protocol Guidelines</div>
            {(proto.rehab||[]).map((r,i)=>(
              <div key={i} style={{fontSize:13,color:C.t,padding:"4px 0",borderBottom:`1px solid ${C.b}30`}}>{i+1}. {r}</div>

        <button onClick={genAI} style={{...S.btn("teal"),marginBottom:14,width:"100%"}} disabled={generating}>
          {generating?<><span className="spin"/>Generating AI Rehab Protocol...</>:<>🤖 Generate Detailed AI Rehab Protocol</>}

// INVESTIGATION ROW + PHOTO
// ═══════════════════════════════════
function InvRow({item,idx,patId,checked,onChk,photos,onAddPhoto}){
  const [exp,setExp]=useState(false);
  const [busy,setBusy]=useState(false);
  const fRef=useRef();const cRef=useRef();
  const key='inv_'+idx;
  const mine=(photos.inv||{})[key]||[];
  const handle=async file=>{
    if(!file)return;setBusy(true);
    try{const url=await DB.uploadFile(`${patId}/inv_${idx}`,file);onAddPhoto(key,{url,name:file.name,ts:Date.now()});}
    catch(e){const url=await new Promise(res=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.readAsDataURL(file);});onAddPhoto(key,{url,name:file.name,ts:Date.now()});}
    setBusy(false);setExp(true);
  };
  return(
    <div style={{marginBottom:6}}>
      <div style={S.chkrow(checked)} onClick={()=>onChk(key)}>
        <CB chk={checked} on={()=>onChk(key)}/>
        <span style={{flex:1,fontSize:13,color:checked?"#5E7A9E":C.t,textDecoration:checked?"line-through":"none",lineHeight:1.4}}>{item}</span>
        <div style={{display:"flex",gap:5,marginLeft:8}} onClick={e=>e.stopPropagation()}>
          {mine.length>0&&<button onClick={()=>setExp(!exp)} style={S.btnSm("p")}>📎{mine.length}</button>}
          <button onClick={()=>fRef.current?.click()} style={S.btnSm("p")} title="Upload">{busy?<span className="spin"/>:"📁"}</button>
          <button onClick={()=>cRef.current?.click()} style={S.btnSm("teal")} title="Camera">📷</button>
          <input ref={fRef} type="file" accept="image/*,application/pdf" style={{display:"none"}} onChange={e=>{handle(e.target.files[0]);e.target.value="";}}/>
          <input ref={cRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={e=>{handle(e.target.files[0]);e.target.value="";}}/>
        </div>
      </div>
      {exp&&mine.length>0&&(
        <div style={{marginLeft:30,marginBottom:6,display:"flex",flexWrap:"wrap",gap:8}}>
          {mine.map((ph,pi)=>(
            <div key={pi}>{(ph.url.startsWith('data:')||ph.url.startsWith('http'))
              ?<img src={ph.url} alt={ph.name} style={{width:76,height:76,objectFit:"cover",borderRadius:8,border:`1px solid ${C.b}`,cursor:"pointer"}} onClick={()=>window.open(ph.url,'_blank')}/>
              :<a href={ph.url} target="_blank" rel="noreferrer" style={{display:"flex",gap:5,alignItems:"center",padding:"5px 10px",background:C.card,borderRadius:8,border:`1px solid ${C.b}`,color:C.accent,fontSize:12,textDecoration:"none"}}>📄 {ph.name}</a>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// PROTOCOL PANEL
// ═══════════════════════════════════
function ProtPanel({diagnosis,patId,protos}){
  const proto=protos[diagnosis];
  const [chks,setChks]=useState(()=>DB.getChks(patId));
  const [photos,setPhotos]=useState(()=>DB.getPhotos(patId));
  const [open,setOpen]=useState("investigations");
  useEffect(()=>DB.setChks(patId,chks),[chks,patId]);
  useEffect(()=>DB.setPhotos(patId,photos),[photos,patId]);
  if(!proto)return<div style={S.card({textAlign:"center",padding:40,color:C.sub})}>No protocol. Add via Protocol Manager.</div>;
  const tog=k=>setChks(p=>({...p,[k]:!p[k]}));
  const addInvPhoto=(key,ph)=>setPhotos(p=>({...p,inv:{...(p.inv||{}),[key]:[...((p.inv||{})[key]||[]),ph]}}));
  const allInvDone=(proto.investigations||[]).every((_,i)=>chks['inv_'+i]);
  const Sec=({k,icon,title,items,isInv})=>(
    <div style={{marginBottom:10}}>
      <div style={S.sh} onClick={()=>setOpen(open===k?null:k)}>
        <span style={{fontSize:16}}>{icon}</span>
        <span style={{fontWeight:700,color:C.t,flex:1,fontSize:14}}>{title}</span>
        <span style={{color:C.mu,fontSize:14}}>{open===k?"▲":"▼"}</span>
      </div>
      {open===k&&(items||[]).map((item,i)=>{
        const key=isInv?'inv_'+i:`${k}_${i}`;
        return isInv
          ?<InvRow key={i} item={item} idx={i} patId={patId} checked={!!chks['inv_'+i]} onChk={tog} photos={photos} onAddPhoto={addInvPhoto}/>
          :<div key={i} style={S.chkrow(!!chks[key])} onClick={()=>tog(key)}>
            <CB chk={!!chks[key]} on={()=>tog(key)}/>
            <span style={{fontSize:13,color:chks[key]?"#5E7A9E":C.t,textDecoration:chks[key]?"line-through":"none",lineHeight:1.4}}>{item}</span>
          </div>;
      })}
    </div>
  );
  return(
    <div>
      <div style={S.card({background:`linear-gradient(135deg,${proto.color}12,${C.card})`,borderLeft:`4px solid ${proto.color}`,marginBottom:14})}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
          <div>
            <div style={{fontSize:11,color:proto.color,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:4}}>🤖 Protocol Loaded</div>
            <div style={{fontSize:15,fontWeight:800,color:C.t}}>{diagnosis}</div>
          </div>
          <Tag label={proto.category} color={proto.color}/>
        </div>
        {allInvDone&&<div style={{marginTop:10,padding:"7px 12px",background:"rgba(34,197,94,0.1)",borderRadius:8,color:"#22C55E",fontSize:13,fontWeight:600}}>✅ All investigations checked — patient ready for OT</div>}
      </div>
      <Sec k="investigations" icon="🧪" title="Investigations" items={proto.investigations} isInv={true}/>
      <Sec k="preop" icon="✅" title="Pre-Op Checklist" items={proto.preop_checklist}/>
      <Sec k="preop_orders" icon="📝" title="Pre-Op Orders" items={proto.preop_orders}/>
      <Sec k="special_consent" icon="⚖️" title="Special Consent" items={proto.special_consent}/>
      <Sec k="materials" icon="🛒" title="Materials & Equipment" items={proto.materials}/>
      <Sec k="intraop" icon="🔪" title="Intra-Op" items={proto.intraop}/>
      <Sec k="postop" icon="💊" title="Post-Op Orders" items={proto.postop}/>
      <Sec k="rehab" icon="🏃" title="Rehabilitation" items={proto.rehab}/>
      <Sec k="references" icon="📚" title="References" items={proto.references}/>
    </div>
  );
}

      {id:"imaging",label:"Imaging",fields:["CXR","CT Scan","MRI","USG","X-Ray"]},

    const setNote=(idx,v)=>setData(p=>{const a=[...(p[grp]||[])];a[idx]={...a[idx],notes:v};return{...p,[grp]:a};});
    const delEntry=(idx)=>setData(p=>({...p,[grp]:(p[grp]||[]).filter((_,i)=>i!==idx)}));
    const addPhoto=async(idx,file)=>{
      if(!file)return;
      setUploading(true);
      try{

      }catch(e){
        const url=await new Promise(r=>{const rd=new FileReader();rd.onload=ev=>r(ev.target.result);rd.readAsDataURL(file);});
        setData(p=>{const a=[...(p[grp]||[])];a[idx]={...a[idx],photos:[...(a[idx].photos||[]),{url,name:file.name}]};return{...p,[grp]:a};});

          tbl+="<tr><td style='padding:4px 8px;font-weight:600;border-bottom:1px solid #eee'>"+f+"</td>";
          dates.forEach(function(d){const e=es.find(function(x){return x.date===d;});tbl+="<td style='padding:4px 8px;text-align:center;border-bottom:1px solid #eee'>"+(e&&e.values&&e.values[f]?e.values[f]:"--")+"</td>";});
          tbl+="</tr>";
        });
        tbl+="</table>";rows+=tbl;
      });
      w.document.write("<!DOCTYPE html><html><head><title>Investigations</title><style>body{font-family:Arial;font-size:10pt;margin:12mm}h1{color:#1B3A6B;border-bottom:2px solid #1B3A6B}</style></head><body><h1>GMC Hospital - Investigations</h1><div style='background:#f0f4ff;padding:8px 12px;border-radius:6px;margin-bottom:12px'><b>Patient:</b> "+patient.name+" &nbsp; <b>IP:</b> "+(patient.ipNumber||patient.id)+" &nbsp; <b>Dx:</b> "+patient.diagnosis+"</div>"+rows+"<div style='margin-top:12px;font-size:8pt;color:#888;text-align:right'>Printed: "+new Date().toLocaleString("en-IN")+"</div></body></html>");
      w.document.close();w.print();

      <div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>

        </div>
        {(data.proto_pending||[]).length>0&&(
          <div style={{background:C.card,borderRadius:14,border:"1px solid "+C.accent+"40",borderLeft:"3px solid "+C.accent,padding:"14px",marginBottom:14}}>
            <div style={{fontSize:12,fontWeight:700,color:C.accent,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:10}}>📋 Protocol Investigations · {pt.diagnosis}</div>
            {(data.proto_pending||[]).map(function(item){return(
              <div key={item.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid "+C.b+"40"}}>
                <button onClick={()=>setData(p=>({...p,proto_pending:(p.proto_pending||[]).map(x=>x.id===item.id?{...x,done:!x.done}:x)}))} style={{width:24,height:24,borderRadius:6,border:"2px solid "+(item.done?C.ok:C.b),background:item.done?C.ok:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontFamily:"inherit"}}>

              </div>

            }} style={{...S.btnSm("p"),marginTop:10,width:"100%",justifyContent:"center",padding:"9px"}}>+ Add Investigation</button>
          </div>

        <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:6,marginBottom:10,WebkitOverflowScrolling:"touch"}}>

            <div style={{fontWeight:600}}>No {G.label} entries yet</div>

        ):(
          entries.map(function(entry,idx){

              <div key={idx} style={{background:C.card,borderRadius:14,border:"1px solid "+C.b,borderTop:"2px solid "+C.accent,padding:"14px",marginBottom:10}}>

  /* ── REFERRALS ──────────────────────── */

          // Extract dept name from strings like "Ophthalmology: VA & fundus"

              <div><L t="Drug Name"/><input style={S.inp} value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))} placeholder="e.g. Amoxicillin"/></div>
              <div><L t="Dose"/><input style={S.inp} value={form.dose} onChange={e=>setForm(p=>({...p,dose:e.target.value}))} placeholder="e.g. 500mg"/></div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                <div><L t="Route"/>

              <div style={{display:"flex",gap:8}}>

          <div style={{textAlign:"center",padding:"32px 16px",border:"2px dashed "+C.b,borderRadius:14,color:C.sub}}>

        {active.map(function(d){return(
          <div key={d.id} style={{background:C.card,borderRadius:12,border:"1px solid "+C.b,borderLeft:"3px solid "+C.ok,padding:"12px 14px",marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
              <span style={{fontWeight:800,fontSize:14,color:C.t}}>{d.name}</span>
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>setDrugs(p=>p.map(x=>x.id===d.id?{...x,active:false}:x))} style={{...S.btnSm("r"),fontSize:11,padding:"3px 8px"}}>Stop</button>
                <button onClick={()=>setDrugs(p=>p.filter(x=>x.id!==d.id))} style={{...S.btnSm("r"),padding:"3px 7px"}}>✕</button>

            <div style={{fontSize:11,color:C.mu,marginTop:4}}>Started: {d.startDate}</div>

        {stopped.length>0&&<div style={{fontSize:12,fontWeight:700,color:C.sub,textTransform:"uppercase",letterSpacing:"0.5px",margin:"12px 0 8px"}}>Stopped ({stopped.length})</div>}

      {label:"Chief Complaint",k:"cc",rows:2,hint:"e.g. Pain and swelling following RTA"},

      {label:"Local Examination",k:"localex",rows:4,hint:"Inspection, palpation findings"},

      {label:"Diagnosis",k:"dx",rows:2,hint:patient.diagnosis},
      {label:"Plan of Management",k:"plan",rows:4,hint:"Surgical plan, consent, timeline"},

          <div style={{fontSize:15,fontWeight:800,color:C.t}}>📄 Case Sheet</div>

  function WardRoundTab(){
    const K="wr_"+patient.id;
    const [rounds,setRounds]=useState(()=>LS.g(K,[]));
    const [showAdd,setShowAdd]=useState(false);
    const [date,setDate]=useState(new Date().toISOString().split("T")[0]);
    const [notes,setNotes]=useState("");
    const [taskText,setTaskText]=useState("");
    const [tasks,setTasks]=useState([]);
    const [uploading,setUploading]=useState(null);
    useEffect(()=>LS.s(K,rounds),[rounds]);

    const addTask=()=>{if(!taskText.trim())return;setTasks(p=>[...p,{id:Date.now(),text:taskText,done:false,photos:[]}]);setTaskText("");};
    const addRound=()=>{
      if(!notes.trim()&&tasks.length===0)return alert("Add notes or tasks");

      if(!file)return;

        const compressed=await compressImage(file,900,0.65);
        const url=await DB.uploadFile(patient.id+"/wr_task_"+tid,compressed);
        setRounds(p=>p.map(r=>r.id===rid?{...r,tasks:r.tasks.map(t=>t.id===tid?{...t,photos:[...(t.photos||[]),{url,name:file.name}]}:t)}:r));

        const url=await new Promise(res=>{const rd=new FileReader();rd.onload=ev=>res(ev.target.result);rd.readAsDataURL(file);});

      setUploading(null);

      w.document.close();w.print();
    };

    return(

            <div style={{marginBottom:10}}><L t="Clinical Notes"/><textarea style={{...S.ta,minHeight:80}} value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Vitals, wound status, clinical findings..."/></div>

    const fillQrRef=useRef(null);

        [fillQrRef,uploadQrRef].forEach(function(ref,i){
          ref.current.innerHTML="";
          try{new QRCode(ref.current,{text:i===0?fillUrl:uploadUrl,width:180,height:180,colorDark:"#1B3A6B",colorLight:"#ffffff"});}
          catch(e){ref.current.innerHTML="<div style='padding:8px;font-size:11px;color:#ef4444'>QR unavailable</div>";}

        setRendered(true);
      }
    },[rendered]);

    const copyLink=(url)=>{
      navigator.clipboard&&navigator.clipboard.writeText(url).then(()=>alert("Link copied!\n"+url)).catch(()=>alert("Link: "+url));

    const whatsapp=(url,label)=>{
      const msg=encodeURIComponent("GMC Plastic Surgery – "+patient.name+" ("+patient.ipNumber+")\n"+label+":\n"+url);

function RefPortal({protos,allPts,onSubmit,onUpdate}){
  const [mode,setMode]=useState("home");
  const [refId,setRefId]=useState("");
  const [foundPt,setFoundPt]=useState(null);
  const [notFound,setNotFound]=useState(false);
  const [f,setF]=useState({name:"",age:"",gender:"Male",ward:"",contact:"",diagnosis:Object.keys(protos)[0],priority:"Semi-Urgent",notes:"",refDept:"",refDoctorName:"",refType:"Reference"});
  const [done,setDone]=useState(null);
  const [busy,setBusy]=useState(false);
  const u=(k,v)=>setF(p=>({...p,[k]:v}));

  const submit=async()=>{
    if(!f.name.trim()||!f.refDept.trim())return alert("Patient name and department required");
    setBusy(true);
    const id=genIPD();
    const pt={...f,id,created_at:new Date().toISOString(),admitDate:new Date().toISOString().split("T")[0],status:"Pre-Op Workup",allInvestigationsDone:false,resident:""};
    await onSubmit(pt);setBusy(false);setDone(id);
  };

  const findPatient=()=>{
    const query=refId.trim().toUpperCase();
    const pt=allPts.find(p=>p.id.toUpperCase()===query);
    if(pt){setFoundPt(pt);setNotFound(false);}
    else{setFoundPt(null);setNotFound(true);}
  };

  if(mode==="revisit"&&foundPt){
    const proto=protos[foundPt.diagnosis]||{};
    const [photos,setPhotos]=useState(()=>DB.getPhotos(foundPt.id));
    const [chks,setChks]=useState(()=>DB.getChks(foundPt.id));
    const [note,setNote]=useState("");
    const [saved,setSaved]=useState(false);
    useEffect(()=>DB.setPhotos(foundPt.id,photos),[photos]);
    useEffect(()=>DB.setChks(foundPt.id,chks),[chks]);
    const addInvPhoto=(key,ph)=>setPhotos(p=>({...p,inv:{...(p.inv||{}),[key]:[...((p.inv||{})[key]||[]),ph]}}));
    const tog=k=>setChks(p=>({...p,[k]:!p[k]}));
    const pr=PRIO[foundPt.priority];
    return(
      <div style={{minHeight:"100vh",background:C.bg,padding:"20px 16px"}}>
        <div style={{maxWidth:680,margin:"0 auto"}}>
          <button onClick={()=>{setMode("home");setFoundPt(null);setRefId("");}} style={{...S.btnSm(),marginBottom:14}}>← Back</button>
          <div style={S.card({borderLeft:`4px solid ${pr.c}`,marginBottom:16})}>
            <div style={{fontWeight:800,fontSize:15,color:C.t,marginBottom:4}}>{foundPt.name}</div>
            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:6}}>
              <span style={{fontSize:11,color:C.accent,fontFamily:"monospace",fontWeight:700}}>{foundPt.id}</span>
              <span style={S.bdg(foundPt.priority)}>{pr.i} {foundPt.priority}</span>
              <span style={S.pil(foundPt.status==="Cleared for OT"?C.ok:C.warn,true)}>{foundPt.status}</span>
            </div>
            <div style={{fontSize:13,color:proto.color||C.accent,fontWeight:600}}>{foundPt.diagnosis}</div>
          </div>
          <div style={S.card({background:`${C.accent}06`,border:`1px solid ${C.accent}25`,marginBottom:14})}>
            <div style={{fontSize:13,fontWeight:700,color:C.accent,marginBottom:10}}>🧪 Investigation Checklist & Report Upload</div>
            {(proto.investigations||[]).map((item,i)=>(
              <InvRow key={i} item={item} idx={i} patId={foundPt.id} checked={!!chks['inv_'+i]} onChk={tog} photos={photos} onAddPhoto={addInvPhoto}/>
            ))}
          </div>
          <div style={S.card()}>

function ProtoManager({protos,onSave}){
  const [cat,setCat]=useState("All");
  const [editing,setEditing]=useState(null);
  const [showNew,setShowNew]=useState(false);
  const CATS=["All","Trauma","Reconstruction","Oncoplastic","Vascular","Burns & Contracture","Aesthetic & Body","Congenital","Custom"];
  const SE=({proto,setProto,k,label,icon})=>{
    const [txt,setTxt]=useState("");const items=proto[k]||[];
    const add=()=>{if(!txt.trim())return;setProto(p=>({...p,[k]:[...(p[k]||[]),txt.trim()]}));setTxt("");};
    const rm=i=>setProto(p=>({...p,[k]:items.filter((_,j)=>j!==i)}));
    return(
      <div style={{marginBottom:14}}>
        <div style={{fontSize:11,fontWeight:700,color:C.accent,marginBottom:6,textTransform:"uppercase"}}>{icon} {label}</div>
        {items.map((item,i)=><div key={i} style={{display:"flex",gap:6,marginBottom:4,background:C.bg,padding:"6px 10px",borderRadius:8,border:`1px solid ${C.b}`,alignItems:"center"}}><span style={{flex:1,fontSize:12,color:C.t}}>{item}</span><button onClick={()=>rm(i)} style={S.btnSm("r")}>✕</button></div>)}
        <div style={{display:"flex",gap:8}}><input style={{...S.inp,flex:1}} value={txt} onChange={e=>setTxt(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()} placeholder="Add item, press Enter"/><button onClick={add} style={S.btn("p")}>+</button></div>
      </div>
    );
  };
  const EM=({proto,name,onSv,onClose})=>{
    const [p,setP]=useState({...proto});const [n,setN]=useState(name);
    return(
      <div style={S.ovl}><div style={{...S.box(900)}} className="fu">
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:14}}><div style={{fontSize:15,fontWeight:800,color:C.t,fontFamily:"Syne"}}>{name?"Edit":"New"} Protocol</div><button onClick={onClose} style={S.btnSm()}>✕</button></div>
        <div style={S.g2}>
          <div><L t="Name"/><input style={S.inp} value={n} onChange={e=>setN(e.target.value)}/></div>
          <div><L t="Category"/><select style={S.sel} value={p.category||"Custom"} onChange={e=>setP(x=>({...x,category:e.target.value}))}>{CATS.filter(c=>c!=="All").map(c=><option key={c}>{c}</option>)}</select></div>
        </div>
        <Sp h={8}/><L t="Colour"/><input type="color" style={{...S.inp,height:44,padding:4,marginBottom:14}} value={p.color||"#3B82F6"} onChange={e=>setP(x=>({...x,color:e.target.value}))}/>
        <div style={S.dv}/>
        <div style={{maxHeight:480,overflowY:"auto",paddingRight:4}}>
          <SE proto={p} setProto={setP} k="investigations" label="Investigations" icon="🧪"/>
          <SE proto={p} setProto={setP} k="preop_checklist" label="Pre-Op Checklist" icon="✅"/>
          <SE proto={p} setProto={setP} k="preop_orders" label="Pre-Op Orders" icon="📝"/>
          <SE proto={p} setProto={setP} k="special_consent" label="Special Consent" icon="⚖️"/>
          <SE proto={p} setProto={setP} k="materials" label="Materials & Equipment" icon="🛒"/>
          <SE proto={p} setProto={setP} k="intraop" label="Intra-Op" icon="🔪"/>
          <SE proto={p} setProto={setP} k="postop" label="Post-Op Orders" icon="💊"/>
          <SE proto={p} setProto={setP} k="rehab" label="Rehabilitation Protocol" icon="🏃"/>
          <SE proto={p} setProto={setP} k="references" label="References" icon="📚"/>
        </div>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:14}}>
          <button onClick={onClose} style={S.btn("ghost")}>Cancel</button>
          <button onClick={()=>{if(!n.trim())return alert("Name required");onSv(n,p);onClose();}} style={S.btn("g")}>💾 Save</button>
        </div>
      </div></div>
    );
  };
  const filt=Object.entries(protos).filter(([,v])=>cat==="All"||v.category===cat);
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div style={{fontSize:18,fontWeight:800,color:C.t,fontFamily:"Syne"}}>Protocol Manager</div>
        <button onClick={()=>setShowNew(true)} style={S.btn("p")}>+ New Protocol</button>
      </div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
        {CATS.map(c=><button key={c} onClick={()=>setCat(c)} style={{...S.btnSm(cat===c?"p":""),padding:"5px 12px"}}>{c}</button>)}
      </div>
      <div style={S.g2}>
        {filt.map(([name,proto])=>(
          <div key={name} style={S.card({borderLeft:`4px solid ${proto.color||C.accent}`})}>
            <div style={{fontWeight:700,color:C.t,fontSize:13,marginBottom:6}}>{name}</div>
            <Tag label={proto.category||"General"} color={proto.color||C.accent}/>
            <div style={{fontSize:11,color:C.sub,marginTop:6,marginBottom:10}}>{(proto.investigations||[]).length} inv · {(proto.materials||[]).length} mat · {(proto.special_consent||[]).length} consent · {(proto.rehab||[]).length} rehab</div>
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>setEditing(name)} style={S.btnSm("p")}>✏️ Edit</button>
              <button onClick={()=>{if(window.confirm(`Delete "${name}"?`)){const u={...protos};delete u[name];onSave(u);}}} style={S.btnSm("r")}>🗑️</button>
            </div>
          </div>
        ))}
      </div>
      {editing&&<EM proto={protos[editing]} name={editing} onSv={(n,p)=>{const u={...protos};if(n!==editing)delete u[editing];u[n]=p;onSave(u);setEditing(null);}} onClose={()=>setEditing(null)}/>}
      {showNew&&<EM proto={{name:"",category:"Custom",color:"#3B82F6",investigations:[],preop_checklist:[],preop_orders:[],special_consent:[],materials:[],intraop:[],postop:[],rehab:[],references:[]}} name="" onSv={(n,p)=>{onSave({...protos,[n]:p});setShowNew(false);}} onClose={()=>setShowNew(false)}/>}
    </div>
  );
}

function Login({onLogin}){
  const [u,setU]=useState(""); const [p,setP]=useState(""); 
  const [err,setErr]=useState(""); const [busy,setBusy]=useState(false);
  const [tab,setTab]=useState("staff"); // staff | guest

  const login=async()=>{
    if(!u||!p)return setErr("Enter username and password");
    setBusy(true);setErr("");
    try{
      // Check Supabase users table first
      const{data:rows}=await SB.from('app_users').select('*').eq('username',u.trim()).eq('active',true);
      let user=rows&&rows.length?rows[0]:null;
      // Fallback to base users
      if(!user)user=BASE_USERS.find(x=>x.username===u.trim()&&x.password===p);
      else if(user.password!==p)user=null;
      if(user){
        const sess={...user,ts:Date.now()};
        LS.s('gmc_sess',sess);onLogin(sess);
      } else setErr("Invalid username or password");
    }catch(e){
      // Supabase unavailable - use base users only
      const user=BASE_USERS.find(x=>x.username===u.trim()&&x.password===p);
      if(user){LS.s('gmc_sess',{...user,ts:Date.now()});onLogin(user);}
      else setErr("Invalid username or password");
    }
    setBusy(false);
  };

  const guestLogin=async(dept)=>{
    setBusy(true);
    const sess={username:"guest_"+dept.toLowerCase().replace(/\s/g,"_"),name:dept,role:"guest",dept,ts:Date.now()};
    LS.s('gmc_sess',sess);onLogin(sess);
    setBusy(false);
  };

  const GUEST_DEPTS=["Ophthalmology","ENT","Neurosurgery","Anaesthesia","Orthopaedics","General Surgery","Cardiology","Nephrology","Dermatology","Physiotherapy"];

  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{width:"100%",maxWidth:380}} className="fu">
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{width:64,height:64,borderRadius:18,background:"linear-gradient(135deg,#1B3A6B,#2563EB)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,margin:"0 auto 12px"}}>🏥</div>
          <div style={{fontSize:22,fontWeight:800,color:C.t,fontFamily:"Syne"}}>GMC Plastics PMS</div>
          <div style={{fontSize:13,color:C.sub,marginTop:4}}>Dept. of Plastic Surgery</div>
        </div>

        <div style={{display:"flex",background:C.card,borderRadius:12,padding:4,marginBottom:20,border:"1px solid "+C.b}}>
          <button onClick={()=>setTab("staff")} style={{flex:1,padding:"9px",borderRadius:9,border:"none",cursor:"pointer",fontWeight:tab==="staff"?700:400,background:tab==="staff"?C.accent:"transparent",color:tab==="staff"?"#fff":C.sub,fontFamily:"inherit",fontSize:13}}>👨‍⚕️ Staff Login</button>
          <button onClick={()=>setTab("guest")} style={{flex:1,padding:"9px",borderRadius:9,border:"none",cursor:"pointer",fontWeight:tab==="guest"?700:400,background:tab==="guest"?C.accent:"transparent",color:tab==="guest"?"#fff":C.sub,fontFamily:"inherit",fontSize:13}}>🔗 Guest / Dept.</button>
        </div>

        {tab==="staff"&&(
          <div style={{background:C.card,borderRadius:16,border:"1px solid "+C.b,padding:"20px"}} className="fu">
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              <div><L t="Username"/><input style={S.inp} value={u} onChange={e=>setU(e.target.value)} onKeyDown={e=>e.key==="Enter"&&login()} placeholder="e.g. drsenior" autoCapitalize="off"/></div>
              <div><L t="Password"/><input style={S.inp} type="password" value={p} onChange={e=>setP(e.target.value)} onKeyDown={e=>e.key==="Enter"&&login()} placeholder="Password"/></div>
              {err&&<div style={{fontSize:13,color:"#EF4444",background:"#EF444415",padding:"8px 12px",borderRadius:8}}>{err}</div>}
              <button onClick={login} disabled={busy} style={{...S.btn("p"),width:"100%",padding:"14px",fontSize:15,marginTop:4}}>{busy?<><span className="spin"/> Signing in...</>:"Sign In"}</button>
            </div>
          </div>
        )}

        {tab==="guest"&&(
          <div style={{background:C.card,borderRadius:16,border:"1px solid "+C.b,padding:"20px"}} className="fu">
            <div style={{fontSize:12,color:C.sub,marginBottom:12,textAlign:"center"}}>Select your department for limited access</div>

  );

function QRUploadsViewer({patientId,onSyncDone}){
  const SECTIONS=[
    {id:"preop",  label:"Pre-Op Photos",   icon:"📸",color:"#6366F1"},
    {id:"intraop",label:"Intra-Op Photos", icon:"🔬",color:"#EF4444"},
    {id:"postop", label:"Post-Op Photos",  icon:"✅",color:"#22C55E"},
    {id:"inv",    label:"Investigations",  icon:"🧪",color:"#F59E0B"},
    {id:"ref",    label:"Referral Reports",icon:"🔗",color:"#06B6D4"},
    {id:"other",  label:"Other / Misc",    icon:"📎",color:"#A855F7"},
  ];
  const [data,setData]=useState({});
  const [loading,setLoading]=useState(true);
  const [err,setErr]=useState(null);
  const [synced,setSynced]=useState(false);
  const [deleting,setDeleting]=useState(null);

  const load=async()=>{
    setLoading(true);setErr(null);
    try{
      const{data:rows,error}=await SB.from('uploads').select('*').eq('patient_id',patientId).order('ts',{ascending:false});
      if(error)throw error;
      const grouped={};
      (rows||[]).forEach(r=>{if(!grouped[r.section])grouped[r.section]=[];grouped[r.section].push(r);});
      setData(grouped);

      // Sync preop/intraop/postop/other into DB.getPhotos (PhotoPanel)
      const photoSections=["preop","intraop","postop","other"];
      const existing=DB.getPhotos(patientId);
      let changed=false;
      photoSections.forEach(function(sec){
        const uploads=(grouped[sec]||[]);
        if(!uploads.length)return;
        const existingUrls=new Set((existing[sec]||[]).map(function(p){return p.url;}));
        const newOnes=uploads.filter(function(u){return !existingUrls.has(u.url);});
        if(newOnes.length){
          existing[sec]=[...(existing[sec]||[]),...newOnes.map(function(u){return{url:u.url,name:u.name||"",ts:u.ts,caption:"via QR"};})];
          changed=true;
        }
      });
      if(changed){DB.setPhotos(patientId,existing);setSynced(true);if(onSyncDone)onSyncDone();}
    }catch(e){setErr(e.message);}
    setLoading(false);
  };

  useEffect(()=>{load();},[patientId]);

  const deleteUpload=async(row)=>{
    if(!window.confirm("Delete this file from Supabase permanently?"))return;
    setDeleting(row.id);
    try{
      // 1. Delete from Supabase Storage (extract storage path from public URL)
      if(row.url&&row.url.includes('/storage/v1/object/public/patient-photos/')){
        const storagePath=row.url.split('/storage/v1/object/public/patient-photos/')[1];
        await SB.storage.from('patient-photos').remove([storagePath]);
      }
      // 2. Delete row from uploads table
      await SB.from('uploads').delete().eq('id',row.id);
      // 3. Remove from PhotoPanel local storage
      const photos=DB.getPhotos(patientId);
      if(photos[row.section]){
        photos[row.section]=photos[row.section].filter(function(p){return p.url!==row.url;});
        DB.setPhotos(patientId,photos);
      }
      // 4. Update local state
      setData(p=>{
        const updated={...p};
        if(updated[row.section])updated[row.section]=updated[row.section].filter(function(r){return r.id!==row.id;});
        return updated;
      });
    }catch(e){alert("Delete failed: "+e.message);}
    setDeleting(null);
  };

  const total=Object.values(data).reduce(function(s,a){return s+a.length;},0);

  return(
    <div style={{background:C.card,borderRadius:14,border:"1px solid "+C.b,padding:"14px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div style={{fontSize:12,fontWeight:700,color:C.sub,textTransform:"uppercase",letterSpacing:"0.5px"}}>
          📂 Uploaded via QR
          {total>0&&<span style={{background:C.accent,color:"#fff",fontSize:10,padding:"2px 7px",borderRadius:10,marginLeft:6,fontWeight:800}}>{total}</span>}
          {synced&&<span style={{background:C.ok+"20",color:C.ok,fontSize:10,padding:"2px 7px",borderRadius:8,marginLeft:6,fontWeight:700}}>↗ Synced</span>}
        </div>
        <button onClick={load} style={{...S.btnSm(null),padding:"4px 10px",fontSize:12}}>{loading?"⏳":"🔄"}</button>
      </div>
      {loading&&<div style={{fontSize:13,color:C.sub,textAlign:"center",padding:"16px 0"}}>⏳ Loading...</div>}
      {err&&<div style={{fontSize:12,color:"#EF4444",padding:"10px",background:"#EF444415",borderRadius:8,marginBottom:8}}>Could not load uploads. Check internet or Supabase uploads table.</div>}
      {!loading&&!err&&total===0&&<div style={{fontSize:13,color:C.sub,textAlign:"center",padding:"16px 0"}}>No uploads yet — scan QR from any device to upload</div>}
      {!loading&&SECTIONS.map(function(s){
        const files=data[s.id]||[];
        if(!files.length)return null;
        return(
          <div key={s.id} style={{marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
              <span style={{fontSize:12,fontWeight:700,color:s.color}}>{s.icon} {s.label}</span>
              <span style={{fontSize:11,color:C.sub}}>({files.length})</span>
              {["preop","intraop","postop","other"].includes(s.id)&&<span style={{fontSize:10,background:C.ok+"15",color:C.ok,padding:"1px 6px",borderRadius:6,fontWeight:600}}>↗ in Photos tab</span>}
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {files.map(function(f){
                const isImg=f.url&&(f.url.match(/\.(jpg|jpeg|png|webp|gif)/i)||f.url.includes('/storage/v1/object/public/'));
                const isDel=deleting===f.id;
                return(
                  <div key={f.id} style={{position:"relative",flexShrink:0}}>
                    {isImg?
                      <img src={f.url} alt={f.name} title={f.name} style={{width:72,height:72,objectFit:"cover",borderRadius:8,border:"2px solid "+s.color+"50",cursor:"pointer",display:"block",opacity:isDel?0.3:1}} onClick={()=>!isDel&&window.open(f.url,"_blank")}/>:
                      <div title={f.name} style={{width:72,height:72,borderRadius:8,border:"2px solid "+s.color+"50",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2,background:C.bg,cursor:"pointer",padding:4,opacity:isDel?0.3:1}} onClick={()=>!isDel&&window.open(f.url,"_blank")}>
                        <span style={{fontSize:26}}>📄</span>
                        <span style={{fontSize:8,color:s.color,textAlign:"center",overflow:"hidden",maxWidth:64,lineHeight:1.2,wordBreak:"break-all"}}>{f.name}</span>
                      </div>
                    }
                    <button
                      onClick={()=>deleteUpload(f)}
                      disabled={isDel}
                      style={{position:"absolute",top:-6,right:-6,width:20,height:20,borderRadius:"50%",background:"#EF4444",border:"2px solid "+C.bg,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#fff",fontFamily:"inherit",padding:0,lineHeight:1}}
                    >{isDel?"⏳":"✕"}</button>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ADMIN PANEL — User Management

function AdminPanel({onClose}){
  const [users,setUsers]=useState([]);
  const [loading,setLoading]=useState(true);
  const [form,setForm]=useState({username:"",password:"",name:"",role:"resident",dept:"Plastic Surgery",active:true});
  const [saving,setSaving]=useState(false);
  const [showAdd,setShowAdd]=useState(false);
  const ROLES=["admin","faculty","senior","resident","guest"];
  const QUICK_DEPTS=["Ophthalmology","ENT","Orthopaedics","General Surgery","Neurosurgery","Cardiology","Anaesthesia","Medicine","Dermatology","Urology","Psychiatry","Paediatrics"];
  const DEPTS=["Plastic Surgery","Ophthalmology","ENT","Neurosurgery","Anaesthesia","Orthopaedics","General Surgery","Cardiology","Nephrology","Dermatology","Physiotherapy"];

  const load=async()=>{
    setLoading(true);
    try{
      const{data}=await SB.from('app_users').select('*').order('created_at',{ascending:false});
      setUsers(data||[]);
    }catch(e){setUsers([]);}
    setLoading(false);
  };
  useEffect(()=>{load();},[]);

  const addUser=async()=>{
    if(!form.username.trim()||!form.password.trim()||!form.name.trim())return alert("Fill all required fields");
    setSaving(true);
    try{
      // Only send columns that exist in the base table
      const payload={
        username:form.username.trim(),
        password:form.password,
        name:form.name,
        role:form.role,
        dept:form.dept,
        active:form.active,
        created_at:new Date().toISOString()
      };
      // Try with active column first, fallback without it
      let res=await SB.from('app_users').upsert(payload,{onConflict:'username'}).select();
      if(res.error&&res.error.message&&res.error.message.includes("active")){
        const{active,...payloadNoActive}=payload;
        res=await SB.from('app_users').upsert(payloadNoActive,{onConflict:'username'}).select();
      }
      const{data,error}=res;
      if(error){
        console.error("Supabase error:",error);
        alert("❌ Supabase error:\n"+error.message+"\n\nCode: "+error.code+"\n\nMake sure:\n1. app_users table exists\n2. RLS is DISABLED\n3. Supabase URL & key are correct");
        setSaving(false);return;
      }
      alert("✅ User '"+form.username+"' saved successfully!");
      setForm({username:"",password:"",name:"",role:"resident",dept:"Plastic Surgery",active:true});
      setShowAdd(false);
      await load();
    }catch(e){
      console.error(e);
      alert("❌ Network/JS error: "+e.message);
    }
    setSaving(false);
  };

  const toggleActive=async(u)=>{
    await SB.from('app_users').update({active:!u.active}).eq('id',u.id);
    setUsers(p=>p.map(x=>x.id===u.id?{...x,active:!x.active}:x));
  };

  const deleteUser=async(u)=>{
    if(!window.confirm("Delete user "+u.name+"?"))return;
    await SB.from('app_users').delete().eq('id',u.id);
    setUsers(p=>p.filter(x=>x.id!==u.id));
  };

  const RCOL={admin:"#EF4444",faculty:"#8B5CF6",senior:"#3B82F6",resident:"#22C55E",guest:"#F59E0B"};

  return(

        <button onClick={onClose} style={{width:36,height:36,borderRadius:10,background:C.card,border:"1px solid "+C.b,cursor:"pointer",fontSize:16,color:C.t,fontFamily:"inherit"}}>✕</button>
        <div style={{flex:1}}>
          <div style={{fontWeight:800,color:C.t,fontSize:15}}>👑 Admin Panel</div>
          <div style={{fontSize:11,color:C.sub}}>User Management</div>
        </div>
        <button onClick={()=>setShowAdd(v=>!v)} style={S.btnSm("p")}>+ Add User</button>
        <button onClick={async()=>{
          const{data,error}=await SB.from('app_users').select('count').limit(1);
          if(error)alert("❌ Cannot connect to app_users table:\n"+error.message+"\n\nRun the SQL shown below in Supabase SQL Editor");
          else alert("✅ Supabase app_users table is accessible!");
        }} style={{...S.btnSm("teal"),padding:"6px 10px",fontSize:11}}>🔌 Test</button>
      </div>

      <div style={{flex:1,overflowY:"auto",padding:"14px",WebkitOverflowScrolling:"touch"}}>
        {showAdd&&(
          <div style={{background:C.card,borderRadius:14,border:"1px solid "+C.accent+"40",padding:"14px",marginBottom:14}} className="fu">
            <div style={{fontSize:13,fontWeight:700,color:C.accent,marginBottom:8}}>New User</div>

              <div style={{fontSize:11,color:C.sub,fontWeight:600,marginBottom:6}}>Quick preset — Department Resident</div>

                {QUICK_DEPTS.map(function(d){return(
                  <button key={d} onClick={()=>setForm(p=>({...p,dept:d,role:"guest",username:d.toLowerCase().replace(/\s+/g,"").substring(0,10)+"res",password:"gmc"+d.substring(0,3).toLowerCase()+"123"}))} style={{padding:"4px 10px",borderRadius:8,border:"1px solid "+C.b,background:C.bg,color:C.sub,fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>

-- Step 1: Create table
CREATE TABLE IF NOT EXISTS app_users (
  id uuid default gen_random_uuid() primary key,
  username text unique not null,
  password text,
  name text,
  role text default 'guest',
  dept text,
  active boolean default true,
  created_at timestamptz default now()
);
-- Step 2: Disable RLS (IMPORTANT)
ALTER TABLE app_users DISABLE ROW LEVEL SECURITY;
-- Step 3: Grant access
GRANT ALL ON app_users TO anon, authenticated;
          </div>
        </div>
      </div>
    </div>
  );
}

            <div style={{fontSize:12,marginTop:6}}>Use the button above to refer a patient to Plastic Surgery</div>

function RefLinkPage({patientId,dept,allPts}){
  const [selDept,setSelDept]=useState(dept||"");
  const [deptInput,setDeptInput]=useState("");
  const [page,setPage]=useState(dept?"home":(patientId?"dept":"dept_select"));
  const [pts,setPts]=useState(allPts||[]);
  const [protos,setProtos]=useState({});
  const [selPt,setSelPt]=useState(null);
  const [search,setSearch]=useState("");
  const [busy,setBusy]=useState(false);
  const [toast,setToast]=useState("");

  // New patient form
  const [nf,setNf]=useState({name:"",age:"",gender:"Male",ward:"",contact:"",diagnosis:"",priority:"Semi-Urgent",notes:"",ipNumber:""});
  const nu=(k,v)=>setNf(p=>({...p,[k]:v}));
  const [submitted,setSubmitted]=useState(false);

  // Investigation adder state
  const [invText,setInvText]=useState("");
  const [invDate,setInvDate]=useState(new Date().toISOString().split("T")[0]);
  const [invFiles,setInvFiles]=useState([]);
  const [invUploading,setInvUploading]=useState(false);

  // Referral reply
  const [replyText,setReplyText]=useState("");

  const showToast=(msg)=>{setToast(msg);setTimeout(()=>setToast(""),2500);};

  useEffect(()=>{
    DB.getProtos().then(pr=>setProtos(pr));
    DB.getPts().then(p=>setPts(p));
  },[]);

  // Load patient if patientId given
  useEffect(()=>{
    if(patientId&&pts.length>0){
      const found=pts.find(function(p){return p.id===patientId;});
      if(found){setSelPt(found);setPage("patient");}
    }
  },[patientId,pts]);

  const COMMON_DEPTS=["Ophthalmology","ENT","Orthopaedics","General Surgery","Medicine","Neurosurgery","Urology","Cardiology","Anaesthesia","Dermatology","Psychiatry","Paediatrics","Obs & Gynae","Radiology","Pathology","Other"];

  // Save investigation to patient
  const addInvestigation=async()=>{
    if(!invText.trim())return alert("Enter investigation result");
    setInvUploading(true);
    let photoUrls=[];
    for(let file of invFiles){
      const url=await DB.uploadFile("refs/"+selPt.id,file);
      if(url)photoUrls.push(url);
    }
    const key="refs_inv_"+selPt.id;
    const all=LS.g(key,[]);
    const entry={id:Date.now(),date:invDate,text:invText,dept:selDept,photos:photoUrls};
    const updated=[entry,...all];
    LS.s(key,updated);
    // Also save to Supabase via patient data
    const updPt={...selPt,refInvestigations:updated};
    await DB.savePt(updPt);
    setSelPt(updPt);setPts(p=>p.map(x=>x.id===selPt.id?updPt:x));
    setInvText("");setInvFiles([]);
    setInvUploading(false);
    showToast("Investigation added ✅");
  };

  // Save referral reply
  const addReply=async()=>{
    if(!replyText.trim())return alert("Enter reply/findings");
    const key="refs_"+selPt.id;
    const all=LS.g(key,[]);
    const updated=all.map(function(r){
      if(!selDept||r.dept===selDept||r.dept.toLowerCase().includes(selDept.toLowerCase())){
        return{...r,reply:replyText,replyDate:new Date().toISOString().split("T")[0],replyDept:selDept,status:"Reported"};
      }
      return r;
    });
    LS.s(key,updated);
    const updPt={...selPt,refs_reply:replyText};
    await DB.savePt(updPt);
    setSelPt(updPt);setPts(p=>p.map(x=>x.id===selPt.id?updPt:x));
    setReplyText("");
    showToast("Reply saved ✅");
  };

  // Submit new patient referral
  const submitNew=async()=>{
    if(!nf.name.trim())return alert("Patient name required");
    if(!nf.diagnosis.trim())return alert("Diagnosis / reason for referral required");
    setBusy(true);
    const id=genIPD();
    const pt={...nf,id,created_at:new Date().toISOString(),admitDate:new Date().toISOString().split("T")[0],status:"Pending Review",refType:"Reference",refDept:selDept,refType:"Reference",ipNumber:nf.ipNumber||id};
    await DB.savePt(pt);
    setPts(prev=>[pt,...prev]);
    setSubmitted(true);setBusy(false);
    showToast("Patient referred successfully ✅");
  };

  // Protocol-based pending investigations for a patient
  const getProtoPending=(pt)=>{
    if(!pt||!pt.diagnosis)return[];
    const pr=protos[pt.diagnosis];
    if(!pr)return[];
    const done=(pt.refInvestigations||[]).map(function(i){return i.text.toLowerCase();});
    return(pr.investigations||[]).filter(function(inv){
      return!done.some(function(d){return d.includes(inv.toLowerCase().substring(0,15));});
    });
  };

  // Dept-specific pending referrals
  const getDeptRefs=(pt)=>{
    if(!pt)return[];
    const allRefs=LS.g("refs_"+pt.id,[]);
    return allRefs.filter(function(r){
      return r.dept&&r.dept.toLowerCase().includes(selDept.toLowerCase())&&r.status!=="Reported";

  const searchedPts=pts.filter(function(p){

            <div style={{fontWeight:700,fontSize:13,color:C.t,marginBottom:12}}>🧪 Add Investigation Result</div>

              <div style={{fontSize:11,color:C.sub,fontWeight:600,marginBottom:4}}>Date</div>

            </div>
          )}
        </div>

        {/* Toast */}
        {toast&&<div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:C.ok,color:"#fff",padding:"10px 20px",borderRadius:12,fontWeight:700,fontSize:13,zIndex:999,boxShadow:"0 4px 16px #0003"}}>{toast}</div>}
      </div>
    );
  }

  return null;
}

  const INV_GROUPS=[
    {id:"cbc",   label:"CBC",     fields:["Hb","TLC","DLC","Platelets","PCV"]},
    {id:"rft",   label:"RFT",     fields:["Urea","Creatinine","Na","K"]},

    {id:"cardiac",label:"Cardiac",fields:["ECG","2D Echo","Troponin"]},

  // Referral state
  const [refDept,setRefDept]=useState("");
  const [refReason,setRefReason]=useState("");
  const [refPriority,setRefPriority]=useState("Semi-Urgent");

  // Upload state
  const [files,setFiles]=useState([]);
  const [uploadSec,setUploadSec]=useState("inv");
  const [uploading,setUploading]=useState(false);

  // Notes
  const [notes,setNotes]=useState("");

  const showToast=(m)=>{setToast(m);setTimeout(()=>setToast(""),2500);};

  useEffect(()=>{
    DB.getPts().then(function(pts){
      const found=pts.find(function(p){return p.id===patientId;});
      setPt(found||null);setLoading(false);
    });
  },[patientId]);

  const saveInvestigations=async()=>{
    const filled=Object.entries(invVals).filter(function(e){return e[1].trim();});
    if(filled.length===0&&!invNotes.trim())return alert("Enter at least one value");
    setBusy(true);
    const entry={id:Date.now(),date:invDate,dept,values:invVals,notes:invNotes,addedBy:"external"};
    const existing=pt.externalInv||[];
    const updPt={...pt,externalInv:[entry,...existing]};
    await DB.savePt(updPt);setPt(updPt);
    setBusy(false);showToast("Investigations saved ✅");
    setInvVals({});setInvNotes("");
  };

  const saveReferral=async()=>{
    if(!refDept.trim()||!refReason.trim())return alert("Department and reason required");
    setBusy(true);
    const K="refs_"+pt.id;
    const all=LS.g(K,[]);
    const newRef={id:Date.now(),dept:refDept,reason:refReason,priority:refPriority,date:new Date().toISOString().split("T")[0],status:"Pending",addedBy:dept||"External"};
    LS.s(K,[newRef,...all]);
    const updPt={...pt,pendingRefs:(pt.pendingRefs||0)+1};
    await DB.savePt(updPt);setPt(updPt);
    setBusy(false);showToast("Referral added ✅");
    setRefDept("");setRefReason("");
  };

  const uploadFiles=async()=>{
    if(files.length===0)return alert("Select files to upload");
    setUploading(true);
    for(let file of files){
      await DB.uploadFile(uploadSec+"/"+pt.id,file);
    }
    setUploading(false);setFiles([]);
    showToast(files.length+" file(s) uploaded ✅");
  };

  const saveNotes=async()=>{
    if(!notes.trim())return alert("Enter notes");
    setBusy(true);
    const existing=pt.externalNotes||[];
    const updPt={...pt,externalNotes:[{id:Date.now(),date:new Date().toISOString().split("T")[0],dept,text:notes},...existing]};
    await DB.savePt(updPt);setPt(updPt);
    setBusy(false);showToast("Notes saved ✅");setNotes("");
  };

  if(loading)return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:14}}>
      <div style={{fontSize:40}}>🏥</div>
      <div style={{fontFamily:"Syne",fontSize:18,fontWeight:800,color:C.t}}>GMC Plastic Surgery</div>
      <div style={{fontSize:13,color:C.sub}}>Loading patient...</div>
    </div>
  );

  if(!pt)return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:10,padding:24}}>
      <div style={{fontSize:40}}>❌</div>
      <div style={{fontWeight:800,fontSize:16,color:C.t}}>Patient not found</div>
      <div style={{fontSize:12,color:C.sub}}>This link may be invalid or expired</div>
    </div>
  );

  // Dept picker if not set
  if(!deptSet)return(
    <div style={{minHeight:"100vh",background:C.bg,padding:"30px 16px"}}>
      <div style={{maxWidth:460,margin:"0 auto"}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{fontSize:36,marginBottom:8}}>🏥</div>
          <div style={{fontFamily:"Syne",fontSize:20,fontWeight:800,color:C.t}}>GMC Plastic Surgery</div>
          <div style={{fontSize:13,color:C.sub,marginTop:4}}>Patient Data Entry</div>
        </div>
        <div style={{background:C.card,borderRadius:16,border:"1px solid "+C.b,padding:16,marginBottom:12}}>
          <div style={{fontWeight:700,fontSize:13,color:C.t,marginBottom:4}}>Patient</div>
          <div style={{fontSize:16,fontWeight:800,color:C.accent,marginBottom:2}}>{pt.name}</div>
          <div style={{fontSize:12,color:C.sub}}>{pt.age}y / {pt.gender} · {pt.ward} · {pt.diagnosis}</div>
        </div>
        <div style={{background:C.card,borderRadius:16,border:"1px solid "+C.b,padding:16}}>
          <div style={{fontWeight:700,fontSize:13,color:C.t,marginBottom:10}}>Your Department / Name</div>
          <input style={{...S.inp,marginBottom:12,fontSize:14}} value={dept} onChange={e=>setDept(e.target.value)} placeholder="e.g. General Surgery / Dr. Sharma"/>
          <button onClick={()=>{if(!dept.trim())return alert("Enter your department");setDeptSet(true);setPage(uploadOnly?"upload":"summary");}} style={{...S.btn("g"),width:"100%",padding:13,fontSize:14}}>
            Enter →
          </button>
        </div>
      </div>
    </div>
  );

  const SECTIONS_UPLOAD=[
    {id:"inv",label:"Investigation Reports"},
    {id:"preop",label:"Pre-Op Photos"},
    {id:"postop",label:"Post-Op Photos"},
    {id:"ref",label:"Referral Reports"},
    {id:"other",label:"Other / Misc"},
  ];

  return(
    <div style={{minHeight:"100vh",background:C.bg,paddingBottom:80}}>
      {/* Header */}
      <div style={{background:C.panel,borderBottom:"1px solid "+C.b,padding:"12px 14px",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{flex:1}}>
            <div style={{fontWeight:800,fontSize:15,color:C.t,fontFamily:"Syne"}}>{pt.name}</div>
            <div style={{fontSize:11,color:C.sub}}>{pt.ipNumber} · {pt.age}y/{pt.gender} · {pt.ward} · <span style={{color:C.accent}}>{dept}</span></div>
          </div>
          <div style={{background:C.accent+"20",borderRadius:8,padding:"4px 10px",fontSize:11,color:C.accent,fontWeight:700}}>{pt.status}</div>
        </div>
        {/* Tab bar */}
        {!uploadOnly&&(
          <div style={{display:"flex",gap:4,marginTop:10,overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
            {[["summary","📋","Summary"],["inv","🧪","Investigations"],["refs","🔗","Referrals"],["upload","📎","Upload"],["notes","📝","Notes"]].map(function(t){
              return(
                <button key={t[0]} onClick={()=>setPage(t[0])} style={{flexShrink:0,padding:"6px 10px",borderRadius:8,border:"none",background:page===t[0]?C.accent:"transparent",color:page===t[0]?"#fff":C.sub,fontSize:11,fontWeight:page===t[0]?700:400,cursor:"pointer",fontFamily:"inherit"}}>
                  {t[1]} {t[2]}
                </button>
              );
            })}
          </div>
        )}
      </div>

      <div style={{padding:"14px",maxWidth:560,margin:"0 auto"}}>

        {/* SUMMARY */}
        {page==="summary"&&(
          <div>
            <div style={{background:C.card,borderRadius:14,border:"1px solid "+C.b,padding:14,marginBottom:12}}>
              <div style={{fontWeight:700,fontSize:12,color:C.sub,marginBottom:8,textTransform:"uppercase"}}>Patient Details</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {[["Name",pt.name],["IP Number",pt.ipNumber||"—"],["Age/Gender",pt.age+"y / "+pt.gender],["Ward/Bed",pt.ward||"—"],["Diagnosis",pt.diagnosis||"—"],["Status",pt.status||"—"],["Admit Date",pt.admitDate||"—"],["Referred By",pt.refDept||"—"]].map(function(r){return(
                  <div key={r[0]} style={{gridColumn:r[0]==="Diagnosis"||r[0]==="Name"?"1/-1":"auto"}}>
                    <div style={{fontSize:10,color:C.sub,fontWeight:600}}>{r[0]}</div>
                    <div style={{fontSize:13,color:C.t,fontWeight:700,marginTop:1}}>{r[1]}</div>
                  </div>
                );})}
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              {[["🧪","Investigations","inv"],["🔗","Add Referral","refs"],["📎","Upload Files","upload"],["📝","Clinical Notes","notes"]].map(function(b){return(
                <button key={b[2]} onClick={()=>setPage(b[2])} style={{background:C.card,border:"1px solid "+C.b,borderRadius:12,padding:"16px 10px",cursor:"pointer",fontFamily:"inherit",textAlign:"center"}}>
                  <div style={{fontSize:26,marginBottom:6}}>{b[0]}</div>
                  <div style={{fontWeight:700,fontSize:12,color:C.t}}>{b[1]}</div>
                </button>
              );})}
            </div>
          </div>
